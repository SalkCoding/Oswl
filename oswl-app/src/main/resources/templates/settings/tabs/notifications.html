<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tab"
     x-data="notificationsTab()"
     x-init="load()"
     class="flex flex-col gap-[20px]">

    <div class="flex flex-col gap-[8px]">
        <h2 class="font-bold text-[22px] text-black tracking-[-0.22px] leading-[1.3]" th:text="#{settings.notifications.heading}">Notifications</h2>
        <p class="font-normal text-[14px] text-[var(--grayscale-60)]" th:text="#{settings.notifications.description}">Alert channels when scans find critical CVEs or restricted licenses.</p>
    </div>

    <div x-show="apiError" x-cloak class="bg-red-50 border border-red-200 rounded-[8px] px-[16px] py-[12px] text-red-700 text-[13px]" x-text="apiError"></div>
    <div x-show="toast" x-cloak class="bg-green-50 border border-green-200 rounded-[8px] px-[16px] py-[12px] text-green-800 text-[13px]" x-text="toast"></div>

    <div class="bg-white border border-[var(--grayscale-20)] rounded-[10px] pt-[28px] px-[28px] pb-[38px] flex flex-col gap-[24px]">
        <h3 class="font-bold text-[20px] text-black" th:text="#{settings.notifications.channels}">Channels</h3>

        <div class="flex flex-col gap-[8px]">
            <label class="font-medium text-[13px] text-[var(--grayscale-70)]" th:text="#{settings.notifications.slack}">Slack incoming webhook URL</label>
            <input type="url" x-model="form.slackWebhookUrl" :placeholder="slackConfigured ? '•••••••• (configured)' : 'https://hooks.slack.com/...'"
                   class="w-full max-w-[560px] px-[12px] py-[8px] border border-[var(--grayscale-20)] rounded-[8px] text-[13px]"/>
            <button type="button" x-show="slackConfigured" @click="form.clearSlackWebhook = true; form.slackWebhookUrl = ''"
                    class="text-[12px] text-[var(--semantic-warning)] w-fit" th:text="#{settings.notifications.clearSlack}">Clear Slack webhook</button>
        </div>

        <div class="flex flex-col gap-[8px]">
            <label class="font-medium text-[13px] text-[var(--grayscale-70)]" th:text="#{settings.notifications.teams}">Microsoft Teams incoming webhook URL</label>
            <input type="url" x-model="form.teamsWebhookUrl" :placeholder="teamsConfigured ? '•••••••• (configured)' : 'https://...webhook.office.com/...'"
                   class="w-full max-w-[560px] px-[12px] py-[8px] border border-[var(--grayscale-20)] rounded-[8px] text-[13px]"/>
            <button type="button" x-show="teamsConfigured" @click="form.clearTeamsWebhook = true; form.teamsWebhookUrl = ''"
                    class="text-[12px] text-[var(--semantic-warning)] w-fit" th:text="#{settings.notifications.clearTeams}">Clear Teams webhook</button>
        </div>

        <label class="flex items-center gap-[8px] cursor-pointer">
            <input type="checkbox" x-model="form.emailDigestEnabled" class="w-[16px] h-[16px]"/>
            <span class="text-[14px]" th:text="#{settings.notifications.emailDigest}">Email digest to project members (requires SMTP in Security)</span>
        </label>

        <h3 class="font-bold text-[16px] text-black pt-[8px]" th:text="#{settings.notifications.triggers}">Triggers</h3>
        <label class="flex items-center gap-[8px] cursor-pointer">
            <input type="checkbox" x-model="form.notifyCriticalCve" class="w-[16px] h-[16px]"/>
            <span class="text-[14px]" th:text="#{settings.notifications.trigger.critical}">Critical CVE detected</span>
        </label>
        <label class="flex items-center gap-[8px] cursor-pointer">
            <input type="checkbox" x-model="form.notifyLicenseViolation" class="w-[16px] h-[16px]"/>
            <span class="text-[14px]" th:text="#{settings.notifications.trigger.license}">Restricted license detected</span>
        </label>

        <div class="flex justify-end pt-[8px]">
            <button type="button" @click="save()" :disabled="saving"
                    class="px-[20px] py-[10px] bg-[var(--primary-120)] text-white rounded-[8px] text-[14px] font-medium disabled:opacity-50"
                    th:text="#{common.save}">Save</button>
        </div>
    </div>

    <script th:inline="javascript">
    const _notifI18n = {
        loadFailed: /*[[#{settings.notifications.error.load}]]*/ 'Failed to load notification settings.',
        saveFailed: /*[[#{settings.notifications.error.save}]]*/ 'Failed to save notification settings.',
        saved: /*[[#{settings.notifications.saved}]]*/ 'Notification settings saved.'
    };
    </script>
    <script>
    function notificationsTab() {
        return {
            form: { slackWebhookUrl: '', teamsWebhookUrl: '', clearSlackWebhook: false, clearTeamsWebhook: false,
                    emailDigestEnabled: false, notifyCriticalCve: true, notifyLicenseViolation: true },
            slackConfigured: false, teamsConfigured: false,
            saving: false, apiError: null, toast: null,
            headers() { return oswlJsonHeaders(); },
            async load() {
                try {
                    const r = await fetch('/api/settings/notifications');
                    if (!r.ok) { this.apiError = _fetchErr(r, _notifI18n.loadFailed); return; }
                    const d = await r.json();
                    this.slackConfigured = d.slackConfigured;
                    this.teamsConfigured = d.teamsConfigured;
                    this.form.emailDigestEnabled = d.emailDigestEnabled;
                    this.form.notifyCriticalCve = d.notifyCriticalCve;
                    this.form.notifyLicenseViolation = d.notifyLicenseViolation;
                } catch (e) { this.apiError = _notifI18n.loadFailed; }
            },
            async save() {
                this.saving = true; this.apiError = null;
                try {
                    const body = { ...this.form };
                    if (!body.slackWebhookUrl) delete body.slackWebhookUrl;
                    if (!body.teamsWebhookUrl) delete body.teamsWebhookUrl;
                    const r = await fetch('/api/settings/notifications', { method: 'PUT', headers: this.headers(), body: JSON.stringify(body) });
                    if (!r.ok) { this.apiError = _fetchErr(r, _notifI18n.saveFailed); return; }
                    const d = await r.json();
                    this.slackConfigured = d.slackConfigured;
                    this.teamsConfigured = d.teamsConfigured;
                    this.form.clearSlackWebhook = false;
                    this.form.clearTeamsWebhook = false;
                    this.form.slackWebhookUrl = '';
                    this.form.teamsWebhookUrl = '';
                    this.toast = _notifI18n.saved;
                    setTimeout(() => this.toast = null, 2500);
                } finally { this.saving = false; }
            }
        };
    }
    </script>
</div>
</body>
</html>
