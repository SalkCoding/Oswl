<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Actions / Search Bar Fragment -->
<div th:fragment="actions"
     data-no-print="true"
     class="border-t border-[var(--grayscale-20)] flex flex-col pl-[60px] pr-[240px] py-[20px] w-full bg-white shrink-0 relative">
    <div class="flex items-center gap-[12px] w-full">
        <div class="relative" @click.outside="bulkActionsOpen = false">
            <button type="button"
                    @click="selectedComponents.length > 0 && (bulkActionsOpen = !bulkActionsOpen)"
                    :disabled="selectedComponents.length === 0"
                    class="bg-[var(--grayscale-5)] border border-[var(--grayscale-30)] flex h-[32px] items-center justify-center gap-[6px] px-[14px] rounded-[6px] shrink-0 transition-colors"
                    :class="selectedComponents.length === 0 ? 'opacity-40 cursor-not-allowed' : (bulkActionsOpen ? 'bg-[var(--grayscale-10)] border-[var(--primary-120)] hover:bg-[var(--grayscale-10)]' : 'hover:bg-[var(--grayscale-10)] cursor-pointer')">
                <p class="font-medium text-[13px] text-[var(--primary-120)] text-center leading-[1.3] tracking-[-0.13px] whitespace-nowrap" th:text="#{common.bulkActions}">Bulk Actions</p>
                <img th:src="@{/icon/icon-chevron-down.svg}" class="w-3 h-3 transition-transform" :class="bulkActionsOpen ? 'rotate-180' : ''" alt="" aria-hidden="true" style="filter: brightness(0) saturate(100%) invert(47%) sepia(100%) saturate(453%) hue-rotate(148deg) brightness(83%);">
            </button>

            <div x-show="bulkActionsOpen"
                 @click.away="bulkActionsOpen = false"
                 x-transition
                 style="display: none;"
                 class="absolute left-0 top-[36px] z-[9999] w-full rounded-[8px] border border-[var(--grayscale-30)] bg-white shadow-[0px_8px_24px_rgba(0,29,53,0.08)] p-[10px]">
                <p class="text-[10px] text-[#849197] font-normal tracking-[-0.10px] mb-[8px] px-[10px]" th:text="#{common.applyToSelected}">Apply to selected</p>
                <button type="button"
                        @click="applyBulkAction('reviewed')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.reviewed}">Reviewed</span></button>
                <button type="button"
                        @click="applyBulkAction('unreviewed')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.unreviewed}">Unreviewed</span></button>
                <button type="button"
                        @click="applyBulkAction('ignore')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.ignore}">Ignore</span></button>
                <button type="button"
                        @click="applyBulkAction('unignore')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.unignore}">Unignore</span></button>
            </div>
        </div>
        <div class="relative" @click.outside="exportOpen = false">
            <button type="button"
                    @click="exportOpen = !exportOpen"
                    class="bg-[var(--grayscale-5)] hover:bg-[var(--grayscale-10)] border border-[var(--grayscale-30)] flex h-[32px] items-center justify-center gap-[6px] px-[14px] rounded-[6px] shrink-0 w-[104px] transition-colors"
                    :class="exportOpen ? 'bg-[var(--grayscale-10)] border-[var(--primary-120)]' : ''">
                <p class="font-medium text-[13px] text-[var(--primary-120)] text-center leading-[1.3] tracking-[-0.13px]" th:text="#{common.export}">Export</p>
                <img th:src="@{/icon/icon-chevron-down.svg}" class="w-3 h-3 transition-transform" :class="exportOpen ? 'rotate-180' : ''" alt="" aria-hidden="true" style="filter: brightness(0) saturate(100%) invert(47%) sepia(100%) saturate(453%) hue-rotate(148deg) brightness(83%);">
            </button>

            <div x-show="exportOpen"
                 @click.away="exportOpen = false"
                 x-transition
                 style="display: none;"
                 class="absolute left-0 top-[36px] z-[9999] w-full rounded-[8px] border border-[var(--grayscale-30)] bg-white shadow-[0px_8px_24px_rgba(0,29,53,0.08)] p-[12px]">
                <button type="button"
                        @click="exportAs('pdf')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] font-medium text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.pdf}">PDF</span></button>
                <button type="button"
                        @click="exportAs('csv')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] font-medium text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    <span th:text="#{common.csv}">CSV</span></button>
            </div>
        </div>

        <div class="bg-[var(--grayscale-10)] flex flex-1 gap-[9px] h-[32px] items-center max-w-[880px] px-[12px] rounded-[75px] border border-transparent focus-within:border-[var(--primary-120)]">
            <img th:src="@{/icon/icon-search.svg}" class="w-[16px] h-[16px]" alt="" aria-hidden="true">
            <input type="text" x-model="searchQuery"
                   class="flex-1 bg-transparent border-none outline-none text-[12px] text-[var(--grayscale-90)] placeholder-[var(--grayscale-50)] tracking-[-0.12px]"
                   th:placeholder="#{securityCenter.filter.searchPlaceholder}"
                   placeholder="Search for discovered library sublists" />
        </div>
    </div>
</div>

</body>
</html>
