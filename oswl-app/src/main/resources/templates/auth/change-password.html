<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{auth.changePassword.pageTitle})}"></head>
<body class="min-h-screen flex flex-col font-sans antialiased relative" style="background: transparent;">

<!-- Background image -->
<img th:src="@{/img/login-bg.png}" alt="" aria-hidden="true"
     class="fixed inset-0 w-full h-full object-cover pointer-events-none select-none -z-10"/>

<!-- Top bar -->
<header class="bg-[var(--background-dark)] flex items-center h-[64px] gap-[44px] pl-[60px] pr-[40px] py-[16px] w-full shrink-0 relative z-10">
    <div class="flex gap-[12px] items-center shrink-0">
        <img th:src="@{/icon/icon-logo.svg}" class="w-[22px] h-[30px]" alt="OsWL" aria-hidden="true">
        <h1 class="font-extrabold text-[24px] text-[var(--secondary-100)] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
    </div>
    <h2 class="font-bold text-[18px] text-white tracking-[-0.18px] leading-[1.3] whitespace-nowrap" th:text="#{auth.changePassword.pageTitle}">Change Password</h2>
</header>

<!-- Centered card -->
<main class="flex-1 flex items-center justify-center px-[24px] py-[40px] relative z-10">

    <div class="w-full max-w-[480px] bg-white border border-[var(--grayscale-20)] rounded-[10px] px-[24px] py-[28px]
                flex flex-col gap-[24px] items-center"
         style="filter: drop-shadow(0px 0px 20px rgba(0,29,53,0.03));"
         x-data="changePassword()">

        <!-- Brand block -->
        <div class="flex flex-col items-center gap-[4px]">
            <img th:src="@{/icon/icon-logo-card.svg}" class="w-[60px] h-[83px] mb-[2px]" alt="OsWL" aria-hidden="true">
            <p class="font-extrabold text-[28px] text-[var(--primary-120)] tracking-[-0.28px] leading-[1.3]" th:text="#{auth.changePassword.title}">비밀번호 설정</p>
        </div>

        <!-- Notification banner (latest-wins) -->
        <div x-show="notice" x-cloak
             class="w-full rounded-[8px] px-[12px] py-[10px] text-[13px] flex items-center justify-center gap-[6px]"
             :class="notice && notice.type === 'success'
                 ? 'bg-green-50 border border-green-200 text-green-700'
                 : 'bg-red-50 border border-red-200 text-red-700'">
            <span x-text="notice && notice.text"></span>
        </div>

        <!-- Description -->
        <div class="w-full text-center flex flex-col gap-[6px]">
            <p class="text-[14px] text-[var(--grayscale-70)] tracking-[-0.14px] leading-[1.5]" th:text="#{auth.changePassword.description}">관리자가 임시 비밀번호를 발급했습니다.</p>
            <p class="text-[13px] text-[var(--grayscale-50)] tracking-[-0.13px]" th:text="#{auth.changePassword.description2}">계속하기 전에 새 비밀번호를 설정해 주세요.</p>
        </div>

        <!-- Form -->
        <form class="w-full flex flex-col gap-[16px]" @submit.prevent="submit()">

            <!-- Current password -->
            <div class="flex flex-col gap-[6px]">
                <label class="text-[13px] font-semibold text-[var(--grayscale-80)] tracking-[-0.13px]" th:text="#{auth.changePassword.label.current}">현재(임시) 비밀번호</label>
                <div class="relative">
                    <input :type="showCurrent ? 'text' : 'password'"
                           x-model="currentPassword"
                           autocomplete="current-password"
                           th:placeholder="#{auth.changePassword.placeholder.current}"
                           :disabled="submitting"
                           class="w-full pr-[40px] px-[14px] py-[11px] text-[14px] text-[var(--grayscale-100)]
                                  border border-[var(--grayscale-20)] rounded-[8px] outline-none
                                  focus:border-[#33D1B7] transition-colors placeholder-[var(--grayscale-40)]
                                  disabled:opacity-50"/>
                    <button type="button" tabindex="-1"
                            @click="showCurrent = !showCurrent"
                            class="absolute right-[12px] top-1/2 -translate-y-1/2 text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)] transition-colors">
                        <!-- eye-off -->
                        <svg x-show="!showCurrent" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.543-7
                                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532
                                     l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5
                                     c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411
                                     m0 0L21 21"/>
                        </svg>
                        <!-- eye -->
                        <svg x-show="showCurrent" x-cloak class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5
                                     c4.478 0 8.268 2.943 9.542 7
                                     -1.274 4.057-5.064 7-9.542 7
                                     -4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- New password -->
            <div class="flex flex-col gap-[6px]">
                <label class="text-[13px] font-semibold text-[var(--grayscale-80)] tracking-[-0.13px]" th:text="#{auth.changePassword.label.newPassword}">새 비밀번호</label>
                <div class="relative">
                    <input :type="showNew ? 'text' : 'password'"
                           x-model="newPassword"
                           autocomplete="new-password"
                           th:placeholder="#{auth.changePassword.placeholder.newPassword}"
                           :disabled="submitting"
                           class="w-full pr-[40px] px-[14px] py-[11px] text-[14px] text-[var(--grayscale-100)]
                                  border border-[var(--grayscale-20)] rounded-[8px] outline-none
                                  focus:border-[#33D1B7] transition-colors placeholder-[var(--grayscale-40)]
                                  disabled:opacity-50"/>
                    <button type="button" tabindex="-1"
                            @click="showNew = !showNew"
                            class="absolute right-[12px] top-1/2 -translate-y-1/2 text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)] transition-colors">
                        <svg x-show="!showNew" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.543-7
                                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532
                                     l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5
                                     c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411
                                     m0 0L21 21"/>
                        </svg>
                        <svg x-show="showNew" x-cloak class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5
                                     c4.478 0 8.268 2.943 9.542 7
                                     -1.274 4.057-5.064 7-9.542 7
                                     -4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <!-- Inline strength hint -->
                <p x-show="newPassword.length > 0 && newPassword.length < 8"
                   class="text-[12px] text-red-600 tracking-[-0.12px]"
                   th:text="#{auth.changePassword.validation.minLength}">비밀번호는 최소 8자 이상이어야 합니다.</p>
            </div>

            <!-- Confirm new password -->
            <div class="flex flex-col gap-[6px]">
                <label class="text-[13px] font-semibold text-[var(--grayscale-80)] tracking-[-0.13px]" th:text="#{auth.changePassword.label.confirmPassword}">새 비밀번호 확인</label>
                <div class="relative">
                    <input :type="showConfirm ? 'text' : 'password'"
                           x-model="confirmPassword"
                           autocomplete="new-password"
                           th:placeholder="#{auth.changePassword.placeholder.confirmPassword}"
                           :disabled="submitting"
                           class="w-full pr-[40px] px-[14px] py-[11px] text-[14px] text-[var(--grayscale-100)]
                                  border border-[var(--grayscale-20)] rounded-[8px] outline-none
                                  focus:border-[#33D1B7] transition-colors placeholder-[var(--grayscale-40)]
                                  disabled:opacity-50"/>
                    <button type="button" tabindex="-1"
                            @click="showConfirm = !showConfirm"
                            class="absolute right-[12px] top-1/2 -translate-y-1/2 text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)] transition-colors">
                        <svg x-show="!showConfirm" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.543-7
                                     a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                                     M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532
                                     l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5
                                     c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411
                                     m0 0L21 21"/>
                        </svg>
                        <svg x-show="showConfirm" x-cloak class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5
                                     c4.478 0 8.268 2.943 9.542 7
                                     -1.274 4.057-5.064 7-9.542 7
                                     -4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <!-- Mismatch hint -->
                <p x-show="confirmPassword.length > 0 && newPassword !== confirmPassword"
                   class="text-[12px] text-red-600 tracking-[-0.12px]"
                   th:text="#{auth.changePassword.validation.mismatch}">비밀번호가 일치하지 않습니다.</p>
            </div>

            <!-- Submit button -->
            <button type="submit"
                    :disabled="submitting || !isValid()"
                    class="w-full flex items-center justify-center gap-[8px]
                           bg-[var(--primary-120)] hover:bg-[var(--primary-100)]
                           disabled:opacity-40 disabled:cursor-not-allowed
                           text-white text-[15px] font-bold tracking-[-0.15px]
                           py-[13px] rounded-[8px] transition-colors mt-[4px]">
                <svg x-show="submitting" x-cloak class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
                <span x-show="!submitting" th:text="#{auth.changePassword.btn.submit}">Change Password</span>
                <span x-show="submitting" x-cloak th:text="#{auth.changePassword.btn.saving}">Saving…</span>
            </button>
        </form>

        <!-- Sign out link -->
        <a th:href="@{/logout}"
           class="text-[12px] text-[var(--grayscale-50)] hover:text-[var(--grayscale-70)] transition-colors no-underline"
           th:text="#{auth.changePassword.link.signOut}">← 로그아웃</a>

    </div>
</main>

<script th:inline="javascript">
const _changePwdI18n = {
    success:      /*[[#{auth.changePassword.msg.success}]]*/ 'Password changed. Redirecting…',
    error:        /*[[#{auth.changePassword.msg.error}]]*/ 'An error occurred. Please try again.',
    networkError: /*[[#{auth.changePassword.msg.networkError}]]*/ 'Network error. Please try again.'
};
</script>

<script>
function changePassword() {
    return {
        currentPassword: '',
        newPassword: '',
        confirmPassword: '',
        showCurrent: false,
        showNew: false,
        showConfirm: false,
        submitting: false,
        notice: null,

        setNotice(type, text) {
            this.notice = text ? { type, text } : null;
        },

        isValid() {
            return this.currentPassword.length > 0
                && this.newPassword.length >= 8
                && this.newPassword === this.confirmPassword;
        },

        async submit() {
            if (this.submitting || !this.isValid()) return;
            this.notice = null;
            this.submitting = true;

            try {
                const r = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: oswlJsonHeaders(),
                    body: JSON.stringify({
                        currentPassword: this.currentPassword,
                        newPassword: this.newPassword,
                        confirmPassword: this.confirmPassword
                    })
                });

                const data = await r.json().catch(() => ({}));

                if (r.ok) {
                    this.setNotice('success', _changePwdI18n.success);
                    setTimeout(() => { window.location.href = data.redirectUrl || '/projects'; }, 600);
                } else {
                    this.setNotice('error', data.message || _changePwdI18n.error);
                }
            } catch {
                this.setNotice('error', _changePwdI18n.networkError);
            } finally {
                this.submitting = false;
            }
        }
    };
}
</script>

<footer th:replace="~{fragments/footer :: site-footer}"></footer>

</body>
</html>
