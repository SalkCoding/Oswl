spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:file:./oswl-db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  thymeleaf:
    cache: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    # Business logic: INFO/WARN/ERROR by default; internals handled via log.debug in code
    com.salkcoding.oswl: DEBUG
    # Vulnerability/license API communication and DB upsert debugging
    com.salkcoding.oswl.client: DEBUG
    com.salkcoding.oswl.service.VulnerabilityEnrichmentService: DEBUG
    # SQL — suppressed normally; change to DEBUG when needed
    org.hibernate.SQL: INFO
    com.salkcoding.oswl.service.ScanIngestService: INFO
    org.hibernate.orm.jdbc.bind: WARN
    # Suppress Spring internal noise
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.orm: WARN
    org.springframework.transaction: WARN

oswl:
  encryption:
    # Stable dev-only key (32 bytes, Base64-encoded). DO NOT use in production.
    # Generate a production key with: openssl rand -base64 32
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  clone:
    temp-dir: ""   # empty = use system temp dir (java.io.tmpdir/oswl-clones)