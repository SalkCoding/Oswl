spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:file:./oswl-db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  thymeleaf:
    cache: false

logging:
  level:
    root: INFO
    # Business logic: INFO/WARN/ERROR 기본, 내부 세부는 코드에서 log.debug로 처리
    com.salkcoding.oswl: INFO
    # 취약점·라이선스 API 통신 및 DB upsert 디버깅
    com.salkcoding.oswl.client: DEBUG
    com.salkcoding.oswl.service.VulnerabilityEnrichmentService: DEBUG
    # SQL — 평소엔 억제, 필요 시 DEBUG로 변경
    org.hibernate.SQL: INFO
    com.salkcoding.oswl.service.ScanIngestService: INFO
    org.hibernate.orm.jdbc.bind: WARN
    # Spring 내부 노이즈 억제
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.orm: WARN
    org.springframework.transaction: WARN

oswl:
  encryption:
    # Stable dev-only key (32 bytes, Base64-encoded). DO NOT use in production.
    # Generate a production key with: openssl rand -base64 32
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  clone:
    temp-dir: ""   # empty = use system temp dir (java.io.tmpdir/oswl-clones)