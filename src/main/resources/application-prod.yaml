springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

oswl:
  security:
    trusted-device-cookie-secure: true

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oswl}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:oswl}
    password: ${DB_PASSWORD:oswl}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  thymeleaf:
    cache: true

logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.orm: WARN
    org.springframework.transaction: WARN

# Production encryption key for VCS access tokens (REQUIRED in prod).
# Must be a Base64-encoded 32-byte (256-bit) value, e.g. produced by:
#   openssl rand -base64 32
# If unset, EncryptionService falls back to a random per-boot key, which makes
# previously stored VCS tokens unrecoverable after restart.
oswl:
  encryption:
    key: ${OSWL_ENCRYPTION_KEY:}
