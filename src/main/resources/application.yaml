spring:
  application:
    name: oswl
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  messages:
    basename: messages
    encoding: UTF-8
    use-code-as-default-message: false
    fallback-to-system-locale: false

  jackson:
    default-property-inclusion: non_null


server:
  port: 8080
  address: 0.0.0.0   # bind to IPv4 only (avoids ::1 / IPv6 loopback in logs)

oswl:
  security:
    # When true, OSWL_TD is always sent with Secure (HTTPS-only). Otherwise Secure follows request.isSecure().
    trusted-device-cookie-secure: ${OSWL_TRUSTED_DEVICE_COOKIE_SECURE:false}
  encryption:
    # REQUIRED in production. Generate with: openssl rand -base64 32
    # Set via environment variable: OSWL_ENCRYPTION_KEY
    key: ${OSWL_ENCRYPTION_KEY:}
  clone:
    # Directory for temporary git clones during Quick Import.
    # Defaults to system temp directory if left blank.
    temp-dir: ${OSWL_CLONE_TEMP_DIR:}
  github:
    # Override to use GitHub Enterprise Server. E.g. https://github.example.com/api/v3
    api-base: ${OSWL_GITHUB_API_BASE:https://api.github.com}
  risk-trend:
    # Maximum number of recent scans shown in the risk trend chart
    limit: ${OSWL_RISK_TREND_LIMIT:10}
  ai:
    prompts:
      locale: ${OSWL_AI_PROMPTS_LOCALE:en}
      # location: file:./config/ai-prompts.properties
    enrichment:
      cve-limit: ${OSWL_AI_CVE_LIMIT:10}
      license-limit: ${OSWL_AI_LICENSE_LIMIT:8}
    debug:
      # Periodic DEBUG logs while waiting on the LLM (0 = disabled). See application-local.yaml.
      heartbeat-seconds: ${OSWL_AI_DEBUG_HEARTBEAT_SECONDS:0}
      excerpt-chars: ${OSWL_AI_DEBUG_EXCERPT_CHARS:500}
      log-prompt-excerpt: ${OSWL_AI_DEBUG_LOG_PROMPT:true}
      log-response-excerpt: ${OSWL_AI_DEBUG_LOG_RESPONSE:true}
  scan-api:
    # Failed submitter password / user checks per project+email within the window
    auth-failure-max-attempts: ${OSWL_SCAN_AUTH_FAILURE_MAX:10}
    auth-failure-window-seconds: ${OSWL_SCAN_AUTH_FAILURE_WINDOW_SEC:900}
    # Total POST /api/scan attempts per project+email per minute
    request-max-per-minute: ${OSWL_SCAN_REQUEST_MAX_PER_MIN:30}
  audit:
    # Maximum number of records returned per page in the audit log API
    max-page-size: ${OSWL_AUDIT_MAX_PAGE_SIZE:200}
    # Audit log records older than this many months are automatically deleted
    retention-months: ${OSWL_AUDIT_RETENTION_MONTHS:6}

