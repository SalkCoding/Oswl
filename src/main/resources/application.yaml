spring:
  application:
    name: oswl
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  messages:
    basename: messages
    encoding: UTF-8
    use-code-as-default-message: false
    fallback-to-system-locale: false

  jackson:
    default-property-inclusion: non_null


server:
  port: 8080
  address: 0.0.0.0   # bind to IPv4 only (avoids ::1 / IPv6 loopback in logs)

oswl:
  encryption:
    # REQUIRED in production. Generate with: openssl rand -base64 32
    # Set via environment variable: OSWL_ENCRYPTION_KEY
    key: ${OSWL_ENCRYPTION_KEY:}
  clone:
    # Directory for temporary git clones during Quick Import.
    # Defaults to system temp directory if left blank.
    temp-dir: ${OSWL_CLONE_TEMP_DIR:}
  github:
    # Override to use GitHub Enterprise Server. E.g. https://github.example.com/api/v3
    api-base: ${OSWL_GITHUB_API_BASE:https://api.github.com}
  risk-trend:
    # Maximum number of recent scans shown in the risk trend chart
    limit: ${OSWL_RISK_TREND_LIMIT:10}
  ai:
    prompts:
      locale: ${OSWL_AI_PROMPTS_LOCALE:en}
      # location: file:./config/ai-prompts.properties
    enrichment:
      cve-limit: ${OSWL_AI_CVE_LIMIT:10}
      license-limit: ${OSWL_AI_LICENSE_LIMIT:8}
  audit:
    # Maximum number of records returned per page in the audit log API
    max-page-size: ${OSWL_AUDIT_MAX_PAGE_SIZE:200}
    # Audit log records older than this many months are automatically deleted
    retention-months: ${OSWL_AUDIT_RETENTION_MONTHS:6}

