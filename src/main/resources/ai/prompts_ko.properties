# OsWL AI prompt templates (Korean overlay — keys here override prompts.properties when oswl.ai.prompts.locale=ko)

# ── Model parameters ─────────────────────────────────────────────────
params.temperature=0.15
params.maxTokens=1200

# ── System ───────────────────────────────────────────────────────────
system.default=당신은 개발팀을 위한 소프트웨어 공급망 보안 트리아지를 수행하는 시니어 애플리케이션 보안 엔지니어입니다.\n규칙:\n- 사용자 메시지에 제공된 데이터만 사용하세요. CVE ID, 점수, 라이선스 조건을 지어내지 마세요.\n- fixVersion이 있으면 구체적인 업그레이드 권장을 포함하세요.\n- 일반적인 경고보다 실행 가능한 다음 단계를 우선하세요.\n- 배치 작업은 요청된 JSON 스키마만 반환하세요.\n- 모든 응답은 한국어로 작성하세요.\n- 간결하지만 구체적으로 작성하세요.

system.openai=당신은 시니어 애플리케이션 보안 엔지니어입니다. 배치 작업은 마크다운 없이 유효한 JSON만 반환하세요. 제공된 필드만 사용하고 간결하게 한국어로 작성하세요.

system.anthropic=당신은 공급망 위험을 트리아지하는 시니어 애플리케이션 보안 엔지니어입니다. 배치 작업은 JSON 배열만 출력하고 코드 블록으로 감싸지 마세요. 한국어로 응답하세요.

system.gemini=당신은 시니어 애플리케이션 보안 엔지니어입니다. 배치 응답은 단일 JSON 배열만 반환하고 추가 설명은 금지합니다. 한국어로 작성하세요.

system.local=당신은 시니어 애플리케이션 보안 엔지니어입니다. 배치 작업은 마크다운 없이 유효한 JSON만 반환하세요. 한국어로 작성하세요.

# ── Single-item prompts ──────────────────────────────────────────────
cve.single={cveId} (심각도: {severity}, CVSS: {cvssScore}) — 컴포넌트 {component}.\n제목: {title}\nOSV 요약: {osvSummary}\n수정 버전: {fixVersion}\nCWE: {cweId}\nCVSS 벡터: {cvssVector}\n의존성: {dependencyType}\n패치 가능: {patchability}\n\n2-3문장으로: (1) 개발자 관점 실무 영향, (2) 악용 가능성, (3) 버전 포함 권장 조치.

cve.single.withType={cveId} (심각도: {severity}, CVSS: {cvssScore}, 유형: {cveType}) — 컴포넌트 {component}.\n제목: {title}\nOSV 요약: {osvSummary}\n수정 버전: {fixVersion}\nCWE: {cweId}\n의존성: {dependencyType}\n\n2-3문장으로: 영향, 악용 가능성, 권장 조치.

security.trend=프로젝트 '{projectName}', 버전 [{recentVersions}]: 보안 이슈 {securityDelta}건 {securityDirection}.\n\n변경 상세:\n{changeDetails}\n\n2-3문장: 트렌드 해석, 새로운 주요 위험, 우선 조치 1개.

license.trend=프로젝트 '{projectName}', 버전 [{recentVersions}]: 라이선스 위험 컴포넌트 {licenseDelta}건 {licenseDirection}.\n\n변경 상세:\n{changeDetails}\n\n2-3문장: 컴플라이언스 트렌드, 새 위험 라이선스/컴포넌트, 구체 액션 1개.

license.single=라이선스 '{licenseName}' (상태: {licenseStatus}) — 컴포넌트 '{component}' ({ecosystem}, {dependencyType}). 최신 버전: {latestVersion}.\n\n상용 제품 기준 컴플라이언스 위험을 2-3문장으로 설명하고 권장 조치 1개를 제시하세요.

security.posture=프로젝트 '{projectName}' 스캔 현황:\n- 컴포넌트: {totalComponents}개\n- CVE — Critical: {critical}, High: {high}, Medium: {medium}, Low: {low}\n- 패치 가능 라이브러리: {patchableCount}, 불가: {nonPatchableCount}\n- Critical/High CVE가 있는 직접 의존성: {directCriticalHigh}개\n주요 이슈:\n{topIssues}\n\n보안 포스처 2-3문장 요약과 최우선 조치 1개.

version.diff=프로젝트 '{projectName}' '{fromVersion}' → '{toVersion}':\n- 추가 {added}, 제거 {removed}, 업데이트 {updated}, 신규 위협 {newThreats}\n\n주요 변경:\n{threatDetails}\n\n2-3문장: 릴리스 보안 영향과 긴급 후속 조치.

test.connection=OK라는 단어만 응답하세요.

# ── Batch prompts (enrichment) ───────────────────────────────────────
batch.cve.header=프로젝트 배포 맥락: {deploymentProfile}.\n아래 항목마다 제공된 필드만 사용해 트리아지 노트를 작성하세요.\nJSON 배열만 반환 (마크다운 금지):\n[{"id":"...","summary":"영향 한 문장","recommendedAction":"구체 조치","priority":"P0|P1|P2|P3"}]\n\n항목:\n
batch.cve.item={index}. id={id} component={component} severity={severity} cvss={cvssScore} epss={epss} kev={kevListed} title={title} osvSummary={osvSummary} fixVersion={fixVersion} cwe={cweId} vector={cvssVector} dependency={dependencyType} patchability={patchability}

batch.license.header=아래 라이선스 항목의 상용 제품 컴플라이언스 위험을 평가하세요.\nJSON 배열만 반환:\n[{"id":"...","summary":"위험 한 문장","recommendedAction":"구체 조치","priority":"P0|P1|P2|P3"}]\n\n항목:\n
batch.license.item={index}. id={id} license={licenseName} status={licenseStatus} policyReason={policyReason} component={component} ecosystem={ecosystem} dependency={dependencyType} latestVersion={latestVersion}
