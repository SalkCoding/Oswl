# OsWL AI prompt templates (English default)
# Placeholders: {name} — replaced at runtime by AiPromptTemplateService

# ── Model parameters ─────────────────────────────────────────────────
params.temperature=0.15
params.maxTokens=1200

# ── System ───────────────────────────────────────────────────────────
system.default=You are a senior application security engineer triaging software supply chain findings for a development team.\nRules:\n- Use ONLY the data provided in the user message. Do not invent CVE IDs, scores, or license terms.\n- When fixVersion is present, include a concrete upgrade recommendation.\n- Prefer actionable next steps over generic warnings.\n- For batch tasks, return ONLY valid JSON matching the requested schema.\n- Be concise but specific.

# ── Single-item prompts ──────────────────────────────────────────────
cve.single=Assess {cveId} (severity: {severity}, CVSS: {cvssScore}) in component {component}.\nTitle: {title}\nOSV summary: {osvSummary}\nFix version: {fixVersion}\nCWE: {cweId}\nCVSS vector: {cvssVector}\nDependency: {dependencyType}\nPatchability: {patchability}\n\nIn 2-3 short sentences: (1) practical impact for developers, (2) exploitability hint, (3) recommended action with version if available.

cve.single.withType=Assess {cveId} (severity: {severity}, CVSS: {cvssScore}, type: {cveType}) in component {component}.\nTitle: {title}\nOSV summary: {osvSummary}\nFix version: {fixVersion}\nCWE: {cweId}\nDependency: {dependencyType}\n\nIn 2-3 short sentences: impact, exploitability, and recommended action.

security.trend=Project '{projectName}' across versions [{recentVersions}]: security issues {securityDirection} by {securityDelta}.\n\nChange details:\n{changeDetails}\n\nWrite 2-3 sentences: trend interpretation, biggest new risks if any, and ONE prioritized remediation action.

license.trend=Project '{projectName}' across versions [{recentVersions}]: license-risk components {licenseDirection} by {licenseDelta}.\n\nChange details:\n{changeDetails}\n\nWrite 2-3 sentences: compliance trend, newly risky licenses/components, and ONE concrete compliance action.

license.single=License '{licenseName}' (status: {licenseStatus}) on component '{component}' ({ecosystem}, {dependencyType}). Latest version info: {latestVersion}.\n\nExplain compliance risk for a commercial product in 2-3 sentences and state ONE recommended action (approve, review with legal, replace, or isolate).

security.posture=Project '{projectName}' scan snapshot:\n- Components: {totalComponents}\n- CVEs — Critical: {critical}, High: {high}, Medium: {medium}, Low: {low}\n- Patchable libraries: {patchableCount}, Non-patchable: {nonPatchableCount}\n- Direct dependencies with Critical/High CVEs: {directCriticalHigh}\nTop issues:\n{topIssues}\n\nSummarize security posture in 2-3 sentences and name the single highest-priority action.

version.diff=Project '{projectName}' changed from '{fromVersion}' to '{toVersion}':\n- Added: {added}, Removed: {removed}, Updated: {updated}, New threats: {newThreats}\n\nNotable changes:\n{threatDetails}\n\nIn 2-3 sentences: security impact of this release and the most urgent follow-up.

test.connection=Reply with only the word OK.

# ── Batch prompts (enrichment) ───────────────────────────────────────
batch.cve.header=For each item below, produce a triage note using ONLY the provided fields.\nReturn ONLY a JSON array with no markdown or extra text:\n[{"id":"...","summary":"impact in one sentence","recommendedAction":"concrete next step","priority":"P0|P1|P2|P3"}]\n\nItems:\n
batch.cve.item={index}. id={id} component={component} severity={severity} cvss={cvssScore} title={title} osvSummary={osvSummary} fixVersion={fixVersion} cwe={cweId} vector={cvssVector} dependency={dependencyType} patchability={patchability}

batch.license.header=For each license item below, assess compliance risk for a commercial product using ONLY the provided data.\nReturn ONLY a JSON array:\n[{"id":"...","summary":"risk in one sentence","recommendedAction":"concrete next step","priority":"P0|P1|P2|P3"}]\n\nItems:\n
batch.license.item={index}. id={id} license={licenseName} status={licenseStatus} component={component} ecosystem={ecosystem} dependency={dependencyType} latestVersion={latestVersion}
