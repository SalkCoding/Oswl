<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tab"
     x-data="adminTab()"
     x-init="init()"
     class="flex flex-col gap-[24px]">

    <!-- API Error Banner -->
    <div x-show="apiError" x-cloak
         class="bg-red-50 border border-red-200 rounded-[8px] px-[16px] py-[12px] flex items-center gap-[10px]">
        <span class="text-red-600 text-[13px]" x-text="apiError"></span>
        <a href="/login" class="ml-auto text-[12px] text-red-700 underline">다시 로그인</a>
    </div>

    <!-- Sub-tabs -->
    <div class="flex items-center gap-[4px] bg-white border border-[var(--grayscale-20)] rounded-[10px] p-[4px] w-fit">
        <button @click="subTab='users'" :class="subTab==='users' ? 'bg-[var(--secondary-100)] text-white' : 'text-[var(--grayscale-70)] hover:text-[var(--grayscale-100)]'"
                class="px-[14px] py-[8px] rounded-[8px] text-[13px] font-semibold transition-colors">사용자 관리</button>
        <button @click="subTab='templates'" :class="subTab==='templates' ? 'bg-[var(--secondary-100)] text-white' : 'text-[var(--grayscale-70)] hover:text-[var(--grayscale-100)]'"
                class="px-[14px] py-[8px] rounded-[8px] text-[13px] font-semibold transition-colors">권한 템플릿</button>
        <button @click="subTab='audit'; loadAudit()" :class="subTab==='audit' ? 'bg-[var(--secondary-100)] text-white' : 'text-[var(--grayscale-70)] hover:text-[var(--grayscale-100)]'"
                class="px-[14px] py-[8px] rounded-[8px] text-[13px] font-semibold transition-colors">감사 로그</button>
    </div>

    <!-- USERS -->
    <div x-show="subTab==='users'" x-cloak class="bg-white border border-[var(--grayscale-20)] rounded-[12px] p-[24px] flex flex-col gap-[16px]">
        <div class="flex items-center justify-between">
            <h2 class="font-bold text-[18px] text-[var(--grayscale-100)]">사용자 관리</h2>
            <button @click="openInvite=true" class="bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white text-[13px] font-semibold px-[14px] py-[8px] rounded-[8px]">+ 사용자 초대</button>
        </div>
        <table class="w-full text-[13px]">
            <thead>
            <tr class="text-left text-[12px] text-[var(--grayscale-60)] border-b border-[var(--grayscale-20)]">
                <th class="py-[8px] font-semibold">이름</th>
                <th class="py-[8px] font-semibold">이메일</th>
                <th class="py-[8px] font-semibold">역할</th>
                <th class="py-[8px] font-semibold">상태</th>
                <th class="py-[8px] font-semibold w-[160px]">작업</th>
            </tr>
            </thead>
            <tbody>
            <template x-for="u in users" :key="u.id">
                <tr class="border-b border-[var(--grayscale-10)]">
                    <td class="py-[10px]">
                        <span x-text="u.displayName"></span>
                        <span x-show="u.superAdmin" class="ml-[4px] text-amber-500" title="최고 관리자">★</span>
                    </td>
                    <td class="py-[10px]" x-text="u.email"></td>
                    <td class="py-[10px]">
                        <span x-show="u.superAdmin" class="text-[12px] text-[var(--grayscale-50)]">최고 관리자</span>
                        <span x-show="!u.superAdmin" x-text="(u.roleTemplates||[]).map(r=>r.name).join(', ') || '—'"></span>
                    </td>
                    <td class="py-[10px]">
                        <span :class="u.enabled ? 'text-emerald-600' : 'text-[var(--grayscale-50)]'" x-text="u.enabled ? '활성' : '비활성'"></span>
                    </td>
                    <td class="py-[10px]">
                        <button x-show="!u.superAdmin" @click="editUser(u)" class="text-[12px] text-[var(--secondary-100)] hover:underline mr-[8px]">권한</button>
                        <button x-show="!u.superAdmin && u.enabled" @click="toggleEnabled(u, false)" class="text-[12px] text-red-600 hover:underline">비활성화</button>
                        <button x-show="!u.superAdmin && !u.enabled" @click="toggleEnabled(u, true)" class="text-[12px] text-emerald-600 hover:underline">활성화</button>
                    </td>
                </tr>
            </template>
            <tr x-show="users.length===0"><td colspan="5" class="py-[24px] text-center text-[var(--grayscale-50)]">사용자가 없습니다.</td></tr>
            </tbody>
        </table>
    </div>

    <!-- TEMPLATES -->
    <div x-show="subTab==='templates'" x-cloak class="bg-white border border-[var(--grayscale-20)] rounded-[12px] p-[24px] flex flex-col gap-[16px]">
        <div class="flex items-center justify-between">
            <h2 class="font-bold text-[18px]">권한 템플릿 관리</h2>
            <button @click="openTemplate(null)" class="bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white text-[13px] font-semibold px-[14px] py-[8px] rounded-[8px]">+ 새 템플릿</button>
        </div>
        <table class="w-full text-[13px]">
            <thead>
            <tr class="text-left text-[12px] text-[var(--grayscale-60)] border-b border-[var(--grayscale-20)]">
                <th class="py-[8px]">템플릿</th>
                <th class="py-[8px]">설명</th>
                <th class="py-[8px]">사용자</th>
                <th class="py-[8px] w-[140px]">작업</th>
            </tr>
            </thead>
            <tbody>
            <template x-for="t in templates" :key="t.id">
                <tr class="border-b border-[var(--grayscale-10)]">
                    <td class="py-[10px]">
                        <span x-show="t.builtIn" class="mr-[4px]" title="기본 제공">🔒</span>
                        <span x-text="t.name" class="font-semibold"></span>
                    </td>
                    <td class="py-[10px]" x-text="t.description"></td>
                    <td class="py-[10px]" x-text="t.userCount + '명'"></td>
                    <td class="py-[10px]">
                        <button @click="openTemplate(t)" class="text-[12px] text-[var(--secondary-100)] hover:underline mr-[8px]">편집</button>
                        <button x-show="!t.builtIn" @click="deleteTemplate(t)" class="text-[12px] text-red-600 hover:underline">삭제</button>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <p class="text-[11px] text-[var(--grayscale-50)]">* 기본 제공(🔒) 템플릿은 삭제 불가, 수정은 가능합니다.</p>
    </div>

    <!-- AUDIT -->
    <div x-show="subTab==='audit'" x-cloak class="bg-white border border-[var(--grayscale-20)] rounded-[12px] p-[24px] flex flex-col gap-[16px]">
        <div class="flex items-center justify-between">
            <h2 class="font-bold text-[18px]">감사 로그</h2>
            <a href="/api/admin/audit-logs/export.csv" class="text-[13px] text-[var(--secondary-100)] hover:underline">📥 CSV 내보내기</a>
        </div>
        <div class="flex items-end gap-[8px] flex-wrap">
            <input type="text" x-model="auditFilter.actorEmail" placeholder="사용자 이메일" class="px-[10px] py-[6px] border rounded-[6px] text-[13px]"/>
            <input type="text" x-model="auditFilter.action" placeholder="행동 키워드" class="px-[10px] py-[6px] border rounded-[6px] text-[13px]"/>
            <button @click="loadAudit()" class="bg-[var(--grayscale-100)] text-white text-[12px] font-semibold px-[12px] py-[6px] rounded-[6px]">검색</button>
        </div>
        <table class="w-full text-[13px]">
            <thead>
            <tr class="text-left text-[12px] text-[var(--grayscale-60)] border-b border-[var(--grayscale-20)]">
                <th class="py-[8px]">시각</th>
                <th class="py-[8px]">사용자</th>
                <th class="py-[8px]">행동</th>
                <th class="py-[8px]">대상</th>
            </tr>
            </thead>
            <tbody>
            <template x-for="l in auditLogs" :key="l.id">
                <tr class="border-b border-[var(--grayscale-10)]">
                    <td class="py-[8px]" x-text="(l.createdAt||'').replace('T',' ')"></td>
                    <td class="py-[8px]" x-text="l.actorEmail"></td>
                    <td class="py-[8px]" x-text="l.action"></td>
                    <td class="py-[8px]" x-text="(l.targetType||'') + (l.targetName ? ' / '+l.targetName : '')"></td>
                </tr>
            </template>
            <tr x-show="auditLogs.length===0"><td colspan="4" class="py-[24px] text-center text-[var(--grayscale-50)]">기록 없음</td></tr>
            </tbody>
        </table>
    </div>

    <!-- INVITE MODAL -->
    <div x-show="openInvite" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="openInvite=false">
        <div class="bg-white rounded-[12px] p-[24px] w-[460px] max-w-[90vw] flex flex-col gap-[14px]">
            <h3 class="font-bold text-[16px]">새 사용자 초대</h3>
            <label class="flex flex-col gap-[4px] text-[12px]">이메일<input type="email" x-model="invite.email" class="px-[10px] py-[8px] border rounded-[6px] text-[13px]"/></label>
            <label class="flex flex-col gap-[4px] text-[12px]">표시 이름<input type="text" x-model="invite.displayName" class="px-[10px] py-[8px] border rounded-[6px] text-[13px]"/></label>
            <label class="flex flex-col gap-[4px] text-[12px]">임시 비밀번호 (8자 이상)
                <div class="flex gap-[6px]">
                    <input type="text" x-model="invite.temporaryPassword" class="flex-1 px-[10px] py-[8px] border rounded-[6px] text-[13px]"/>
                    <button @click="invite.temporaryPassword=randomPwd()" class="text-[12px] px-[10px] border rounded-[6px]">자동생성</button>
                </div>
            </label>
            <div class="flex flex-col gap-[6px] text-[12px]">
                <span class="font-semibold text-[var(--grayscale-80)]">권한 템플릿 (복수 선택)</span>
                <div class="flex flex-wrap gap-[8px]">
                    <template x-for="t in templates" :key="t.id">
                        <label class="inline-flex items-center gap-[4px] text-[12px]">
                            <input type="checkbox" :value="t.id" x-model="invite.templateIds" class="w-[14px] h-[14px]"/>
                            <span x-text="t.name"></span>
                        </label>
                    </template>
                </div>
            </div>
            <div class="flex justify-end gap-[8px] mt-[8px]">
                <button @click="openInvite=false" class="text-[13px] px-[14px] py-[8px]">취소</button>
                <button @click="submitInvite()" class="bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white text-[13px] font-semibold px-[14px] py-[8px] rounded-[8px]">초대</button>
            </div>
        </div>
    </div>

    <!-- USER ROLES MODAL -->
    <div x-show="openRoleEdit" x-cloak class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="openRoleEdit=false">
        <div class="bg-white rounded-[12px] p-[24px] w-[460px] max-w-[90vw] flex flex-col gap-[14px]">
            <h3 class="font-bold text-[16px]">권한 수정 — <span x-text="editingUser?.displayName"></span></h3>
            <div class="flex flex-wrap gap-[8px]">
                <template x-for="t in templates" :key="t.id">
                    <label class="inline-flex items-center gap-[4px] text-[12px]">
                        <input type="checkbox" :value="t.id" x-model="editingTemplateIds" class="w-[14px] h-[14px]"/>
                        <span x-text="t.name"></span>
                    </label>
                </template>
            </div>
            <div class="flex justify-end gap-[8px] mt-[8px]">
                <button @click="openRoleEdit=false" class="text-[13px] px-[14px] py-[8px]">취소</button>
                <button @click="saveRoles()" class="bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white text-[13px] font-semibold px-[14px] py-[8px] rounded-[8px]">저장</button>
            </div>
        </div>
    </div>

    <!-- TEMPLATE EDIT SLIDEOUT -->
    <div x-show="openTplEdit" x-cloak class="fixed inset-0 bg-black/40 z-50" @click.self="openTplEdit=false">
        <div class="absolute right-0 top-0 h-full w-[480px] max-w-[95vw] bg-white shadow-2xl p-[24px] flex flex-col gap-[14px] overflow-y-auto">
            <h3 class="font-bold text-[16px]" x-text="editingTpl?.id ? '템플릿 편집' : '새 템플릿'"></h3>
            <label class="flex flex-col gap-[4px] text-[12px]">이름<input type="text" x-model="tplForm.name" class="px-[10px] py-[8px] border rounded-[6px] text-[13px]"/></label>
            <label class="flex flex-col gap-[4px] text-[12px]">설명<input type="text" x-model="tplForm.description" class="px-[10px] py-[8px] border rounded-[6px] text-[13px]"/></label>
            <div class="flex flex-col gap-[8px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)]">권한</span>
                <div class="flex flex-col gap-[4px] max-h-[400px] overflow-y-auto pr-[6px]">
                    <template x-for="p in allPermissions" :key="p.code">
                        <label class="inline-flex items-center gap-[6px] text-[12px] py-[2px]">
                            <input type="checkbox" :value="p.code" x-model="tplForm.permissions" class="w-[14px] h-[14px]"/>
                            <span class="font-mono text-[var(--grayscale-50)] text-[10px]" x-text="p.code"></span>
                            <span x-text="p.description"></span>
                        </label>
                    </template>
                </div>
            </div>
            <div class="flex justify-end gap-[8px] mt-auto pt-[12px] border-t">
                <button @click="openTplEdit=false" class="text-[13px] px-[14px] py-[8px]">취소</button>
                <button @click="saveTemplate()" class="bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white text-[13px] font-semibold px-[14px] py-[8px] rounded-[8px]">저장</button>
            </div>
        </div>
    </div>

    <script>
    function adminTab() {
        return {
            subTab: 'users',
            users: [], templates: [], allPermissions: [],
            openInvite: false, openRoleEdit: false, openTplEdit: false,
            apiError: null,
            invite: { email: '', displayName: '', temporaryPassword: '', templateIds: [] },
            editingUser: null, editingTemplateIds: [],
            editingTpl: null, tplForm: { name: '', description: '', permissions: [] },
            auditFilter: { actorEmail: '', action: '' },
            auditLogs: [],
            csrf: document.cookie.split('; ').find(r=>r.startsWith('XSRF-TOKEN='))?.split('=')[1] || '',
            async init() {
                try {
                    await Promise.all([this.loadUsers(), this.loadTemplates(), this.loadPermissions()]);
                } catch(e) {
                    this.apiError = e.message || '데이터를 불러오지 못했습니다. 로그인 세션을 확인하세요.';
                }
            },
            headers() { return { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': decodeURIComponent(this.csrf) }; },
            async apiGet(url) {
                const r = await fetch(url);
                if (r.status === 401) { location.href = '/login'; throw new Error('Unauthorized'); }
                if (!r.ok) throw new Error(`API 오류 ${r.status}: ${url}`);
                return r.json();
            },
            async loadUsers() { this.users = await this.apiGet('/api/admin/users'); },
            async loadTemplates() { this.templates = await this.apiGet('/api/admin/role-templates'); },
            async loadPermissions() { this.allPermissions = await this.apiGet('/api/admin/role-templates/permissions'); },
            randomPwd() { return Math.random().toString(36).slice(-12) + 'A1!'; },
            async submitInvite() {
                const r = await fetch('/api/admin/users', { method: 'POST', headers: this.headers(), body: JSON.stringify(this.invite) });
                if (r.status === 401) { location.href = '/login'; return; }
                if (!r.ok) { alert('실패: ' + await r.text()); return; }
                this.openInvite = false;
                this.invite = { email: '', displayName: '', temporaryPassword: '', templateIds: [] };
                await this.loadUsers();
            },
            editUser(u) { this.editingUser = u; this.editingTemplateIds = (u.roleTemplates||[]).map(r=>r.id); this.openRoleEdit = true; },
            async saveRoles() {
                const r = await fetch(`/api/admin/users/${this.editingUser.id}/roles`, { method: 'PUT', headers: this.headers(), body: JSON.stringify({ templateIds: this.editingTemplateIds }) });
                if (r.status === 401) { location.href = '/login'; return; }
                if (!r.ok) { alert('실패'); return; }
                this.openRoleEdit = false; await this.loadUsers();
            },
            async toggleEnabled(u, enabled) {
                const url = `/api/admin/users/${u.id}/${enabled ? 'activate' : 'deactivate'}`;
                const r = await fetch(url, { method: 'PUT', headers: this.headers() });
                if (r.status === 401) { location.href = '/login'; return; }
                await this.loadUsers();
            },
            openTemplate(t) {
                this.editingTpl = t;
                this.tplForm = t ? { name: t.name, description: t.description||'', permissions: [...(t.permissions||[])] }
                                 : { name: '', description: '', permissions: [] };
                this.openTplEdit = true;
            },
            async saveTemplate() {
                const url = this.editingTpl?.id ? `/api/admin/role-templates/${this.editingTpl.id}` : '/api/admin/role-templates';
                const method = this.editingTpl?.id ? 'PUT' : 'POST';
                const r = await fetch(url, { method, headers: this.headers(), body: JSON.stringify(this.tplForm) });
                if (r.status === 401) { location.href = '/login'; return; }
                if (!r.ok) { alert('실패: ' + await r.text()); return; }
                this.openTplEdit = false; await this.loadTemplates();
            },
            async deleteTemplate(t) {
                if (!confirm(`'${t.name}' 템플릿을 삭제할까요?`)) return;
                const r = await fetch(`/api/admin/role-templates/${t.id}`, { method: 'DELETE', headers: this.headers() });
                if (r.status === 401) { location.href = '/login'; return; }
                if (!r.ok) { alert('실패: ' + await r.text()); return; }
                await this.loadTemplates();
            },
            async loadAudit() {
                const params = new URLSearchParams();
                if (this.auditFilter.actorEmail) params.set('actorEmail', this.auditFilter.actorEmail);
                if (this.auditFilter.action) params.set('action', this.auditFilter.action);
                try {
                    const r = await fetch('/api/admin/audit-logs?' + params.toString());
                    if (r.status === 401) { location.href = '/login'; return; }
                    if (!r.ok) { this.apiError = `감사 로그 조회 실패 (${r.status})`; return; }
                    const data = await r.json();
                    this.auditLogs = data.content || [];
                } catch(e) { this.apiError = '감사 로그를 불러오지 못했습니다.'; }
            }
        };
    }
    </script>
</div>
</body>
</html>
