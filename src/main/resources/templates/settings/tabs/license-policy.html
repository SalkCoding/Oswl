<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tab"
     x-data="licensePolicyTab()"
     x-init="load()"
     class="flex flex-col gap-[20px]">

    <div class="flex flex-col gap-[4px]">
        <h2 class="font-bold text-[20px] text-[var(--grayscale-100)] tracking-[-0.2px]">License Policy</h2>
        <p class="font-normal text-[14px] text-[var(--grayscale-60)] tracking-[-0.14px] leading-[1.3]">
            Map SPDX license identifiers to Permitted, Caution, Restricted, or Unknown classifications used during scans.
        </p>
    </div>

    <div x-show="apiError" x-cloak
         class="bg-red-50 border border-red-200 rounded-[8px] px-[16px] py-[12px] text-red-700 text-[13px]" x-text="apiError"></div>

    <div class="bg-white border border-[var(--grayscale-20)] rounded-[10px] overflow-hidden">
        <table class="w-full text-[13px]">
            <thead>
            <tr class="text-left text-[12px] text-[var(--grayscale-70)] border-b border-[var(--grayscale-20)] bg-[var(--grayscale-5)]">
                <th class="px-[16px] py-[12px] font-bold">SPDX ID</th>
                <th class="px-[16px] py-[12px] font-bold">Status</th>
                <th class="px-[16px] py-[12px] font-bold w-[160px]">Action</th>
            </tr>
            </thead>
            <tbody>
            <template x-for="entry in entries" :key="entry.spdxId">
                <tr class="border-b border-[var(--grayscale-10)] last:border-b-0 hover:bg-[var(--grayscale-5)]">
                    <td class="px-[16px] py-[12px] font-mono text-[12px]" x-text="entry.spdxId"></td>
                    <td class="px-[16px] py-[12px]">
                        <select x-model="entry.status" class="border border-[var(--grayscale-20)] rounded-[6px] px-[8px] py-[4px] text-[12px]">
                            <option value="PERMITTED">Permitted</option>
                            <option value="CAUTION">Caution</option>
                            <option value="RESTRICTED">Restricted</option>
                            <option value="UNKNOWN">Unknown</option>
                        </select>
                    </td>
                    <td class="px-[16px] py-[12px]">
                        <button type="button" @click="save(entry)"
                                class="text-[12px] font-semibold text-[var(--primary-120)] hover:underline">
                            Save
                        </button>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
    </div>

    <script>
    function licensePolicyTab() {
        return {
            entries: [],
            apiError: null,
            csrf: document.cookie.split('; ').find(r=>r.startsWith('XSRF-TOKEN='))?.split('=')[1] || '',
            headers() { return { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': decodeURIComponent(this.csrf) }; },
            async load() {
                try {
                    const r = await fetch('/api/settings/license-policy');
                    if (r.status === 401) { location.href = '/login'; return; }
                    if (!r.ok) { this.apiError = _fetchErr(r, 'Failed to load license policy.'); return; }
                    this.entries = await r.json();
                } catch(e) { this.apiError = 'Failed to load license policy.'; }
            },
            async save(entry) {
                this.apiError = null;
                const encoded = encodeURIComponent(entry.spdxId);
                const r = await fetch('/api/settings/license-policy/' + encoded, {
                    method: 'PUT', headers: this.headers(), body: JSON.stringify({ status: entry.status })
                });
                if (r.status === 401) { location.href = '/login'; return; }
                if (!r.ok) { this.apiError = _fetchErr(r, 'Failed to update entry.'); return; }
            }
        };
    }
    </script>
</div>
</body>
</html>
