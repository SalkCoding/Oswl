<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Settings')}">
    <script>
        // 설정 페이지 최초 진입 시 이전 URL 저장 (탭 이동해도 덮어쓰지 않음)
        (function () {
            const ref = document.referrer;
            if (!ref.includes('/settings')) {
                sessionStorage.setItem('oswl_settings_back', ref || '/projects');
            }
        })();
    </script>
</head>
<body class="flex flex-col min-h-screen bg-[var(--grayscale-5)]">

<header th:replace="~{fragments/topbar :: simple-topbar('Settings')}"></header>

<main class="w-full flex flex-col gap-[24px] mt-[32px] pb-[80px] px-[60px] max-w-[1440px] mx-auto">

    <div class="flex items-center justify-between">
        <div class="flex items-center gap-[12px]">
            <a href="javascript:void(0)"
               onclick="location.href = sessionStorage.getItem('oswl_settings_back') || '/projects'"
               class="inline-flex items-center gap-[6px] text-[13px] text-[var(--grayscale-60)] hover:text-[var(--grayscale-100)] font-medium tracking-[-0.13px] transition-colors no-underline">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Back
            </a>
        </div>
        <div class="text-[13px] text-[var(--grayscale-60)]"
             sec:authorize="isAuthenticated()">
            <span th:text="${#authentication != null ? #authentication.getPrincipal().displayName : ''}">User</span>
            <span class="text-[var(--grayscale-40)]"> · </span>
            <span th:text="${#authentication != null ? #authentication.getPrincipal().username : ''}">email</span>
            <span class="ml-[12px]">
                <form th:action="@{/logout}" method="post" class="inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="text-[13px] text-[var(--secondary-100)] hover:underline">로그아웃</button>
                </form>
            </span>
        </div>
    </div>

    <h1 class="font-extrabold text-[28px] tracking-[-0.28px] text-[var(--grayscale-100)]">설정</h1>

    <!-- Tabs -->
    <div th:if="${not #lists.isEmpty(accessibleTabs)}"
         class="flex items-center gap-[2px] border-b border-[var(--grayscale-20)]">
        <a th:each="t : ${accessibleTabs}"
           th:href="@{/settings(tab=${t.key})}"
           th:classappend="${t.key == activeTab} ? 'border-[var(--secondary-100)] text-[var(--secondary-100)]' : 'border-transparent text-[var(--grayscale-60)] hover:text-[var(--grayscale-100)]'"
           class="inline-flex items-center gap-[8px] px-[16px] py-[12px] text-[14px] font-semibold tracking-[-0.14px] border-b-[2px] transition-colors no-underline">
            <span th:text="${t.icon}">🔐</span>
            <span th:text="${t.label}">탭</span>
        </a>
    </div>

    <div th:if="${#lists.isEmpty(accessibleTabs)}"
         class="bg-white border border-[var(--grayscale-20)] rounded-[10px] p-[40px] text-center text-[14px] text-[var(--grayscale-60)]">
        접근 가능한 설정이 없습니다. 관리자에게 문의하세요.
    </div>

    <!-- Tab content -->
    <div class="w-full">
        <th:block th:if="${activeTab == 'admin'}"><div th:replace="~{settings/tabs/admin :: tab}"></div></th:block>
        <th:block th:if="${activeTab == 'ai'}"><div th:replace="~{settings/tabs/ai :: tab}"></div></th:block>
        <th:block th:if="${activeTab == 'vcs'}"><div th:replace="~{settings/tabs/vcs :: tab}"></div></th:block>
        <th:block th:if="${activeTab == 'cli'}"><div th:replace="~{settings/tabs/cli :: tab}"></div></th:block>
        <th:block th:if="${activeTab == 'cache'}"><div th:replace="~{settings/tabs/cache :: tab}"></div></th:block>
    </div>

</main>

</body>
</html>
