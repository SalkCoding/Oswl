<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Security Center component list table -->
<div th:fragment="table" class="flex flex-col w-full" style="min-width: 1010px;">

    <!-- Table Header / Description Bar -->
    <div class="flex items-center w-full bg-[var(--grayscale-5)] border-y border-[var(--grayscale-20)] sticky top-0 z-10">
        <div class="flex h-[40px] items-center justify-center w-[60px] min-w-[60px]">
            <label class="cursor-pointer relative flex items-center justify-center p-2">
                <input type="checkbox" class="sr-only" x-model="selectAll" @change="toggleSelectAll()">
                <div class="w-[16px] h-[16px] rounded border-[1.5px] flex items-center justify-center transition-colors"
                     :class="selectAll ? 'bg-[var(--primary-120)] border-[var(--primary-120)]' : 'border-[var(--grayscale-40)]'">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                         :class="selectAll ? 'opacity-100' : 'opacity-0'"
                         class="transition-opacity"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </label>
        </div>
        <div class="flex h-[40px] items-center justify-center w-[80px] min-w-[80px]">
            <p class="text-[12px] text-[var(--background-dark)] font-bold tracking-[-0.12px] text-center">Review</p>
        </div>
        <div class="flex flex-1 h-[40px] items-center px-[12px] min-w-[300px]">
            <p class="text-[12px] text-[var(--background-dark)] font-bold tracking-[-0.12px]">Component</p>
        </div>
        <div class="flex h-[40px] items-center px-[16px] w-[230px] min-w-[230px]">
            <p class="text-[12px] text-[var(--background-dark)] font-bold tracking-[-0.12px]">Security Issues</p>
        </div>
        <div class="flex h-[40px] items-center px-[16px] w-[140px] min-w-[140px]">
            <p class="text-[12px] text-[var(--background-dark)] font-bold tracking-[-0.12px]">Patchability</p>
        </div>
        <div class="flex h-[40px] items-center px-[16px] w-[200px] min-w-[200px]">
            <p class="text-[12px] text-[var(--background-dark)] font-bold tracking-[-0.12px]">License</p>
        </div>
    </div>

    <!-- Body -->
    <div class="flex flex-col">
        <a th:each="comp : ${components}"
           href="javascript:void(0)"
           th:attr="hx-get=@{|/projects/${projectId}/components/${comp.id}|},
                    x-data=|{ reviewed: ${comp.reviewed} }|,
                    data-comp-id=${comp.id},
                    data-comp-name=|${comp.name} ${comp.version}|,
                    data-reviewed=${comp.reviewed},
                    data-ignored=${comp.ignored},
                    data-sec-critical=${comp.securityCritical},
                    data-sec-high=${comp.securityHigh},
                    data-sec-medium=${comp.securityMedium},
                    data-sec-low=${comp.securityLow},
                    data-patchability=${comp.patchability},
                    data-license-status=${comp.licenseStatus}"
           hx-select="#component-detail-content"
           hx-target="#slideout-content"
           x-show="rowVisible($el)"
           @bulk-review.window="if($event.detail.ids.includes($el.dataset.compId)) { reviewed = $event.detail.value; $el.dataset.reviewed = String($event.detail.value); }"
           @bulk-ignore.window="if($event.detail.ids.includes($el.dataset.compId)) { $el.dataset.ignored = String($event.detail.value); }"
           @click="$dispatch('open-component-panel')"
           :class="{
               'bg-[#e5faf5]': selectedComponents.some(v => String(v) === $el.dataset.compId),
               'bg-white': !selectedComponents.some(v => String(v) === $el.dataset.compId)
           }"
           class="flex items-center w-full border-b border-[var(--grayscale-20)] hover:bg-[var(--grayscale-10)] transition-colors no-underline text-inherit cursor-pointer">

            <div class="flex h-[48px] items-center justify-center w-[60px] min-w-[60px]"
                 th:attr="data-row-id=${comp.id}"
                 @click.stop>
                <label class="cursor-pointer relative flex items-center justify-center p-2">
                    <input type="checkbox" class="sr-only"
                           x-model="selectedComponents"
                           name="selectedComponent"
                           th:value="${comp.id}">
                    <div class="w-[16px] h-[16px] rounded border-[1.5px] flex items-center justify-center transition-colors"
                         :class="selectedComponents.some(v => String(v) === $el.closest('[data-row-id]').dataset.rowId) ? 'bg-[var(--primary-120)] border-[var(--primary-120)]' : 'border-[var(--grayscale-40)]'">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                             :class="selectedComponents.some(v => String(v) === $el.closest('[data-row-id]').dataset.rowId) ? 'opacity-100' : 'opacity-0'"
                             class="transition-opacity"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                </label>
            </div>

            <div class="flex h-[48px] items-center justify-center w-[80px] min-w-[80px] cursor-pointer"
                 @click.stop="reviewed = !reviewed; $el.closest('[data-comp-id]').dataset.reviewed = String(reviewed); filterVersion++; fetch('/projects/' + document.body.dataset.projectId + '/security-center/bulk-status', {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[Number($el.closest('[data-comp-id]').dataset.compId)],reviewed:reviewed})})">
                <img x-show="reviewed" th:src="@{/icon/icon-check-circle-filled.svg}" class="w-[20px] h-[20px]" alt="" aria-hidden="true" style="display:none;">
                <img x-show="!reviewed" th:src="@{/icon/icon-check-circle.svg}" class="w-[20px] h-[20px]" alt="" aria-hidden="true" style="display:none;">
            </div>

            <div class="flex flex-1 flex-col h-[48px] justify-center px-[12px] min-w-[300px]">
                <p class="font-medium text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]"
                   th:text="${comp.name + ' ' + comp.version}">Library Name</p>
                <p class="text-[11px] text-[var(--grayscale-60)] tracking-[-0.11px] leading-[1.3]"
                   th:text="${comp.dependencyInfo}">Direct (6) + Transitive (1)</p>
            </div>

            <div class="flex h-[48px] items-center gap-[6px] px-[16px] w-[230px] min-w-[230px]">
                <span th:if="${comp.securityCritical > 0}"
                      class="h-[20px] min-w-[26px] px-[6px] flex bg-[var(--risk-critical)] rounded-[4px] items-center justify-center text-[11px] font-medium text-white tracking-[-0.11px]"
                      th:text="${comp.securityCritical >= 1000} ? ${#numbers.formatDecimal(comp.securityCritical / 1000.0, 1, 1)} + 'k' : ${comp.securityCritical}">8</span>
                <span th:if="${comp.securityHigh > 0}"
                      class="h-[20px] min-w-[26px] px-[6px] flex bg-[var(--risk-high)] rounded-[4px] items-center justify-center text-[11px] font-medium text-white tracking-[-0.11px]"
                      th:text="${comp.securityHigh >= 1000} ? ${#numbers.formatDecimal(comp.securityHigh / 1000.0, 1, 1)} + 'k' : ${comp.securityHigh}">20</span>
                <span th:if="${comp.securityMedium > 0}"
                      class="h-[20px] min-w-[26px] px-[6px] flex bg-[var(--risk-medium)] rounded-[4px] items-center justify-center text-[11px] font-medium text-white tracking-[-0.11px]"
                      th:text="${comp.securityMedium >= 1000} ? ${#numbers.formatDecimal(comp.securityMedium / 1000.0, 1, 1)} + 'k' : ${comp.securityMedium}">150</span>
                <span th:if="${comp.securityLow > 0}"
                      class="h-[20px] min-w-[26px] px-[6px] flex bg-[var(--risk-low)] rounded-[4px] items-center justify-center text-[11px] font-medium text-[var(--grayscale-50)] tracking-[-0.11px]"
                      th:text="${comp.securityLow >= 1000} ? ${#numbers.formatDecimal(comp.securityLow / 1000.0, 1, 1)} + 'k' : ${comp.securityLow}">1.1k</span>
            </div>

            <div class="flex h-[48px] items-center gap-[8px] px-[16px] w-[140px] min-w-[140px]">
                <span th:classappend="${comp.patchability == 'patchable'} ? 'bg-[var(--semantic-patchable)]'
                                       : (${comp.patchability == 'non-patchable'} ? 'bg-[var(--risk-critical)]' : 'bg-[var(--grayscale-30)]')"
                      class="w-[8px] h-[8px] rounded-full"></span>
                <p class="text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px]"
                   th:text="${comp.patchability == 'patchable'} ? 'Patchable' : (${comp.patchability == 'non-patchable'} ? 'Non-Patchable' : 'Unknown')">Patchable</p>
            </div>

            <div class="flex h-[48px] items-center gap-[8px] px-[16px] w-[200px] min-w-[200px]">
                <span th:classappend="${comp.licenseStatus == 'OK'} ? 'bg-[var(--primary-80)]'
                                        : (${comp.licenseStatus == 'WARN'} ? 'bg-[var(--semantic-caution)]' : 'bg-[var(--risk-critical)]')"
                      class="w-[8px] h-[8px] rounded-full shrink-0"></span>
                <p class="text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] truncate"
                   th:text="${comp.licenseName}" th:title="${comp.licenseName}">MIT</p>
            </div>
        </a>
    </div>

</div>

</body>
</html>
