<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Actions / Search Bar Fragment -->
<div th:fragment="actions"
     class="border-t border-[var(--grayscale-20)] flex flex-col px-[60px] py-[20px] w-full bg-white shrink-0 relative">
    <div class="flex items-center gap-[20px] w-full">
        <div class="relative" @click.outside="bulkActionsOpen = false">
            <button type="button"
                    @click="bulkActionsOpen = !bulkActionsOpen"
                    class="bg-[var(--grayscale-5)] hover:bg-[var(--grayscale-10)] border border-[var(--grayscale-30)] flex h-[32px] items-center justify-center gap-[6px] px-[14px] rounded-[8px] shrink-0 w-[120px] transition-colors"
                    :class="bulkActionsOpen ? 'bg-[var(--grayscale-10)] border-[var(--primary-120)]' : ''">
                <p class="font-medium text-[13px] text-[var(--primary-120)] text-center leading-[1.3] tracking-[-0.13px]">Bulk Actions</p>
                <svg class="w-3 h-3 text-[var(--primary-120)] transition-transform"
                     :class="bulkActionsOpen ? 'rotate-180' : ''"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <div x-show="bulkActionsOpen"
                 @click.away="bulkActionsOpen = false"
                 x-transition
                 style="display: none;"
                 class="absolute left-0 top-[44px] z-[9999] w-[180px] rounded-[8px] border border-[var(--grayscale-30)] bg-white shadow-[0px_8px_24px_rgba(0,29,53,0.08)] p-[10px]">
                <p class="text-[12px] text-[var(--grayscale-60)] font-medium tracking-[-0.12px] mb-[8px]">Apply to selected</p>
                <button type="button"
                        @click="applyBulkAction('reviewed')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    Reviewed</button>
                <button type="button"
                        @click="applyBulkAction('unreviewed')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    Unreviewed</button>
                <button type="button"
                        @click="applyBulkAction('ignore')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    Ignore</button>
                <button type="button"
                        @click="applyBulkAction('unignore')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    Unignore</button>
            </div>
        </div>
        <div class="relative" @click.outside="exportOpen = false">
            <button type="button"
                    @click="exportOpen = !exportOpen"
                    class="bg-[var(--grayscale-5)] hover:bg-[var(--grayscale-10)] border border-[var(--grayscale-30)] flex h-[32px] items-center justify-center gap-[6px] px-[14px] rounded-[8px] shrink-0 w-[104px] transition-colors"
                    :class="exportOpen ? 'bg-[var(--grayscale-10)] border-[var(--primary-120)]' : ''">
                <p class="font-medium text-[13px] text-[var(--primary-120)] text-center leading-[1.3] tracking-[-0.13px]">Export</p>
                <svg class="w-3 h-3 text-[var(--primary-120)] transition-transform"
                     :class="exportOpen ? 'rotate-180' : ''"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <div x-show="exportOpen"
                 @click.away="exportOpen = false"
                 x-transition
                 style="display: none;"
                 class="absolute left-0 top-[44px] z-[9999] w-[120px] rounded-[8px] border border-[var(--grayscale-30)] bg-white shadow-[0px_8px_24px_rgba(0,29,53,0.08)] p-[12px]">
                <button type="button"
                        @click="exportAs('pdf')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] font-medium text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    PDF</button>
                <button type="button"
                        @click="exportAs('csv')"
                        class="w-full text-left rounded-[8px] px-[10px] py-[8px] text-[13px] font-medium text-[var(--grayscale-100)] hover:bg-[var(--grayscale-5)] transition-colors">
                    CSV</button>
            </div>
        </div>

        <div class="bg-[var(--grayscale-10)] flex flex-1 gap-[9px] h-[32px] items-center max-w-[880px] px-[12px] rounded-[75px] border border-transparent focus-within:border-[var(--primary-120)]">
            <svg class="w-[16px] h-[16px] text-[var(--grayscale-50)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" x-model="searchQuery"
                   class="flex-1 bg-transparent border-none outline-none text-[12px] text-[var(--grayscale-90)] placeholder-[var(--grayscale-50)] tracking-[-0.12px]"
                   placeholder="Search for discovered library sublists" />
        </div>
    </div>
</div>

</body>
</html>
