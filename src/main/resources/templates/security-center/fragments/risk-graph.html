<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Risk Graph Fragment -->
<div th:fragment="risk-graph" class="content-stretch flex flex-col gap-[14px] items-start relative size-full">
    <p class="font-['Inter',sans-serif] font-medium leading-[1.3] text-[14px] text-[#141616] tracking-[-0.14px] w-full">
        Security Risk
    </p>
    <div class="grid-rows-[max-content] inline-grid leading-[0] place-items-start relative shrink-0 w-full" style="grid-template-columns: 3.23% 6.45% 12.9% 77.42%;">
        <div class="bg-[#e62727] col-span-1 h-[20px] w-full"></div>
        <div class="bg-[#f47a29] col-span-1 h-[20px] w-full"></div>
        <div class="bg-[#f5bd26] col-span-1 h-[20px] w-full"></div>
        <div class="bg-[#e8eef0] col-span-1 h-[20px] w-full rounded-r-[4px]"></div>
    </div>
    
    <div class="content-center flex flex-wrap gap-[20px_40px] items-center pr-[8px] relative shrink-0 w-full">
        <!-- Critical -->
        <div class="content-stretch flex gap-[8px] items-center relative shrink-0">
            <div class="relative shrink-0 size-[6px] rounded-full bg-[#e62727]"></div>
            <p class="font-['Inter',sans-serif] font-normal leading-[1.3] text-[11px] text-[#333e42] tracking-[-0.11px] whitespace-nowrap">
                <span th:text="${criticalCount ?: 5}"></span> Critical
            </p>
        </div>
        <!-- High -->
        <div class="content-stretch flex gap-[8px] items-center relative shrink-0">
            <div class="relative shrink-0 size-[6px] rounded-full bg-[#f47a29]"></div>
            <p class="font-['Inter',sans-serif] font-normal leading-[1.3] text-[11px] text-[#333e42] tracking-[-0.11px] whitespace-nowrap">
                <span th:text="${highCount ?: 10}"></span> High
            </p>
        </div>
        <!-- Medium -->
        <div class="content-stretch flex gap-[8px] items-center relative shrink-0">
            <div class="relative shrink-0 size-[6px] rounded-full bg-[#f5bd26]"></div>
            <p class="font-['Inter',sans-serif] font-normal leading-[1.3] text-[11px] text-[#333e42] tracking-[-0.11px] whitespace-nowrap">
                <span th:text="${mediumCount ?: 20}"></span> Medium
            </p>
        </div>
        <!-- Low -->
        <div class="content-stretch flex gap-[8px] items-center relative shrink-0">
            <div class="relative shrink-0 size-[6px] rounded-full bg-[#e8eef0]"></div>
            <p class="font-['Inter',sans-serif] font-normal leading-[1.3] text-[11px] text-[#333e42] tracking-[-0.11px] whitespace-nowrap">
                <span th:text="${lowCount ?: 120}"></span> Low
            </p>
        </div>
    </div>
</div>
</html>
