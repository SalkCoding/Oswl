<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsWL - Security Center</title>
    
    <!-- Alpine.js & HTMX (Optional given requirements) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Tailwind CSS (via CDN for simplicity as per requirement to not modify build unless requested) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Custom scrollbar for table container */
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c5cfd3; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #849197; 
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 m-0 p-0 h-screen overflow-hidden flex flex-col">

    <!-- Top Navigation Bar (Fixed top) -->
    <header th:insert="~{security-center/fragments/top-bar :: top-bar}"></header>

    <!-- Main Layout Container -->
    <main class="flex flex-col flex-1 overflow-hidden" x-data="{ searchQuery: '' }">
        
        <!-- Graph Area -->
        <section class="h-[80px] w-full flex items-center px-[60px] flex-shrink-0 bg-white z-20">
            <div class="flex gap-[160px] w-full items-center">
                <!-- Left Risk Graph -->
                <div class="w-[500px]" th:insert="~{security-center/fragments/risk-graph :: risk-graph}"></div>
                
                <!-- Right Graph context (Same visual in figma as placeholder, can abstract) -->
                <div class="w-[500px]" th:insert="~{security-center/fragments/risk-graph :: risk-graph}"></div>
            </div>
        </section>

        <!-- Table & Action Search Area -->
        <section class="flex flex-col flex-1 mt-[20px] bg-white border-t border-[#dbe4e7] overflow-hidden rounded-tl-xl rounded-tr-xl shadow-sm mx-[0px]">
            
            <!-- Actions Header -->
            <div th:insert="~{security-center/fragments/actions :: actions}"></div>

            <!-- Content Area (Table + Filters) -->
            <div class="flex flex-1 mt-[20px] overflow-hidden">
                <!-- Table List View -->
                <div class="flex-1 custom-scrollbar overflow-x-auto overflow-y-auto" th:insert="~{security-center/fragments/table :: table}"></div>
                
                <!-- Right Sidebar Filters -->
                <aside th:insert="~{security-center/fragments/filters :: filters}"></aside>
            </div>
        </section>
        
    </main>

</body>
</html>
