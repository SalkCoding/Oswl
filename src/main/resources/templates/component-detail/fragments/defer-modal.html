<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Defer (Exception) modal — Alpine.js controlled.
    Show with: x-show="modal === 'defer'"
    usage: th:replace="~{component-detail/fragments/defer-modal :: defer}"
-->
<div th:fragment="defer"
     x-show="modal === 'defer'" x-cloak
     x-transition.opacity
     class="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4"
     @keydown.escape.window="modal = null"
     @click.self="modal = null"
     x-data="{
        reason: 'legal-review',
        otherText: '',
        expiry: '1-week',
        customDate: '',
        scope: 'project',
        prDescription: 'Legal team reviewing CC-BY-SA 4.0 copyleft impact.\nEstimated review completion: 2026-06-01.\nTracking ticket: JIRA-4821'
     }">

    <div class="bg-white border border-[rgba(0,29,53,0.14)] rounded-[10px] shadow-[0px_0px_40px_0px_rgba(0,29,53,0.03)] w-full max-w-[640px] max-h-[90vh] overflow-y-auto custom-scrollbar"
         @click.stop>

        <!-- Title -->
        <div class="bg-[var(--grayscale-5)] border-b border-[var(--grayscale-20)] flex items-start gap-[10px] px-[36px] pt-[28px] pb-[24px] rounded-tl-[10px] rounded-tr-[10px]">
            <svg class="w-[26px] h-[26px] text-[var(--semantic-caution)] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M6 2v6a6 6 0 0012 0V2M6 22v-6a6 6 0 0112 0v6M4 2h16M4 22h16"/>
            </svg>

            <div class="flex flex-col gap-[10px] items-start flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-[10px]">
                    <p class="font-bold text-[20px] text-[var(--grayscale-100)] tracking-[-0.2px] leading-[1.3]">Defer Vulnerability</p>
                    <p class="font-medium text-[18px] text-[var(--grayscale-90)] tracking-[-0.18px] leading-[1.3]">Set Exception</p>
                </div>
                <p class="font-normal text-[12px] text-[var(--grayscale-70)] tracking-[-0.12px] leading-[1.3]">
                    This issue will be temporarily deferred with a documented reason.
                </p>
            </div>

            <button type="button" @click="modal = null"
                    class="bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] flex items-center justify-center w-[28px] h-[28px] rounded-[7px] hover:bg-[var(--grayscale-10)]">
                <svg class="w-[18px] h-[18px] text-[var(--grayscale-60)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Summary -->
        <div class="border-b border-[var(--grayscale-20)] flex flex-col gap-[12px] px-[36px] py-[24px]">
            <div class="flex flex-wrap gap-[12px] items-center">
                <p class="font-normal text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px]">Deferring</p>
                <span class="bg-[rgba(230,39,39,0.05)] border border-[rgba(230,39,39,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px] text-[12px] text-[var(--grayscale-80)] tracking-[-0.12px]"
                      th:text="${componentName + ' ' + componentVersion}">android-arch-common v2.2.0-beta01</span>
            </div>
            <div class="flex flex-wrap gap-[12px] items-center">
                <p class="font-normal text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px]">Affect</p>
                <span class="bg-[rgba(230,39,39,0.05)] border border-[rgba(230,39,39,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px]">
                    <span class="w-[6px] h-[6px] rounded-full bg-[var(--risk-critical)]"></span>
                    <span class="text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px]" th:text="${securityCritical} + ' Critical'">8 Critical</span>
                </span>
                <span class="bg-[rgba(244,122,41,0.05)] border border-[rgba(244,122,41,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px]">
                    <span class="w-[6px] h-[6px] rounded-full bg-[var(--risk-high)]"></span>
                    <span class="text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px]" th:text="${securityHigh} + ' High'">20 High</span>
                </span>
            </div>
        </div>

        <!-- Form -->
        <div class="flex flex-col gap-[28px] px-[36px] py-[24px]">

            <!-- Reason for deferral -->
            <div class="flex flex-col gap-[12px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Reason for deferral <span class="font-normal text-[var(--primary-80)]">*</span>
                </p>
                <div class="grid grid-cols-2 gap-[16px]">
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-reason" value="legal-review" x-model="reason"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">Legal Review Pending</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-reason" value="false-positive" x-model="reason"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">False Positive</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-reason" value="wont-fix" x-model="reason"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">Won't Fix (Accepted Risk)</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-reason" value="temporary" x-model="reason"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">Temporary — Fix Planned</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-reason" value="other" x-model="reason"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">Other</span>
                    </label>
                </div>
                <div class="border border-[var(--grayscale-20)] rounded-[8px] px-[12px] py-[8px] h-[32px] flex items-center">
                    <input type="text" x-model="otherText" placeholder="Describe the exception reason (if Other)..."
                           class="flex-1 bg-transparent border-none outline-none text-[12px] text-[var(--grayscale-100)] placeholder-[var(--grayscale-50)] tracking-[-0.12px]" />
                </div>
            </div>

            <!-- Expiry Date -->
            <div class="flex flex-col gap-[12px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Expiry Date <span class="font-normal text-[var(--primary-80)]">*</span>
                    <span class="font-normal text-[var(--primary-120)] ml-2"
                          x-text="(() => {
                              const d = new Date();
                              if (expiry === '1-week') d.setDate(d.getDate() + 7);
                              else if (expiry === '1-month') d.setMonth(d.getMonth() + 1);
                              else if (expiry === '3-month') d.setMonth(d.getMonth() + 3);
                              else if (expiry === '6-month') d.setMonth(d.getMonth() + 6);
                              else if (expiry === 'custom' && customDate) return customDate;
                              else if (expiry === 'indefinite') return 'No expiry';
                              else return '';
                              return d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + '.';
                          })()"></span>
                </p>
                <div class="grid grid-cols-2 gap-[16px]">
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="1-week" x-model="expiry"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">1 Week</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="1-month" x-model="expiry"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">1 Month</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="3-month" x-model="expiry"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">3 Month</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="6-month" x-model="expiry"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">6 Month</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="custom" x-model="expiry"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-[var(--copy-info)] tracking-[-0.12px]">Custom</span>
                        <input type="date" x-model="customDate" :disabled="expiry !== 'custom'"
                               class="border border-[var(--grayscale-20)] rounded-[4px] px-[8px] py-[4px] text-[12px] text-[var(--grayscale-100)] outline-none focus:border-[var(--primary-120)]" />
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-expiry" value="indefinite" x-model="expiry"
                               class="text-[var(--semantic-warning)] focus:ring-[var(--semantic-warning)]" />
                        <span class="text-[12px] text-[var(--semantic-warning)]/80 tracking-[-0.12px]">Defer Indefinitely</span>
                    </label>
                </div>
            </div>

            <!-- Assign Reviewer -->
            <div class="flex flex-col gap-[10px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Assign Reviewer (optional) <span class="font-normal text-[var(--primary-80)]">*</span>
                </p>
                <div class="grid grid-cols-2 gap-[20px]">
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-scope" value="project" x-model="scope"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">This project only</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer">
                        <input type="radio" name="defer-scope" value="all-projects" x-model="scope"
                               class="text-[var(--primary-120)] focus:ring-[var(--primary-120)]" />
                        <span class="text-[12px] text-black tracking-[-0.12px]">All projects using this library</span>
                    </label>
                </div>
            </div>

            <!-- PR Description -->
            <div class="flex flex-col gap-[8px] w-full">
                <label class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">PR Description</label>
                <textarea x-model="prDescription"
                          class="border border-[var(--grayscale-20)] rounded-[8px] px-[12px] py-[8px] h-[80px] text-[12px] text-[var(--grayscale-100)] outline-none focus:border-[var(--primary-120)] resize-none tracking-[-0.12px] leading-[1.3]"></textarea>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-[16px] items-center px-[36px] pt-[8px] pb-[28px]">
            <button type="button"
                    class="bg-[var(--semantic-caution)] hover:opacity-90 flex flex-1 items-center justify-center gap-[6px] px-[14px] py-[10px] rounded-[8px] text-white font-bold text-[14px] tracking-[-0.14px] transition-opacity">
                <svg class="w-[20px] h-[20px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 2v6a6 6 0 0012 0V2M6 22v-6a6 6 0 0112 0v6M4 2h16M4 22h16"/>
                </svg>
                Confirm Deferral
            </button>
            <button type="button" @click="modal = null"
                    class="bg-[var(--grayscale-5)] border border-[var(--grayscale-30)] flex flex-1 items-center justify-center px-[14px] py-[10px] rounded-[8px] text-[var(--grayscale-60)] font-bold text-[14px] tracking-[-0.14px] hover:bg-[var(--grayscale-10)] transition-colors">
                Cancel
            </button>
        </div>
    </div>
</div>

</body>
</html>
