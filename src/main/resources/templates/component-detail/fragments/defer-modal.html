<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Defer (Exception) modal — Alpine.js controlled.
    Show with: x-show="modal === 'defer'"
    usage: th:replace="~{component-detail/fragments/defer-modal :: defer}"
-->
<div th:fragment="defer"
     x-show="modal === 'defer'" x-cloak
     x-transition.opacity
     class="fixed inset-0 z-[200] bg-black/40 flex items-center justify-center p-4"
     @keydown.escape.window="modal = null"
     @click.self="modal = null"
     x-data="{
        reason: 'legal-review',
        otherText: '',
        expiry: '1-week',
        customDate: '',
        scope: 'project',
        prDescription: 'Legal team reviewing CC-BY-SA 4.0 copyleft impact.\nEstimated review completion: 2026-06-01.\nTracking ticket: JIRA-4821',
        submitting: false,
        deferError: null,
        deferDone: false,

        async confirmDefer() {
            this.submitting = true;
            this.deferError = null;
            const root = document.getElementById('component-detail-content');
            const projectId   = root ? root.dataset.projectId : null;
            const componentId = root ? root.dataset.componentId : null;
            try {
                const r = await fetch(`/projects/${projectId}/components/${componentId}/defer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reason: this.reason,
                        otherText: this.otherText,
                        expiry: this.expiry,
                        customDate: this.customDate,
                        scope: this.scope,
                        prDescription: this.prDescription
                    })
                });
                if (r.ok || r.status === 204) {
                    this.deferDone = true;
                    setTimeout(() => { this.modal = null; this.deferDone = false; }, 1200);
                } else {
                    this.deferError = 'Failed to defer (' + r.status + '). Please try again.';
                }
            } catch (e) {
                this.deferError = 'Network error. Please try again.';
            } finally {
                this.submitting = false;
            }
        }
     }">

    <div class="bg-white border border-[rgba(0,29,53,0.14)] rounded-[10px] shadow-[0px_0px_40px_0px_rgba(0,29,53,0.03)] w-full max-w-[640px] max-h-[90vh] overflow-hidden flex flex-col"
         @click.stop>

        <!-- Title -->
        <div class="bg-[var(--grayscale-5)] border-b border-[var(--grayscale-20)] flex items-start gap-[10px] px-[36px] pt-[28px] pb-[24px] shrink-0">
            <img th:src="@{/icon/icon-hourglass.svg}" class="w-[26px] h-[26px] shrink-0" alt="" aria-hidden="true">

            <div class="flex flex-col gap-[10px] items-start flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-[10px]">
                    <p class="font-bold text-[20px] text-[var(--grayscale-100)] tracking-[-0.2px] leading-[1.3]">Defer Vulnerability</p>
                    <p class="font-medium text-[18px] text-[var(--grayscale-90)] tracking-[-0.18px] leading-[1.3]">Set Exception</p>
                </div>
                <p class="font-normal text-[12px] text-[var(--grayscale-70)] tracking-[-0.12px] leading-[1.3]">
                    This issue will be temporarily deferred with a documented reason.
                </p>
            </div>

            <button type="button" @click="modal = null"
                    class="bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] flex items-center justify-center w-[28px] h-[28px] rounded-[7px] hover:bg-[var(--grayscale-10)]">
                <img th:src="@{/icon/icon-close.svg}" class="w-[18px] h-[18px]" alt="" aria-hidden="true">
            </button>
        </div>

        <!-- Scrollable body -->
        <div class="overflow-y-auto flex-1 custom-scrollbar">

        <!-- Summary -->
        <div class="border-b border-[var(--grayscale-20)] flex flex-col gap-[12px] px-[36px] py-[24px]">
            <div class="flex flex-wrap gap-[12px] items-center">
                <p class="font-normal text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px]">Deferring</p>
                <span class="bg-[rgba(230,39,39,0.05)] border border-[rgba(230,39,39,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px] text-[12px] text-[var(--grayscale-80)] tracking-[-0.12px]"
                      th:text="${componentName + ' ' + componentVersion}">android-arch-common v2.2.0-beta01</span>
            </div>
            <div class="flex flex-wrap gap-[12px] items-center">
                <p class="font-normal text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px]">Affect</p>
                <span class="bg-[rgba(230,39,39,0.05)] border border-[rgba(230,39,39,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px]">
                    <span class="w-[6px] h-[6px] rounded-full bg-[var(--risk-critical)]"></span>
                    <span class="text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px]" th:text="${securityCritical} + ' Critical'">8 Critical</span>
                </span>
                <span class="bg-[rgba(244,122,41,0.05)] border border-[rgba(244,122,41,0.2)] flex gap-[8px] items-center px-[12px] py-[5px] rounded-[40px]">
                    <span class="w-[6px] h-[6px] rounded-full bg-[var(--risk-high)]"></span>
                    <span class="text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px]" th:text="${securityHigh} + ' High'">20 High</span>
                </span>
            </div>
        </div>

        <!-- Form -->
        <div class="flex flex-col gap-[28px] px-[36px] py-[24px]">

            <!-- Reason for deferral -->
            <div class="flex flex-col gap-[12px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Reason for deferral <span class="font-normal text-[var(--primary-80)]">*</span>
                </p>
                <div class="grid grid-cols-2 gap-x-[20px] gap-y-[16px]">
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="reason = 'legal-review'">
                        <img :src="reason === 'legal-review' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">Legal Review Pending</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="reason = 'false-positive'">
                        <img :src="reason === 'false-positive' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">False Positive</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="reason = 'wont-fix'">
                        <img :src="reason === 'wont-fix' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">Won't Fix (Accepted Risk)</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="reason = 'temporary'">
                        <img :src="reason === 'temporary' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">Temporary — Fix Planned</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="reason = 'other'">
                        <img :src="reason === 'other' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">Other</span>
                    </label>
                </div>
                <div class="border border-[var(--grayscale-20)] rounded-[8px] px-[12px] py-[8px] h-[32px] flex items-center">
                    <input type="text" x-model="otherText" placeholder="Describe the exception reason (if Other)..."
                           class="flex-1 bg-transparent border-none outline-none text-[12px] text-[var(--grayscale-100)] placeholder-[var(--grayscale-50)] tracking-[-0.12px]" />
                </div>
            </div>

            <!-- Expiry Date -->
            <div class="flex flex-col gap-[12px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Expiry Date <span class="font-normal text-[var(--primary-80)]">*</span>
                    <span class="font-normal text-[#00b9a3] ml-2"
                          x-text="(() => {
                              const d = new Date();
                              if (expiry === '1-week') d.setDate(d.getDate() + 7);
                              else if (expiry === '1-month') d.setMonth(d.getMonth() + 1);
                              else if (expiry === '3-month') d.setMonth(d.getMonth() + 3);
                              else if (expiry === '6-month') d.setMonth(d.getMonth() + 6);
                              else if (expiry === 'custom' && customDate) return customDate;
                              else if (expiry === 'indefinite') return 'No expiry';
                              else return '';
                              return d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + '.';
                          })()"></span>
                </p>
                <div class="flex gap-[20px] items-start">
                    <!-- Left col: 1Week, 3Month, Custom -->
                    <div class="flex flex-col gap-[16px] flex-1 min-w-0">
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = '1-week'">
                            <img :src="expiry === '1-week' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-black tracking-[-0.12px]">1 Week</span>
                        </label>
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = '3-month'">
                            <img :src="expiry === '3-month' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-black tracking-[-0.12px]">3 Month</span>
                        </label>
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = 'custom'">
                            <img :src="expiry === 'custom' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-[#00659c] tracking-[-0.12px]">Custom</span>
                            <div class="border rounded-[6px] px-[10px] py-[2px] transition-colors ml-[4px]"
                                 :class="expiry === 'custom' ? 'border-[var(--primary-120)]' : 'border-[var(--grayscale-20)]'">
                                <input type="text" x-model="customDate" placeholder="YYYY-MM-DD"
                                       @focus="expiry = 'custom'"
                                       class="w-[90px] bg-transparent border-none outline-none text-[12px] text-[var(--grayscale-100)] placeholder-[var(--grayscale-30)] tracking-[-0.12px]" />
                            </div>
                        </label>
                    </div>
                    <!-- Right col: 1Month, 6Month, Defer Indefinitely -->
                    <div class="flex flex-col gap-[16px] flex-1 min-w-0">
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = '1-month'">
                            <img :src="expiry === '1-month' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-black tracking-[-0.12px]">1 Month</span>
                        </label>
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = '6-month'">
                            <img :src="expiry === '6-month' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-black tracking-[-0.12px]">6 Month</span>
                        </label>
                        <label class="flex items-center gap-[8px] cursor-pointer" @click="expiry = 'indefinite'">
                            <img :src="expiry === 'indefinite' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                            <span class="font-medium text-[12px] text-[#e62727]/80 tracking-[-0.12px]">Defer Indefinitely</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Assign Reviewer -->
            <div class="flex flex-col gap-[10px] w-full">
                <p class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">
                    Assign Reviewer (optional) <span class="font-normal text-[var(--primary-80)]">*</span>
                </p>
                <div class="grid grid-cols-2 gap-[20px]">
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="scope = 'project'">
                        <img :src="scope === 'project' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">This project only</span>
                    </label>
                    <label class="flex items-center gap-[8px] cursor-pointer" @click="scope = 'all-projects'">
                        <img :src="scope === 'all-projects' ? '/icon/icon-radio-on.svg' : '/icon/icon-radio-off.svg'" class="w-[20px] h-[20px] shrink-0" alt="" aria-hidden="true">
                        <span class="font-medium text-[12px] text-black tracking-[-0.12px]">All projects using this library</span>
                    </label>
                </div>
            </div>

            <!-- PR Description -->
            <div class="flex flex-col gap-[8px] w-full">
                <label class="font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]">PR Description</label>
                <textarea x-model="prDescription"
                          class="border border-[var(--grayscale-20)] rounded-[8px] px-[12px] py-[8px] h-[80px] text-[12px] text-[var(--grayscale-100)] outline-none focus:border-[#33D1B7] resize-none tracking-[-0.12px] leading-[1.3]"></textarea>
            </div>
        </div>

        </div><!-- end scrollable body -->

        <!-- Actions -->
        <div class="flex flex-col gap-[10px] px-[36px] pt-[16px] pb-[28px] shrink-0 border-t border-[var(--grayscale-20)]">
            <!-- Error feedback -->
            <div x-show="deferError" x-cloak class="w-full bg-red-50 border border-red-200 text-red-700 text-[12px] rounded-[8px] px-[10px] py-[8px] text-center" x-text="deferError"></div>
            <!-- Success feedback -->
            <div x-show="deferDone" x-cloak class="w-full bg-green-50 border border-green-200 text-green-700 text-[12px] rounded-[8px] px-[10px] py-[8px] text-center">Deferral confirmed successfully.</div>

            <div class="flex gap-[16px] items-center">
                <button type="button" @click="confirmDefer()" :disabled="submitting || deferDone"
                        class="bg-[var(--semantic-caution)] hover:opacity-90 disabled:opacity-50 flex flex-1 items-center justify-center gap-[6px] px-[14px] py-[10px] rounded-[8px] text-white font-bold text-[14px] tracking-[-0.14px] transition-opacity">
                    <img th:src="@{/icon/icon-hourglass.svg}" class="w-[20px] h-[20px]" alt="" aria-hidden="true" style="filter: brightness(0) invert(1);">
                    <span x-text="submitting ? 'Submitting...' : 'Confirm Deferral'">Confirm Deferral</span>
                </button>
                <button type="button" @click="modal = null"
                        class="bg-[var(--grayscale-5)] border border-[var(--grayscale-30)] flex flex-1 items-center justify-center px-[14px] py-[10px] rounded-[8px] text-[var(--grayscale-60)] font-bold text-[14px] tracking-[-0.14px] hover:bg-[var(--grayscale-10)] transition-colors">
                    Cancel
            </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
