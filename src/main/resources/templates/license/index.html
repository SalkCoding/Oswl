<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Project Licenses')}"></head>
<body class="bg-[var(--grayscale-5)] text-gray-900 font-sans antialiased min-h-screen flex flex-col">

    <div th:replace="~{fragments/topbar :: project-topbar(${projectId}, ${projectName}, ${projectVersion}, 'license')}"></div>

    <main class="flex-1 w-full max-w-[1440px] mx-auto px-[80px] py-[40px]">
        <div class="flex gap-[48px] items-start w-full">
            <div class="flex-1 flex flex-col min-w-[248px]"
                 th:replace="~{license/components/licenses_found :: licenses_found}"></div>
            <div class="flex-1 flex flex-col min-w-[248px]"
                 th:replace="~{license/components/obligations_found :: obligations_found}"></div>
        </div>
    </main>

</body>
</html>
