<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

    <div th:fragment="license_review"
         class="flex flex-col items-start min-w-[248px] w-full max-w-[616px] rounded-[10px] overflow-hidden border border-[#DBE4E7]">

        <div class="bg-[#F3F5F6] border-b border-[#DBE4E7] flex flex-col items-start px-6 py-4 w-full shrink-0">
            <h2 class="font-bold text-[24px] text-black tracking-[-0.24px] m-0"
                th:text="${#lists.size(reviewItems)} + ' Item' + (${#lists.size(reviewItems)} != 1 ? 's' : '') + ' Needing Review'">0 Items</h2>
            <p class="text-[12px] text-[var(--grayscale-60)] tracking-[-0.12px] m-0 mt-1">
                Components with missing, proprietary or non-SPDX license declarations — flag for manual legal review.
            </p>
        </div>

        <div class="flex flex-col w-full bg-white divide-y divide-[#DBE4E7]">

            <div th:if="${reviewItems == null or #lists.isEmpty(reviewItems)}"
                 class="flex flex-col items-center justify-center gap-[12px] px-6 py-[48px] text-center">
                <svg class="w-[32px] h-[32px] text-[#84dca5]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <p class="font-medium text-[14px] text-[var(--grayscale-60)] tracking-[-0.14px] m-0">All components have recognised SPDX licenses.</p>
                <p class="text-[12px] text-[var(--grayscale-40)] tracking-[-0.12px] m-0">No manual review required for this scan.</p>
            </div>

            <div th:each="item : ${reviewItems}"
                 x-data="{ open: false }"
                 class="flex flex-col w-full shrink-0">

                <div @click="open = !open"
                     class="flex flex-wrap gap-y-2 items-start justify-between px-6 py-3 w-full hover:bg-gray-50 transition-colors cursor-pointer select-none">
                    <div class="flex flex-1 flex-wrap gap-3 items-center min-w-[224px]">
                        <p class="font-medium text-[14px] text-black tracking-[-0.14px] m-0"
                           th:text="${item.rawLicense}">License string</p>
                        <span th:classappend="${
                                item.reason == 'PROPRIETARY' ? 'bg-[rgba(230,39,39,0.08)] text-[#e62727] border-[rgba(230,39,39,0.25)]' :
                                item.reason == 'CUSTOM'      ? 'bg-[rgba(245,189,38,0.1)]  text-[#a76f00] border-[rgba(245,189,38,0.3)]' :
                                item.reason == 'MISSING'     ? 'bg-[rgba(244,122,41,0.08)] text-[#c4500a] border-[rgba(244,122,41,0.25)]' :
                                                               'bg-[var(--grayscale-5)] text-[var(--grayscale-70)] border-[var(--grayscale-15)]'
                              }"
                              class="text-[10px] font-semibold tracking-[0.5px] uppercase px-2 py-[2px] rounded-[40px] border"
                              th:text="${item.reason}">UNKNOWN</span>
                    </div>
                    <div class="flex items-center gap-[6px]">
                        <div th:replace="~{fragments/tags :: library-count(count=${#lists.size(item.libraries)})}"></div>
                        <svg class="w-[14px] h-[14px] text-[var(--grayscale-40)] transition-transform shrink-0"
                             :class="open ? 'rotate-180' : ''"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                </div>

                <div x-show="open" x-cloak
                     class="flex flex-col gap-2 bg-[var(--grayscale-5)] border-t border-[#DBE4E7] px-6 py-3">
                    <p class="text-[12px] text-[var(--grayscale-70)] leading-relaxed m-0"
                       th:text="${item.hint}">Hint</p>
                    <div class="flex flex-col gap-0">
                        <p class="text-[11px] font-semibold tracking-[0.5px] uppercase text-[var(--grayscale-50)] mt-2 m-0">Affected libraries</p>
                        <div th:each="libName : ${item.libraries}"
                             class="flex items-center gap-[8px] py-[3px]">
                            <span class="w-[4px] h-[4px] rounded-full bg-[var(--grayscale-30)] shrink-0"></span>
                            <p class="text-[13px] text-[var(--grayscale-80)] tracking-[-0.13px] m-0" th:text="${libName}">library 1.0.0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
