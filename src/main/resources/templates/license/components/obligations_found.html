<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- Right Column: Obligations Found Fragment -->
    <div th:fragment="obligations_found" class="flex flex-col items-start min-w-[248px] w-full max-w-[616px] rounded-[10px] overflow-hidden border border-[#DBE4E7]">

        <!-- Header -->
        <div class="bg-[#F3F5F6] border-b border-[#DBE4E7] flex flex-col items-start px-6 py-4 w-full shrink-0">
            <h2 class="font-bold text-[24px] text-black tracking-[-0.24px] m-0"
                th:text="${totalObligations} + ' Obligations'">0 Obligations</h2>
        </div>

        <!-- Empty state -->
        <div class="flex flex-col w-full bg-white divide-y divide-[#DBE4E7]">
            <div class="flex flex-col items-center justify-center gap-[12px] px-6 py-[48px] text-center">
                <svg class="w-[32px] h-[32px] text-[var(--grayscale-30)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
                <p class="font-medium text-[14px] text-[var(--grayscale-60)] tracking-[-0.14px] m-0">Obligation analysis not yet available.</p>
                <p class="text-[12px] text-[var(--grayscale-40)] tracking-[-0.12px] m-0">
                    License obligation detection is coming in a future update.
                </p>
            </div>
        </div>

    </div>

</body>
</html>
