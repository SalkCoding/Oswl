<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- Left Column: Licenses Found Fragment -->
    <div th:fragment="licenses_found" class="flex flex-col items-start min-w-[248px] w-full max-w-[620px] rounded-[10px] overflow-hidden border border-[#DBE4E7]">
        
        <!-- Title & Stats -->
        <div class="bg-[#F3F5F6] border-b border-[#DBE4E7] flex flex-col gap-3 px-6 py-4 w-full shrink-0">
            <h2 class="font-bold text-[24px] text-black tracking-[-0.24px] m-0" 
                th:text="${totalLicenses} + ' Licenses Found'">27 Licenses Found</h2>
            
            <div class="flex flex-wrap gap-x-6 gap-y-2 items-start shrink-0 w-full text-[11px] text-[#333E42]">
                <!-- Critical Risk Count -->
                <div class="flex gap-2 items-center shrink-0">
                    <div class="w-1.5 h-1.5 bg-[#e62727] rounded-full"></div>
                    <span th:text="${criticalRiskCount} + ' Critical Risk'">0 Critical Risk</span>
                </div>
                <!-- High Risk Count -->
                <div class="flex gap-2 items-center shrink-0">
                    <div class="w-1.5 h-1.5 bg-[#f47a29] rounded-full"></div>
                    <span th:text="${highRiskCount} + ' High Risk'">0 High Risk</span>
                </div>
                <!-- Medium Risk Count -->
                <div class="flex gap-2 items-center shrink-0">
                    <div class="w-1.5 h-1.5 bg-[#f5bd26] rounded-full"></div>
                    <span th:text="${mediumRiskCount} + ' Medium Risk'">0 Medium Risk</span>
                </div>
                <!-- Low Risk Count -->
                <div class="flex gap-2 items-center shrink-0">
                    <div class="w-1.5 h-1.5 bg-[var(--grayscale-80)] rounded-full"></div>
                    <span th:text="${lowRiskCount} + ' Low Risk'">0 Low Risk</span>
                </div>
            </div>
        </div>

        <!-- License rows -->
        <div class="flex flex-col w-full bg-white divide-y divide-[#DBE4E7]">

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(licenses)}"
                 class="flex flex-col items-center justify-center gap-[12px] px-6 py-[48px] text-center">
                <svg class="w-[32px] h-[32px] text-[var(--grayscale-30)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <p class="font-medium text-[14px] text-[var(--grayscale-60)] tracking-[-0.14px] m-0">No license data available.</p>
                <p class="text-[12px] text-[var(--grayscale-40)] tracking-[-0.12px] m-0">Run a scan to detect licenses used in this project.</p>
            </div>

            <!-- Dynamic license rows -->
            <div th:each="license : ${licenses}"
                 x-data="{ open: false }"
                 class="flex flex-col w-full shrink-0 border-b border-[#DBE4E7] last:border-b-0">
                <!-- Row header (clickable) -->
                <div @click="open = !open"
                     class="flex flex-wrap gap-y-2 items-start justify-between px-6 py-3 w-full hover:bg-gray-50 transition-colors cursor-pointer select-none">
                    <div class="flex flex-1 flex-wrap gap-4 items-center min-w-[224px]">
                        <p class="font-medium text-[14px] text-black tracking-[-0.14px] m-0" th:text="${license.name}">License Name</p>
                        <div th:replace="~{fragments/tags :: risk-tag(level=${license.riskLevel})}"></div>
                    </div>
                    <div class="flex items-center gap-[6px]">
                        <div th:replace="~{fragments/tags :: library-count(count=${license.libraryCount})}"></div>
                        <svg class="w-[14px] h-[14px] text-[var(--grayscale-40)] transition-transform shrink-0"
                             :class="open ? 'rotate-180' : ''"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                </div>
                <!-- Expanded: list of libraries using this license -->
                <div x-show="open" x-cloak
                     class="flex flex-col gap-0 px-6 pb-3 bg-[var(--grayscale-5)] border-t border-[#DBE4E7]">
                    <p class="text-[11px] font-semibold text-[var(--grayscale-50)] tracking-[0.5px] uppercase pt-3 pb-2 m-0">Libraries</p>
                    <div th:each="libName : ${license.libraryNames}"
                         class="flex items-center gap-[8px] py-[5px]">
                        <span class="w-[4px] h-[4px] rounded-full bg-[var(--grayscale-30)] shrink-0"></span>
                        <p class="text-[13px] text-[var(--grayscale-80)] tracking-[-0.13px] m-0" th:text="${libName}">library-name 1.0.0</p>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
