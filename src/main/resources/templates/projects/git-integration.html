<div th:fragment="slideout" class="h-full flex flex-col bg-white overflow-y-auto custom-scrollbar w-full" x-data="gitIntegrationData()" @set-branch.window="onBranchSelect($event.detail)">

    <!-- Alpine component data — PAT-based GitHub integration -->
    <script>
    (function () {
        window.gitIntegrationData = function () {
            return {
                /* ── connection state ── */
                connected: false,
                connectedLogin: '',
                loadingStatus: true,
                loadingMessage: 'Checking connection…',

                /* ── PAT connect form ── */
                patInput: '',
                patConnecting: false,
                patError: '',

                /* ── repo list state ── */
                repos:    [],
                accounts: [],
                itemBranches: {},
                allBranches: {},
                branchUpdatedAt: {},
                allBranchDates: {},   // { [repoId]: { [branchName]: isoString } }

                accountDropdownOpen: false,
                selectedAccount:     '',

                searchQuery:    '',
                selectAll:      false,
                selectedRepos:  [],
                importedRepos:  [],
                importFeedback: false,
                importing:      false,

                /* ── computed ── */
                get filteredRepos() {
                    const q = this.searchQuery.trim().toLowerCase();
                    return q ? this.repos.filter(r => r.name.toLowerCase().includes(q))
                             : this.repos;
                },

                /* ── lifecycle ── */
                async init() {
                    await this.checkStatus();
                },

                /* ── methods ── */
                async checkStatus() {
                    this.loadingStatus = true;
                    this.loadingMessage = 'Checking connection…';
                    try {
                        const res = await fetch('/api/github/status');
                        const data = await res.json();
                        this.connected = data.connected;
                        this.connectedLogin = data.login || '';
                        if (this.connected) {
                            await this.loadAccounts();
                        }
                    } catch (e) {
                        this.connected = false;
                    } finally {
                        this.loadingStatus = false;
                    }
                },

                async connectPAT() {
                    if (!this.patInput.trim() || this.patConnecting) return;
                    this.patConnecting = true;
                    this.patError = '';
                    this.loadingMessage = 'Connecting to GitHub…';
                    try {
                        const res = await fetch('/api/github/connect', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token: this.patInput.trim() })
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            this.patError = data.error || 'Connection failed. Check your token.';
                            return;
                        }
                        this.connectedLogin = data.login || '';
                        this.patInput = '';
                        await this.loadAccounts();
                        this.connected = true;
                    } catch (e) {
                        this.patError = 'Network error. Please try again.';
                    } finally {
                        this.patConnecting = false;
                    }
                },

                async disconnect() {
                    await fetch('/api/github/disconnect', { method: 'POST' });
                    this.connected = false;
                    this.connectedLogin = '';
                    this.repos = [];
                    this.accounts = [];
                    this.selectedAccount = '';
                },

                async loadAccounts() {
                    try {
                        const res = await fetch('/api/github/accounts');
                        if (!res.ok) { this.connected = false; return; }
                        const data = await res.json();
                        this.accounts = data.map(a => a.login);
                        if (this.accounts.length > 0) {
                            this.selectedAccount = this.accounts[0];
                            await this.loadRepos();
                        }
                    } catch (e) {
                        console.error('[GitHub] Failed to load accounts', e);
                    }
                },

                async loadRepos() {
                    if (!this.selectedAccount) return;
                    this.repos = [];
                    this.loadingMessage = 'Loading repositories…';
                    try {
                        const res = await fetch('/api/github/repos?account=' + encodeURIComponent(this.selectedAccount));
                        if (!res.ok) return;
                        const data = await res.json();
                        this.repos = data;
                        const branches = {};
                        data.forEach(r => { branches[r.id] = r.defaultBranch || 'main'; });
                        this.itemBranches = branches;
                        this.selectedRepos = [];
                        this.selectAll = false;
                        this.allBranches = {};
                        this.allBranchDates = {};
                        this.loadingMessage = 'Loading branches…';
                        await this._loadAllBranches(data);
                        this._loadAllBranchDates(data); // fire-and-forget: populate dates in background
                    } catch (e) {
                        console.error('[GitHub] Failed to load repos', e);
                    }
                },

                toggleSelectAll() {
                    this.selectedRepos = this.selectAll
                        ? this.filteredRepos.map(r => r.id)
                        : [];
                },

                async importSelected() {
                    if (this.selectedRepos.length === 0 || this.importing) return;
                    this.importing = true;
                    for (const rawId of this.selectedRepos) {
                        const id = Number(rawId);
                        const repo = this.repos.find(r => r.id === id);
                        if (!repo || this.importedRepos.includes(id)) continue;
                        await this._importOne(repo);
                    }
                    this.selectedRepos = [];
                    this.selectAll = false;
                    this.importFeedback = true;
                    this.importing = false;
                    window.dispatchEvent(new CustomEvent('project-imported'));
                    setTimeout(() => { this.importFeedback = false; }, 2000);
                },

                async importAll() {
                    if (this.importing) return;
                    this.importing = true;
                    for (const repo of this.filteredRepos) {
                        if (this.importedRepos.includes(repo.id)) continue;
                        await this._importOne(repo);
                    }
                    this.selectedRepos = [];
                    this.selectAll = false;
                    this.importFeedback = true;
                    this.importing = false;
                    window.dispatchEvent(new CustomEvent('project-imported'));
                    setTimeout(() => { this.importFeedback = false; }, 2000);
                },

                async _importOne(repo) {
                    try {
                        const [owner] = repo.fullName.split('/');
                        const res = await fetch('/api/github/repos/import', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                owner: owner,
                                repo: repo.name,
                                branch: this.itemBranches[repo.id] || repo.defaultBranch || 'main'
                            })
                        });
                        if (res.ok) {
                            this.importedRepos.push(repo.id);
                        }
                    } catch (e) {
                        console.error('[GitHub] Import failed for', repo.name, e);
                    }
                },

                async onBranchSelect({ id, branch, fullName }) {
                    this.itemBranches = { ...this.itemBranches, [id]: branch };
                    // Use eagerly-loaded cache if available
                    const cached = this.allBranchDates[id]?.[branch];
                    if (cached !== undefined) {
                        this.branchUpdatedAt = { ...this.branchUpdatedAt, [id]: cached };
                        return;
                    }
                    // Fallback: fetch on demand
                    try {
                        const [owner, repoName] = fullName.split('/');
                        const res = await fetch('/api/github/branch-updated-at?owner=' + encodeURIComponent(owner) + '&repo=' + encodeURIComponent(repoName) + '&branch=' + encodeURIComponent(branch));
                        if (res.ok) {
                            const data = await res.json();
                            this.branchUpdatedAt = { ...this.branchUpdatedAt, [id]: data.updatedAt };
                            // Populate cache
                            const prev = this.allBranchDates[id] || {};
                            this.allBranchDates = { ...this.allBranchDates, [id]: { ...prev, [branch]: data.updatedAt } };
                        }
                    } catch(e) { console.warn('[GitHub] Failed to fetch branch date', e); }
                },

                async _loadAllBranches(repos) {
                    await Promise.all(repos.map(async repo => {
                        try {
                            const [owner] = repo.fullName.split('/');
                            const res = await fetch('/api/github/branches?owner=' + encodeURIComponent(owner) + '&repo=' + encodeURIComponent(repo.name));
                            if (res.ok) {
                                const branches = await res.json();
                                this.allBranches = { ...this.allBranches, [repo.id]: branches };
                            }
                        } catch(e) {}
                    }));
                },

                async _loadAllBranchDates(repos) {
                    // Runs in background after branches are loaded.
                    // Fetches last commit date for every branch of every repo in parallel.
                    await Promise.all(repos.map(async repo => {
                        const branches = this.allBranches[repo.id];
                        if (!branches || branches.length === 0) return;
                        const [owner] = repo.fullName.split('/');
                        await Promise.all(branches.map(async branch => {
                            try {
                                const res = await fetch('/api/github/branch-updated-at?owner=' + encodeURIComponent(owner) + '&repo=' + encodeURIComponent(repo.name) + '&branch=' + encodeURIComponent(branch));
                                if (res.ok) {
                                    const data = await res.json();
                                    const prev = this.allBranchDates[repo.id] || {};
                                    this.allBranchDates = { ...this.allBranchDates, [repo.id]: { ...prev, [branch]: data.updatedAt } };
                                }
                            } catch(e) {}
                        }));
                    }));
                },

                formatUpdatedAt(iso) {
                    if (!iso) return '-';
                    const d = new Date(iso);
                    if (isNaN(d)) return iso;
                    const diff = (Date.now() - d.getTime()) / 1000;
                    if (diff < 60)        return 'just now';
                    if (diff < 3600)      return Math.floor(diff / 60) + 'm ago';
                    if (diff < 86400)     return Math.floor(diff / 3600) + 'h ago';
                    if (diff < 604800)    return Math.floor(diff / 86400) + 'd ago';
                    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                }
            };
        };
    })();
    </script>

    <!-- Header -->
    <div class="bg-white flex flex-col gap-[20px] pb-[36px] pt-[40px] px-[40px] w-full shrink-0">
        <div class="flex gap-[12px] items-start w-full">
            <!-- Github Icon -->
            <div class="border border-[var(--grayscale-20)] rounded-[8px] w-[32px] h-[32px] flex items-center justify-center shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-[#24292F]">
                    <path fill-rule="evenodd" d="M12 2A10 10 0 002 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.11-1.46-1.11-1.46-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"></path>
                </svg>
            </div>
            
            <div class="flex-1 flex gap-[14px] items-center h-[31px]">
                <h2 class="font-bold text-[24px] text-[var(--grayscale-100)] tracking-[-0.24px] leading-none mb-0">Connect to Git</h2>
            </div>
            
            <!-- Close Button -->
            <button type="button" @click="openPanel = null" class="bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] p-[6px] rounded-[8px] shrink-0 text-[var(--grayscale-80)] hover:bg-[var(--grayscale-10)] transition-colors focus:outline-none">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Connection Details Labels -->
        <div class="flex flex-wrap gap-[12px] items-center text-[13px] w-full">
            <div class="bg-[rgba(0,160,147,0.05)] border border-[rgba(0,160,147,0.2)] rounded-[40px] flex gap-[6px] items-center px-[12px] py-[6px]">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-[var(--primary-120)]">
                    <path fill-rule="evenodd" d="M12 2A10 10 0 002 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.11-1.46-1.11-1.46-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"></path>
                </svg>
                <span class="font-medium text-[var(--primary-120)] tracking-[-0.13px]">GitHub</span>
            </div>

            <!-- Loading (initial check or connecting) -->
            <template x-if="loadingStatus || patConnecting">
                <div class="flex items-center gap-[8px] text-[13px] text-[var(--grayscale-60)]">
                    <svg class="animate-spin w-[14px] h-[14px] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                    <span x-text="loadingMessage"></span>
                </div>
            </template>

            <!-- Not connected: status label -->
            <template x-if="!loadingStatus && !connected && !patConnecting">
                <span class="text-[12px] text-[var(--grayscale-50)] tracking-[-0.12px]">Not connected</span>
            </template>

            <!-- Connected: Account dropdown + Disconnect -->
            <template x-if="!loadingStatus && connected">
                <div class="flex items-center gap-[12px]">
                    <!-- Account Name Dropdown -->
                    <div class="relative" @click.outside="accountDropdownOpen = false">
                        <button
                            @click="accountDropdownOpen = !accountDropdownOpen"
                            class="bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] rounded-[4px] flex gap-[8px] items-center px-[10px] py-[6px] w-[200px] justify-between cursor-pointer hover:bg-[var(--grayscale-10)] transition-colors"
                            :class="accountDropdownOpen ? 'border-[var(--primary-120)] bg-[var(--primary-20)]' : ''">
                            <span class="font-medium text-[var(--grayscale-80)] tracking-[-0.13px] truncate" x-text="selectedAccount"></span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 class="text-[var(--grayscale-80)] shrink-0 transition-transform"
                                 :class="accountDropdownOpen ? 'rotate-180' : ''">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <!-- Account Dropdown Menu -->
                        <div x-show="accountDropdownOpen"
                             x-transition:enter="transition ease-out duration-100"
                             x-transition:enter-start="opacity-0 -translate-y-2"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             class="absolute top-full left-0 mt-[4px] w-[200px] bg-white border border-[var(--grayscale-20)] rounded-[6px] shadow-lg z-50 max-h-[200px] overflow-y-auto">
                            <template x-for="account in accounts" :key="account">
                                <button
                                    @click="selectedAccount = account; accountDropdownOpen = false; loadRepos()"
                                    class="w-full text-left px-[12px] py-[10px] text-[13px] font-medium text-[var(--grayscale-80)] hover:bg-[var(--primary-20)] hover:text-[var(--primary-120)] transition-colors"
                                    :class="selectedAccount === account ? 'bg-[var(--primary-20)] text-[var(--primary-120)]' : ''">
                                    <span x-text="account"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Disconnect button -->
                    <button type="button" @click="disconnect()"
                       class="text-[12px] font-medium text-[var(--grayscale-50)] hover:text-red-500 tracking-[-0.12px] transition-colors">
                        Disconnect
                    </button>
                </div>
            </template>
        </div>

        <!-- Info Box (connected only) -->
        <template x-if="connected">
            <div class="bg-[var(--grayscale-10)] rounded-[10px] px-[18px] py-[12px] flex gap-[8px] items-center w-full shadow-sm shadow-[var(--grayscale-20)]/50">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--grayscale-60)] shrink-0">
                    <circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span class="text-[13px] font-medium text-[var(--grayscale-90)] tracking-[0] leading-[1.3]">If you don't see an organization listed, you may need to grant OsWL access in GitHub's settings.</span>
            </div>
        </template>
    </div>

    <!-- Connecting: full body loading state -->
    <template x-if="patConnecting">
        <div class="flex flex-col flex-1 items-center justify-center gap-[16px] px-[40px] py-[48px]">
            <svg class="animate-spin w-[28px] h-[28px] text-[var(--primary-120)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
            <p class="text-[14px] font-medium text-[var(--grayscale-70)] tracking-[-0.14px] m-0" x-text="loadingMessage"></p>
        </div>
    </template>

    <!-- Not connected: PAT input prompt -->
    <template x-if="!loadingStatus && !connected && !patConnecting">
        <div class="flex flex-col flex-1 gap-[20px] px-[40px] pt-[32px] pb-[24px]">

            <div class="flex items-center gap-[12px]">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="text-[var(--grayscale-30)] shrink-0">
                    <path fill-rule="evenodd" d="M12 2A10 10 0 002 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.45-1.15-1.11-1.46-1.11-1.46-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"></path>
                </svg>
                <div>
                    <p class="font-bold text-[15px] text-[var(--grayscale-80)] tracking-[-0.15px] m-0">GitHub Personal Access Token</p>
                    <p class="font-normal text-[12px] text-[var(--grayscale-50)] tracking-[-0.12px] m-0">Enter your token to browse and import repositories.</p>
                </div>
            </div>

            <!-- Token input + connect button -->
            <div class="flex flex-col gap-[6px] w-full">
                <div class="flex gap-[8px]">
                    <input type="password" x-model="patInput"
                           @keydown.enter="connectPAT()"
                           placeholder="Paste your token (ghp_… or github_pat_…)"
                           class="flex-1 h-[40px] border border-[var(--grayscale-20)] rounded-[8px] px-[12px] text-[13px] text-[var(--grayscale-100)] bg-white placeholder:text-[var(--grayscale-40)] focus:outline-none focus:border-[var(--primary-120)] focus:ring-1 focus:ring-[var(--primary-120)] transition-colors" />
                    <button type="button"
                            @click="connectPAT()"
                            :disabled="!patInput.trim() || patConnecting"
                            :class="(!patInput.trim() || patConnecting) ? 'opacity-50 cursor-not-allowed' : 'hover:bg-[#3a3f47] cursor-pointer'"
                            class="bg-[#24292F] rounded-[8px] h-[40px] px-[20px] text-[13px] font-bold text-white tracking-[-0.13px] transition-colors focus:outline-none shrink-0">
                        <span x-show="!patConnecting">Connect</span>
                        <svg x-show="patConnecting" class="animate-spin w-[14px] h-[14px] mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <p x-show="patError" x-text="patError"
                   class="text-[12px] text-red-500 tracking-[-0.12px] m-0"></p>
            </div>

            <!-- How to get a token -->
            <div class="bg-[var(--grayscale-5)] border border-[var(--grayscale-15)] rounded-[10px] px-[18px] py-[14px] w-full flex flex-col gap-[8px]">
                <p class="text-[11px] font-semibold text-[var(--grayscale-60)] tracking-[0.4px] uppercase m-0">How to get a token</p>
                <ol class="list-decimal list-inside flex flex-col gap-[5px] m-0 pl-[2px]">
                    <li class="text-[12px] text-[var(--grayscale-70)]">
                        <a href="https://github.com/settings/tokens" target="_blank" rel="noopener noreferrer"
                           class="text-[var(--primary-120)] underline">github.com/settings/tokens</a>
                    </li>
                    <li class="text-[12px] text-[var(--grayscale-70)]">
                        Click <strong>Generate new token (classic)</strong> or <strong>Fine-grained token</strong>
                    </li>
                    <li class="text-[12px] text-[var(--grayscale-70)]">
                        Select the <code class="bg-[var(--grayscale-15)] px-[4px] rounded text-[11px]">repo</code> scope (add <code class="bg-[var(--grayscale-15)] px-[4px] rounded text-[11px]">read:org</code> to include organizations)
                    </li>
                    <li class="text-[12px] text-[var(--grayscale-70)]">Copy the generated token and paste it above</li>
                </ol>
            </div>
        </div>
    </template>

    <!-- Main List Container (shown only when connected) -->
    <div x-show="!loadingStatus && connected" class="border-t border-[var(--grayscale-20)] w-full flex flex-col flex-1 shrink-0 pb-[32px]">
        
        <!-- Action Bar -->
        <div class="flex gap-[16px] items-center justify-between px-[40px] pt-[24px] pb-[16px] w-full">
            <!-- Search -->
            <div class="bg-[var(--grayscale-10)] rounded-[75px] h-[36px] flex items-center gap-[8px] px-[16px] flex-1 max-w-[880px] border border-transparent focus-within:border-[var(--primary-120)] transition-colors">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-[var(--grayscale-50)] shrink-0">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" x-model="searchQuery" placeholder="Search repos..." class="bg-transparent text-[13px] text-[var(--grayscale-90)] outline-none border-none placeholder-[var(--grayscale-50)] w-full">
            </div>
            
            <!-- Buttons -->
            <div class="flex gap-[12px] items-center w-[250px] shrink-0">
                <button type="button" @click="importAll()"
                        class="bg-[var(--grayscale-5)] border border-[var(--grayscale-30)] rounded-[8px] flex-1 h-[36px] text-[13px] font-medium text-[var(--primary-120)] tracking-[0] hover:bg-[var(--grayscale-10)] hover:border-[var(--grayscale-40)] transition-colors active:scale-[0.98] focus:outline-none">
                    Import All
                </button>
                <button type="button"
                        @click="importSelected()"
                        :class="importFeedback ? 'cursor-default' : (selectedRepos.length === 0 ? 'opacity-50 cursor-not-allowed' : '')"
                        class="bg-[var(--primary-120)] rounded-[8px] flex-1 h-[36px] text-[13px] font-bold text-white tracking-[0] hover:bg-opacity-90 transition-colors active:scale-[0.98] focus:outline-none">
                    <template x-if="!importFeedback">
                        <span>
                            Import
                            <span x-show="selectedRepos.length > 0" x-text="'(' + selectedRepos.length + ')'"></span>
                        </span>
                    </template>
                    <template x-if="importFeedback">
                        <span>&#10003; Imported!</span>
                    </template>
                </button>
            </div>
        </div>

        <!-- Table Header -->
        <div class="bg-[var(--grayscale-5)] border-y border-[var(--grayscale-20)] flex items-center w-full h-[40px]">
            <div class="flex items-center justify-center w-[72px] pl-[12px] pr-[12px] shrink-0 border-r border-[var(--grayscale-20)] h-full">
                <label class="cursor-pointer relative flex items-center justify-center p-2">
                    <input type="checkbox" class="sr-only" x-model="selectAll" @change="toggleSelectAll()">
                    <div class="w-[16px] h-[16px] rounded border-[1.5px] flex items-center justify-center transition-colors"
                         :class="selectAll ? 'bg-[var(--primary-120)] border-[var(--primary-120)]' : 'border-[var(--grayscale-40)]'">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                             :class="selectAll ? 'opacity-100' : 'opacity-0'"
                             class="transition-opacity"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                </label>
            </div>
            <div class="flex-1 min-w-[200px] border-r border-[var(--grayscale-20)] px-[16px] h-full flex items-center text-[12px] text-[var(--grayscale-100)] font-normal">
                Title
            </div>
            <div class="w-[160px] px-[16px] h-full flex items-center text-[12px] text-[var(--grayscale-100)] font-normal shrink-0 border-r border-[var(--grayscale-20)]">
                Branch
            </div>
            <div class="w-[240px] px-[16px] h-full flex items-center text-[12px] text-[var(--grayscale-100)] font-normal shrink-0">
                Last Updated
            </div>
        </div>

        <!-- Table Rows Container -->
        <div class="flex flex-col w-full h-full flex-1">
            
            <!-- Mock rows via Alpine loop over filteredRepos -->
            <template x-for="repo in filteredRepos" :key="repo.id">
                <div class="border-b border-[var(--grayscale-20)] flex items-center w-full min-h-[48px] hover:bg-[var(--primary-20)]/20 transition-colors"
                     :class="selectedRepos.some(v => String(v) === String(repo.id)) ? 'bg-[var(--primary-20)]/30' : 'bg-white'"
                     @set-branch.window="if ($event.detail.id === repo.id) $dispatch('_noop')"><!-- set-branch handled by parent -->

                    <!-- Checkbox -->
                    <div class="flex items-center justify-center w-[72px] pl-[12px] pr-[12px] shrink-0 h-full">
                        <label class="cursor-pointer relative flex items-center justify-center p-2">
                            <input type="checkbox" class="sr-only" :value="repo.id" x-model="selectedRepos">
                            <div class="w-[16px] h-[16px] rounded border-[1.5px] flex items-center justify-center transition-colors"
                                 :class="selectedRepos.some(v => String(v) === String(repo.id)) ? 'bg-[var(--primary-120)] border-[var(--primary-120)]' : 'border-[var(--grayscale-40)]'">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                                     :class="selectedRepos.some(v => String(v) === String(repo.id)) ? 'opacity-100' : 'opacity-0'"
                                     class="transition-opacity"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                        </label>
                    </div>

                    <!-- Title -->
                    <div class="flex-1 min-w-[200px] px-[16px] py-[12px] flex items-center">
                        <span class="font-medium text-[13px] text-[var(--grayscale-100)] tracking-[0]" x-text="repo.name"></span>
                    </div>

                    <!-- Branch Dropdown (eager: branches pre-loaded in parallel when repos are fetched) -->
                    <div class="w-[160px] px-[16px] py-[12px] flex items-center shrink-0 relative"
                         x-data="{ branchOpen: false }"
                         @click.outside="branchOpen = false">
                        <button
                            @click="branchOpen = !branchOpen"
                            class="w-full bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] rounded-[4px] flex gap-[8px] items-center px-[10px] py-[6px] justify-between cursor-pointer hover:bg-[var(--grayscale-10)] transition-colors"
                            :class="branchOpen ? 'border-[var(--primary-120)] bg-[var(--primary-20)]' : ''">
                            <span class="font-medium text-[13px] text-[var(--grayscale-80)] tracking-[-0.13px] truncate" x-text="itemBranches[repo.id] || repo.defaultBranch || 'main'"></span>
                            <svg x-show="!allBranches[repo.id]" class="animate-spin w-[12px] h-[12px] text-[var(--grayscale-40)] shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                            <svg x-show="allBranches[repo.id]" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                 class="text-[var(--grayscale-80)] shrink-0 transition-transform"
                                 :class="branchOpen ? 'rotate-180' : ''">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <!-- Branch Dropdown Menu -->
                        <div x-show="branchOpen"
                             x-transition:enter="transition ease-out duration-100"
                             x-transition:enter-start="opacity-0 -translate-y-2"
                             x-transition:enter-end="opacity-100 translate-y-0"
                             class="absolute top-full left-0 mt-[4px] w-[160px] bg-white border border-[var(--grayscale-20)] rounded-[6px] shadow-lg z-50 max-h-[220px] overflow-y-auto">
                            <template x-if="!allBranches[repo.id]">
                                <div class="flex items-center justify-center py-[12px]">
                                    <svg class="animate-spin w-[14px] h-[14px] text-[var(--grayscale-50)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                                </div>
                            </template>
                            <template x-if="allBranches[repo.id]">
                                <div>
                                    <template x-for="branch in allBranches[repo.id]" :key="branch">
                                        <button
                                            @click="$dispatch('set-branch', { id: repo.id, branch, fullName: repo.fullName }); branchOpen = false"
                                            class="w-full text-left px-[12px] py-[10px] text-[13px] font-medium text-[var(--grayscale-80)] hover:bg-[var(--primary-20)] hover:text-[var(--primary-120)] transition-colors"
                                            :class="(itemBranches[repo.id] || repo.defaultBranch) === branch ? 'bg-[var(--primary-20)] text-[var(--primary-120)]' : ''">
                                            <span x-text="branch"></span>
                                        </button>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Last Updated / Imported status -->
                    <div class="w-[240px] px-[16px] py-[12px] flex items-center shrink-0">
                        <template x-if="!importedRepos.includes(repo.id)">
                            <span class="text-[13px] text-[var(--grayscale-60)] font-normal tracking-[0]" x-text="formatUpdatedAt(allBranchDates[repo.id]?.[itemBranches[repo.id] || repo.defaultBranch] ?? branchUpdatedAt[repo.id] ?? repo.updatedAt)"></span>
                        </template>
                        <template x-if="importedRepos.includes(repo.id)">
                            <span class="inline-flex items-center gap-[4px] text-[13px] text-[var(--primary-120)] font-medium tracking-[0]">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                Imported
                            </span>
                        </template>
                    </div>
                </div>
            </template>
        
        </div>

    </div>

</div>
