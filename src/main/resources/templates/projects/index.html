<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Projects')}"></head>
<body class="flex flex-col min-h-screen bg-[var(--grayscale-5)] relative" x-data="{ openPanel: null }" :class="openPanel ? 'overflow-hidden h-screen' : ''">

    <header th:replace="~{fragments/topbar :: simple-topbar('Projects')}"></header>

    <main class="w-full flex flex-col gap-[40px] mt-[40px] pb-[80px]">

        <!-- Add Projects -->
        <section class="flex flex-col gap-[20px] px-[60px] w-full shrink-0">
            <div class="flex gap-[10px] items-center w-full">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--grayscale-100)]" aria-hidden="true">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <h3 class="font-bold text-[22px] text-[var(--grayscale-100)] tracking-[-0.22px] leading-[1.3]">Add Projects</h3>
            </div>

            <div class="flex flex-wrap gap-[24px] items-stretch w-full">
                <button type="button" @click="openPanel = 'cli'"
                   class="bg-[var(--background-dark)] flex flex-1 flex-col gap-[14px] items-start min-w-[320px] p-[24px] rounded-[10px] text-left transition-all hover:translate-y-[-2px] hover:shadow-lg no-underline cursor-pointer focus:outline-none">
                    <div class="flex gap-[12px] items-center w-full">
                        <svg class="w-[22px] h-[22px] text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="4 17 10 11 4 5"></polyline>
                            <line x1="12" y1="19" x2="20" y2="19"></line>
                        </svg>
                        <span class="font-bold text-[20px] text-white tracking-[-0.2px] leading-[1.3]">CLI Integration</span>
                    </div>
                    <p class="font-normal text-[13px] leading-[1.5] text-white/80 tracking-[-0.13px] w-full">
                        Run fast and secure scans directly on your local machine or build server without uploading source code.
                    </p>
                    <div class="flex flex-wrap gap-[8px] items-center w-full mt-[4px]">
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-medium text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">High Security</span>
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-medium text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">No Source Code Upload</span>
                    </div>
                </button>

                <button type="button" @click="openPanel = 'git'"
                   class="bg-[var(--background-dark)] flex flex-1 flex-col gap-[14px] items-start min-w-[320px] p-[24px] rounded-[10px] text-left transition-all hover:translate-y-[-2px] hover:shadow-lg no-underline cursor-pointer focus:outline-none">
                    <div class="flex gap-[12px] items-center w-full">
                        <svg class="w-[22px] h-[22px] text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                        </svg>
                        <span class="font-bold text-[20px] text-white tracking-[-0.2px] leading-[1.3]">Connect to Git</span>
                    </div>
                    <p class="font-normal text-[13px] leading-[1.5] text-white/80 tracking-[-0.13px] w-full">
                        Connect your GitHub, GitLab, or Bitbucket account to automatically scan your repositories in minutes.
                    </p>
                    <div class="flex flex-wrap gap-[8px] items-center w-full mt-[4px]">
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-medium text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">Quick Setup</span>
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-medium text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">Auth Required</span>
                    </div>
                </button>
            </div>
        </section>

        <!-- Select a Project -->
        <section class="flex flex-col gap-[20px] px-[60px] w-full shrink-0">
            <div class="flex gap-[10px] items-center w-full">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--grayscale-100)]" aria-hidden="true">
                    <path d="M3 7a2 2 0 0 1 2-2h4l2 2.5h8a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
                </svg>
                <h3 class="font-bold text-[22px] text-[var(--grayscale-100)] tracking-[-0.22px] leading-[1.3]">Select a Project</h3>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-[24px] w-full">
                <a th:each="project : ${projects}"
                   th:href="@{|/projects/${project.id}/security-center|}"
                   class="bg-white border border-[var(--grayscale-20)] flex flex-col gap-[24px] items-start px-[24px] py-[28px] rounded-[10px] transition-all hover:shadow-md hover:border-[var(--primary-80)] cursor-pointer no-underline text-inherit">

                    <div class="flex flex-col gap-[6px] items-start w-full shrink-0">
                        <div class="flex gap-[8px] items-center w-full">
                            <p class="flex-1 font-bold text-[18px] text-[var(--grayscale-100)] tracking-[-0.18px] leading-[1.3]"
                               th:text="${project.name}">Project Name</p>
                            <span class="flex flex-col justify-between items-center w-[4px] h-[16px] py-[1px]" aria-hidden="true">
                                <span class="w-[4px] h-[4px] rounded-full bg-[var(--grayscale-100)]"></span>
                                <span class="w-[4px] h-[4px] rounded-full bg-[var(--grayscale-100)]"></span>
                                <span class="w-[4px] h-[4px] rounded-full bg-[var(--grayscale-100)]"></span>
                            </span>
                        </div>
                        <p class="font-normal text-[11px] text-[var(--grayscale-60)] tracking-[-0.11px] leading-[1.3]"
                           th:text="'Last Scanned : ' + ${project.lastScanned}">Last Scanned : 2026.04.04</p>
                    </div>

                    <div class="w-full"
                         th:replace="~{fragments/risk-graph :: riskGraph('Security Risk', ${project.securityCritical}, ${project.securityHigh}, ${project.securityMedium}, ${project.securityLow})}"></div>
                    <div class="w-full"
                         th:replace="~{fragments/risk-graph :: riskGraph('License Risk', ${project.licenseCritical}, ${project.licenseHigh}, ${project.licenseMedium}, ${project.licenseLow})}"></div>
                </a>
            </div>
        </section>

    </main>
    <!-- Slide-out Background Overlay -->
    <div x-show="openPanel !== null" 
         x-transition.opacity 
         class="fixed inset-0 bg-black/30 z-[100]" 
         @click="openPanel = null" 
         style="display: none;"></div>

    <!-- CLI Integration Panel -->
    <div x-show="openPanel === 'cli'" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed top-0 right-0 h-screen w-full max-w-[880px] z-[110] bg-white shadow-2xl flex flex-col"
         style="display: none;">
         
         <div th:replace="~{projects/cli-integration :: slideout}"></div>
    </div>

    <!-- Git Integration Panel -->
    <div x-show="openPanel === 'git'" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed top-0 right-0 h-screen w-full max-w-[960px] z-[110] bg-white shadow-2xl flex flex-col"
         style="display: none;">
         
         <div th:replace="~{projects/git-integration :: slideout}"></div>
    </div>

</body>
</html>
