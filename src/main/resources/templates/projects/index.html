<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Projects')}"></head>
<body class="flex flex-col min-h-screen bg-[var(--grayscale-5)]">

    <header th:replace="~{fragments/topbar :: simple-topbar('Projects')}"></header>

    <main class="w-full flex flex-col gap-[32px] mt-8 pb-[80px]">

        <!-- Add Projects -->
        <section class="flex flex-col gap-[16px] px-[84px] w-full shrink-0">
            <div class="flex gap-[12px] items-center w-full">
                <div class="w-[20px] h-[20px] flex justify-center items-center">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--grayscale-100)]">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>
                <h3 class="font-bold text-[20px] text-[var(--grayscale-100)] tracking-[-0.2px]">Add Projects</h3>
            </div>

            <div class="flex flex-wrap gap-[24px] items-center w-full">
                <button type="button" class="bg-[var(--background-dark)] flex flex-1 flex-col gap-[12px] items-start min-w-[280px] p-[22px] rounded-[10px] text-left transition-transform hover:scale-[1.01]">
                    <div class="flex gap-[12px] items-center w-full">
                        <div class="w-[20px] h-[20px] text-white">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"></path><polyline points="7 9 12 4 17 9"></polyline><line x1="12" y1="4" x2="12" y2="16"></line></svg>
                        </div>
                        <span class="font-bold text-[20px] text-white tracking-[-0.2px]">CLI Integration</span>
                    </div>
                    <p class="font-normal text-[12px] text-white/80 tracking-[-0.12px] w-full">
                        Run fast and secure scans directly on your local machine or build server without uploading source code.
                    </p>
                    <div class="flex flex-wrap gap-[12px] items-center w-full mt-2">
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-normal text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">High Security</span>
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-normal text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">No Source Code Upload</span>
                    </div>
                </button>

                <button type="button" class="bg-[var(--background-dark)] flex flex-1 flex-col gap-[12px] items-start min-w-[280px] p-[22px] rounded-[10px] text-left transition-transform hover:scale-[1.01]">
                    <div class="flex gap-[12px] items-center w-full">
                        <div class="w-[20px] h-[20px] text-white">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                        </div>
                        <span class="font-bold text-[20px] text-white tracking-[-0.2px]">Connect to Git</span>
                    </div>
                    <p class="font-normal text-[12px] text-white/80 tracking-[-0.12px] w-full">
                        Connect your GitHub, GitLab, or Bitbucket account to automatically scan your repositories in minutes.
                    </p>
                    <div class="flex flex-wrap gap-[12px] items-center w-full mt-2">
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-normal text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">Quick Setup</span>
                        <span class="bg-white/15 px-[12px] py-[4px] rounded-[20px] font-normal text-[11px] text-[var(--secondary-20)] tracking-[-0.11px]">Auth Required</span>
                    </div>
                </button>
            </div>
        </section>

        <!-- Select a Project -->
        <section class="flex flex-col gap-[16px] px-[84px] w-full shrink-0 mt-8">
            <div class="flex gap-[12px] items-center w-full">
                <div class="w-[20px] h-[20px] flex justify-center items-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--grayscale-100)]"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <h3 class="font-bold text-[22px] text-[var(--grayscale-100)] tracking-[-0.22px]">Select a Project</h3>
            </div>

            <div class="flex flex-wrap gap-[24px] items-start w-full">
                <a th:each="project : ${projects}"
                   th:href="@{|/projects/${project.id}/security-center|}"
                   class="bg-white border border-[var(--grayscale-20)] flex flex-col gap-[24px] items-start max-w-[600px] min-w-[360px] px-[24px] py-[28px] rounded-[8px] flex-1 transition-shadow hover:shadow-md cursor-pointer no-underline text-inherit">

                    <div class="flex flex-col gap-[8px] items-start w-full shrink-0">
                        <div class="flex gap-[8px] items-center w-full">
                            <p class="flex-1 font-bold text-[18px] text-[var(--grayscale-100)] tracking-[-0.18px]"
                               th:text="${project.name}">Project Name</p>
                            <div class="w-[4px] h-[14px] flex flex-col justify-between items-center text-[var(--grayscale-100)]">
                                <div class="w-[3px] h-[3px] bg-current rounded-full"></div>
                                <div class="w-[3px] h-[3px] bg-current rounded-full"></div>
                                <div class="w-[3px] h-[3px] bg-current rounded-full"></div>
                            </div>
                        </div>
                        <p class="font-normal text-[11px] text-[var(--grayscale-60)] tracking-[-0.11px]"
                           th:text="'Last Scanned : ' + ${project.lastScanned}">Last Scanned : 2026.04.04</p>
                    </div>

                    <div th:replace="~{fragments/risk-graph :: riskGraph('Security Risk', ${project.criticalRisk}, ${project.highRisk}, ${project.mediumRisk}, ${project.lowRisk})}"></div>
                    <div th:replace="~{fragments/risk-graph :: riskGraph('License Risk', ${project.criticalRisk}, ${project.highRisk}, ${project.mediumRisk}, ${project.lowRisk})}"></div>
                </a>
            </div>
        </section>

    </main>
</body>
</html>
