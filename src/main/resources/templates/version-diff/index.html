<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Version Diff')}"></head>
<body class="flex flex-col min-h-screen bg-[var(--grayscale-5)]"
      th:attr="data-project-id=${projectId},data-from-scan-id=${fromScanId},data-to-scan-id=${toScanId}"
      x-data="versionDiffPage()"
      x-init="init()">

    <header th:replace="~{fragments/topbar :: versiondiff-topbar(${projectId}, ${projectName})}"></header>

    <!-- ── Compare bar ──────────────────────────────────────────────────── -->
    <div class="bg-white border-b border-[var(--grayscale-15)] px-[60px] py-[16px] flex items-center gap-[16px] shrink-0">
        <span class="text-[14px] font-medium text-[var(--grayscale-60)] tracking-[-0.14px] shrink-0">Compare</span>

        <!-- From version selector -->
        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
            <button type="button"
                    @click="open = !open"
                    class="flex items-center gap-[8px] bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] rounded-[6px] px-[12px] py-[7px] text-[14px] font-medium text-[var(--grayscale-90)] tracking-[-0.14px] hover:border-[var(--grayscale-40)] transition min-w-[160px]">
                <span th:text="${fromVersion}">-</span>
                <svg class="ml-auto transition-transform" :class="open && 'rotate-180'" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div x-show="open" x-transition style="display:none"
                 class="absolute left-0 top-[40px] z-30 min-w-[180px] bg-white border border-[var(--grayscale-20)] rounded-[8px] shadow-xl py-[6px]">
                <th:block th:each="v : ${scanVersions}">
                    <button type="button"
                            th:attr="data-scan-id=${v.scanId},data-version=${v.version}"
                            @click="selectFrom($el.dataset.scanId, $el.dataset.version); open = false"
                            class="w-full flex items-center justify-between px-[12px] py-[8px] text-[13px] text-[var(--grayscale-80)] hover:bg-[var(--grayscale-5)] transition text-left">
                        <span th:text="${v.version}">-</span>
                        <span th:text="${v.scannedAt}" class="text-[11px] text-[var(--grayscale-40)]">-</span>
                    </button>
                </th:block>
            </div>
        </div>

        <!-- Arrow -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary-100)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>

        <!-- To version selector -->
        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
            <button type="button"
                    @click="open = !open"
                    class="flex items-center gap-[8px] bg-[var(--grayscale-5)] border border-[var(--grayscale-20)] rounded-[6px] px-[12px] py-[7px] text-[14px] font-medium text-[var(--grayscale-90)] tracking-[-0.14px] hover:border-[var(--grayscale-40)] transition min-w-[160px]">
                <span th:text="${toVersion}">-</span>
                <svg class="ml-auto transition-transform" :class="open && 'rotate-180'" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div x-show="open" x-transition style="display:none"
                 class="absolute left-0 top-[40px] z-30 min-w-[180px] bg-white border border-[var(--grayscale-20)] rounded-[8px] shadow-xl py-[6px]">
                <th:block th:each="v : ${scanVersions}">
                    <button type="button"
                            th:attr="data-scan-id=${v.scanId},data-version=${v.version}"
                            @click="selectTo($el.dataset.scanId, $el.dataset.version); open = false"
                            class="w-full flex items-center justify-between px-[12px] py-[8px] text-[13px] text-[var(--grayscale-80)] hover:bg-[var(--grayscale-5)] transition text-left">
                        <span th:text="${v.version}">-</span>
                        <span th:text="${v.scannedAt}" class="text-[11px] text-[var(--grayscale-40)]">-</span>
                    </button>
                </th:block>
            </div>
        </div>

        <div class="flex-1"></div>

        <!-- Total changes badge -->
        <span th:if="${totalCount > 0}"
              th:text="${totalCount} + ' changes found'"
              class="text-[14px] font-semibold text-[var(--primary-120)] tracking-[-0.14px]">0 changes found</span>
        <span th:if="${totalCount == 0}"
              class="text-[14px] font-medium text-[var(--grayscale-40)] tracking-[-0.14px]">No changes found</span>
    </div>

    <main class="flex-1 px-[60px] py-[40px] flex flex-col gap-[32px]">

        <!-- ── Summary cards ────────────────────────────────────────────── -->
        <div class="grid grid-cols-4 gap-[20px]">
            <!-- Added -->
            <div class="bg-[var(--background-dark)] rounded-[12px] px-[28px] py-[24px] flex flex-col items-center gap-[6px]">
                <span class="text-[36px] font-bold text-[var(--secondary-100)] tracking-[-0.5px]"
                      th:text="'+' + ${addedCount}">+0</span>
                <span class="text-[14px] font-medium text-white/60 tracking-[-0.14px]">Added</span>
            </div>
            <!-- Removed -->
            <div class="bg-[var(--background-dark)] rounded-[12px] px-[28px] py-[24px] flex flex-col items-center gap-[6px]">
                <span class="text-[36px] font-bold text-[#f47a29] tracking-[-0.5px]"
                      th:text="'-' + ${removedCount}">-0</span>
                <span class="text-[14px] font-medium text-white/60 tracking-[-0.14px]">Removed</span>
            </div>
            <!-- Updated -->
            <div class="bg-[var(--background-dark)] rounded-[12px] px-[28px] py-[24px] flex flex-col items-center gap-[6px]">
                <div class="flex items-center gap-[4px]">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--secondary-100)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    <span class="text-[36px] font-bold text-[var(--secondary-100)] tracking-[-0.5px]"
                          th:text="${updatedCount}">0</span>
                </div>
                <span class="text-[14px] font-medium text-white/60 tracking-[-0.14px]">Updated</span>
            </div>
            <!-- New Threats -->
            <div class="bg-[var(--background-dark)] rounded-[12px] px-[28px] py-[24px] flex flex-col items-center gap-[6px]">
                <span class="text-[36px] font-bold text-[#f47a29] tracking-[-0.5px]"
                      th:text="${newThreatCount}">0</span>
                <span class="text-[14px] font-medium text-white/60 tracking-[-0.14px]">New Threats</span>
            </div>
        </div>

        <!-- ── Diff table ────────────────────────────────────────────────── -->
        <div class="bg-white rounded-[12px] border border-[var(--grayscale-15)] overflow-hidden"
             x-data="{ tab: 'all' }">

            <!-- Filter tabs -->
            <div class="flex items-center gap-[0px] border-b border-[var(--grayscale-15)] px-[24px]">
                <button type="button"
                        @click="tab = 'all'"
                        class="flex items-center gap-[6px] px-[4px] py-[16px] mr-[24px] text-[14px] font-medium tracking-[-0.14px] transition-colors border-b-2 -mb-px"
                        :class="tab === 'all' ? 'text-[var(--grayscale-100)] border-[var(--grayscale-100)]' : 'text-[var(--grayscale-50)] border-transparent hover:text-[var(--grayscale-80)]'">
                    ALL
                    <span class="text-[var(--grayscale-50)] font-normal" th:text="${totalCount}">0</span>
                </button>
                <button type="button"
                        @click="tab = 'added'"
                        class="flex items-center gap-[6px] px-[4px] py-[16px] mr-[24px] text-[14px] font-medium tracking-[-0.14px] transition-colors border-b-2 -mb-px"
                        :class="tab === 'added' ? 'text-[var(--grayscale-100)] border-[var(--grayscale-100)]' : 'text-[var(--grayscale-50)] border-transparent hover:text-[var(--grayscale-80)]'">
                    Added
                    <span class="text-[var(--grayscale-50)] font-normal" th:text="${addedCount}">0</span>
                </button>
                <button type="button"
                        @click="tab = 'removed'"
                        class="flex items-center gap-[6px] px-[4px] py-[16px] mr-[24px] text-[14px] font-medium tracking-[-0.14px] transition-colors border-b-2 -mb-px"
                        :class="tab === 'removed' ? 'text-[var(--grayscale-100)] border-[var(--grayscale-100)]' : 'text-[var(--grayscale-50)] border-transparent hover:text-[var(--grayscale-80)]'">
                    Removed
                    <span class="text-[var(--grayscale-50)] font-normal" th:text="${removedCount}">0</span>
                </button>
                <button type="button"
                        @click="tab = 'updated'"
                        class="flex items-center gap-[6px] px-[4px] py-[16px] mr-[24px] text-[14px] font-medium tracking-[-0.14px] transition-colors border-b-2 -mb-px"
                        :class="tab === 'updated' ? 'text-[var(--grayscale-100)] border-[var(--grayscale-100)]' : 'text-[var(--grayscale-50)] border-transparent hover:text-[var(--grayscale-80)]'">
                    Updated
                    <span class="text-[var(--grayscale-50)] font-normal" th:text="${updatedCount}">0</span>
                </button>
                <button type="button"
                        @click="tab = 'newThreat'"
                        class="flex items-center gap-[6px] px-[4px] py-[16px] text-[14px] font-medium tracking-[-0.14px] transition-colors border-b-2 -mb-px"
                        :class="tab === 'newThreat' ? 'text-[var(--grayscale-100)] border-[var(--grayscale-100)]' : 'text-[var(--grayscale-50)] border-transparent hover:text-[var(--grayscale-80)]'">
                    New Threats
                    <span class="text-[var(--grayscale-50)] font-normal" th:text="${newThreatCount}">0</span>
                </button>
            </div>

            <!-- Column headers row — Figma 481-46547 style -->
            <div class="flex border-b border-[var(--grayscale-15)] bg-[var(--grayscale-5)]">
                <div class="flex-1 flex items-center gap-[8px] px-[24px] py-[10px] border-r border-[var(--grayscale-10)]">
                    <span class="text-[13px] font-semibold text-[var(--grayscale-70)] tracking-[-0.13px]"
                          th:text="${fromVersion}">From</span>
                </div>
                <div class="flex-1 flex items-center gap-[8px] px-[24px] py-[10px]">
                    <span class="text-[13px] font-semibold text-[var(--grayscale-70)] tracking-[-0.13px]"
                          th:text="${toVersion}">To</span>
                </div>
            </div>

            <!-- Table rows -->
            <div th:if="${#lists.isEmpty(diffRows)}"
                 class="flex flex-col items-center gap-[12px] py-[80px] text-[var(--grayscale-40)]">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p class="text-[14px] font-medium">No differences found between the two versions.</p>
            </div>

            <div th:unless="${#lists.isEmpty(diffRows)}">
                <div th:each="row, stat : ${diffRows}"
                     th:attr="data-change-type=${row.changeType}"
                     class="diff-row flex items-stretch border-b border-[var(--grayscale-10)] last:border-b-0 hover:bg-[var(--grayscale-5)] transition-colors"
                     x-show="tab === 'all'
                         || (tab === 'added'     &amp;&amp; $el.dataset.changeType === 'ADDED')
                         || (tab === 'removed'   &amp;&amp; $el.dataset.changeType === 'REMOVED')
                         || (tab === 'updated'   &amp;&amp; $el.dataset.changeType === 'UPDATED')
                         || (tab === 'newThreat' &amp;&amp; $el.dataset.changeType === 'NEW_THREAT')">

                    <!-- Left column (fromScan) -->
                    <div class="flex-1 flex items-center gap-[10px] px-[24px] py-[14px] border-r border-[var(--grayscale-10)]">
                        <!-- Risk dot -->
                        <span th:if="${row.fromRiskLevel != null}"
                              class="w-[8px] h-[8px] rounded-full shrink-0"
                              th:classappend="${row.fromRiskLevel == 'CRITICAL'} ? ' bg-[var(--risk-critical)]'
                                           : (${row.fromRiskLevel == 'HIGH'}     ? ' bg-[var(--risk-high)]'
                                           : (${row.fromRiskLevel == 'MEDIUM'}   ? ' bg-[var(--risk-medium)]'
                                           : ' bg-[var(--grayscale-30)]'))"></span>
                        <span th:if="${row.fromRiskLevel == null}"
                              class="w-[8px] h-[8px] rounded-full bg-[var(--grayscale-20)] shrink-0"></span>
                        <span class="text-[13px] font-medium text-[var(--grayscale-80)] tracking-[-0.13px] truncate"
                              th:text="${row.fromName != null ? row.fromName : '-'}">-</span>
                        <span th:if="${row.fromVersion != null}"
                              class="text-[12px] text-[var(--grayscale-50)] tracking-[-0.12px] shrink-0"
                              th:text="${row.fromVersion}">-</span>
                        <span th:if="${row.fromRiskLevel != null and row.fromRiskLevel != 'NONE'}"
                              class="ml-auto shrink-0 px-[8px] py-[2px] rounded-[20px] text-[11px] font-medium tracking-[-0.11px]"
                              th:classappend="${row.fromRiskLevel == 'CRITICAL'} ? ' bg-red-100 text-red-700'
                                           : (${row.fromRiskLevel == 'HIGH'}     ? ' bg-orange-100 text-orange-700'
                                           : (${row.fromRiskLevel == 'MEDIUM'}   ? ' bg-yellow-100 text-yellow-700'
                                           : ' bg-[var(--grayscale-10)] text-[var(--grayscale-60)]'))"
                              th:text="${#strings.capitalize(#strings.toLowerCase(row.fromRiskLevel))} + ' Risk'">Low Risk</span>
                    </div>

                    <!-- Right column (toScan) -->
                    <div class="flex-1 flex items-center gap-[10px] px-[24px] py-[14px]">
                        <!-- Risk dot -->
                        <span th:if="${row.toRiskLevel != null}"
                              class="w-[8px] h-[8px] rounded-full shrink-0"
                              th:classappend="${row.toRiskLevel == 'CRITICAL'} ? ' bg-[var(--risk-critical)]'
                                           : (${row.toRiskLevel == 'HIGH'}     ? ' bg-[var(--risk-high)]'
                                           : (${row.toRiskLevel == 'MEDIUM'}   ? ' bg-[var(--risk-medium)]'
                                           : ' bg-[var(--grayscale-30)]'))"></span>
                        <span th:if="${row.toRiskLevel == null}"
                              class="w-[8px] h-[8px] rounded-full bg-[var(--grayscale-20)] shrink-0"></span>
                        <span class="text-[13px] font-medium text-[var(--grayscale-80)] tracking-[-0.13px] truncate"
                              th:text="${row.toName != null ? row.toName : '-'}">-</span>
                        <span th:if="${row.toVersion != null}"
                              class="text-[12px] text-[var(--grayscale-50)] tracking-[-0.12px] shrink-0"
                              th:text="${row.toVersion}">-</span>
                        <span th:if="${row.toRiskLevel != null and row.toRiskLevel != 'NONE'}"
                              class="shrink-0 px-[8px] py-[2px] rounded-[20px] text-[11px] font-medium tracking-[-0.11px]"
                              th:classappend="${row.toRiskLevel == 'CRITICAL'} ? ' bg-red-100 text-red-700'
                                           : (${row.toRiskLevel == 'HIGH'}     ? ' bg-orange-100 text-orange-700'
                                           : (${row.toRiskLevel == 'MEDIUM'}   ? ' bg-yellow-100 text-yellow-700'
                                           : ' bg-[var(--grayscale-10)] text-[var(--grayscale-60)]'))"
                              th:text="${#strings.capitalize(#strings.toLowerCase(row.toRiskLevel))} + ' Risk'">Low Risk</span>

                        <!-- Change type tag (right-most) -->
                        <span class="ml-auto shrink-0 text-[12px] font-semibold tracking-[-0.12px] whitespace-nowrap"
                              th:classappend="${row.changeType.name() == 'ADDED'}      ? ' text-[var(--secondary-60)]'
                                           : (${row.changeType.name() == 'REMOVED'}    ? ' text-red-500'
                                           : (${row.changeType.name() == 'NEW_THREAT'} ? ' text-[#f47a29]'
                                           : ' text-[#3b82f6]'))">
                            <th:block th:switch="${row.changeType.name()}">
                                <span th:case="'ADDED'">+ Added</span>
                                <span th:case="'REMOVED'">- Removed</span>
                                <span th:case="'UPDATED'">↑ Updated</span>
                                <span th:case="'NEW_THREAT'">⚠ New Threat</span>
                            </th:block>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    function versionDiffPage() {
        const body = document.body;
        return {
            fromLabel: body.dataset.fromScanId ? null : '-',
            toLabel:   body.dataset.toScanId   ? null : '-',
            init() {
                // labels already rendered server-side via th:text, nothing to do
            },
            selectFrom(scanId, version) {
                const toId = body.dataset.toScanId;
                window.location.href = `/projects/${body.dataset.projectId}/version-diff?from=${scanId}&to=${toId || ''}`;
            },
            selectTo(scanId, version) {
                const fromId = body.dataset.fromScanId;
                window.location.href = `/projects/${body.dataset.projectId}/version-diff?from=${fromId || ''}&to=${scanId}`;
            }
        };
    }
    </script>

    <style>
    .diff-table-grid { grid-template-columns: 1fr 1fr; }
    </style>

</body>
</html>
