<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" th:href="@{/icon/icon-logo.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <link rel="stylesheet" th:href="@{/css/globals.css}">
    <title th:text="#{error.404.title}">404 - Page Not Found</title>
</head>
<body class="min-h-screen flex flex-col m-0">
<div th:replace="~{error/_owl-error :: page(code='404', title=#{error.404.title}, descHtml=#{error.404.description}, buttonText=#{error.404.btn}, buttonHref=@{/})}">placeholder</div>
<footer th:replace="~{fragments/footer :: site-footer}"></footer>
</body>
</html>
