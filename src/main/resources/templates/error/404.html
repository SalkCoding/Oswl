<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 24px;
      text-align: center;
    }

    .owl-wrapper {
      width: 300px;
      height: 300px;
      margin-bottom: 8px;
    }

    #owl-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Eyelid blink animation — scales from top-center of the ellipse */
    .eyelid {
      transform-box: fill-box;
      transform-origin: center top;
      transition: transform 130ms ease;
    }

    .error-code {
      font-size: 112px;
      font-weight: 800;
      line-height: 1;
      color: #001D35;
      letter-spacing: -6px;
    }

    .error-title {
      font-size: 22px;
      font-weight: 600;
      color: #001D35;
    }

    .error-description {
      font-size: 14px;
      color: #5a6a7a;
      line-height: 1.7;
    }

    .home-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      background: #001D35;
      color: #CCF5EC;
      padding: 11px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }

    .home-button:hover  { background: #0a2f52; transform: translateY(-1px); }
    .home-button:active { transform: translateY(0); }

    .home-button svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="error-container">

    <!-- ─── Owl character (inline SVG, viewBox 800×800) ─── -->
    <div class="owl-wrapper">
      <svg id="owl-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

        <!-- ══════════════ STATIC: body & feet ══════════════ -->
        <g id="body-static">

          <!-- Left foot: leg rect + 3 claw paths -->
          <rect fill="#33D1B7" x="359.47" y="561.64" width="16.83" height="45.51"/>
          <path fill="#33D1B7" d="M361.43,610.31c-.66-4.15-7.08-7.12-12.16-7.37-15.32-.76-26.08,22.76-27.64,26.17-2.51,5.5-6.55,16.57-5.16,32.06,3.03-6.93,8.44-17.05,18.06-26.53,13.73-13.53,27.95-17.76,26.9-24.32Z"/>
          <path fill="#33D1B7" d="M375.68,605.78c-1.86-3.77-8.87-4.69-13.8-3.42-14.86,3.83-18.13,29.48-18.61,33.2-.77,5.99-1.33,17.77,4.61,32.15.83-7.51,2.98-18.79,9.35-30.7,9.08-17,21.4-25.26,18.45-31.22Z"/>
          <path fill="#33D1B7" d="M392.13,605.52c-2.2-3.24-8.92-3.16-13.43-1.33-13.56,5.53-13.63,29.74-13.64,33.24-.01,5.66.85,16.64,8.14,29.17-.1-7.07.6-17.81,5.2-29.69,6.56-16.96,17.21-26.26,13.72-31.39Z"/>

          <!-- Right foot: leg rect + 3 claw paths -->
          <rect fill="#33D1B7" x="433.39" y="561.64" width="16.83" height="45.51"/>
          <path fill="#33D1B7" d="M448.25,610.31c.66-4.15,7.08-7.12,12.16-7.37,15.32-.76,26.08,22.76,27.64,26.17,2.51,5.5,6.55,16.57,5.16,32.06-3.03-6.93-8.44-17.05-18.06-26.53-13.73-13.53-27.95-17.76-26.9-24.32Z"/>
          <path fill="#33D1B7" d="M434,605.78c1.86-3.77,8.87-4.69,13.8-3.42,14.86,3.83,18.13,29.48,18.61,33.2.77,5.99,1.33,17.77-4.61,32.15-.83-7.51-2.98-18.79-9.35-30.7-9.08-17-21.4-25.26-18.45-31.22Z"/>
          <path fill="#33D1B7" d="M417.56,605.52c2.2-3.24,8.92-3.16,13.43-1.33,13.56,5.53,13.63,29.74,13.64,33.24.01,5.66-.85,16.64-8.14,29.17.1-7.07-.6-17.81-5.2-29.69-6.56-16.96-17.21-26.26-13.72-31.39Z"/>

          <!-- Belly (mint) -->
          <path fill="#CCF5EC" d="M399.84,290.31c-39.06,0-76.02,8.99-108.93,25l10.5,38.21-9.93,192.73c6.56,6.89,45.44,46.36,108.13,46.53,63.15.17,102.4-39.68,108.92-46.53v-221.29l2.83-8.36c-33.56-16.81-71.43-26.28-111.51-26.28Z"/>

          <!-- Dark body (unified path from owl-body.svg) -->
          <path fill="#001D35" d="M559.75,417.82c-1.33-32-11.82-57.59-21.43-74.82-6.67-11.95-16.86-21.52-29.17-27.5-23.69-11.51-61.52-25.22-109.3-25.19-47.63.03-85.34,13.71-108.99,25.2-12.31,5.98-22.5,15.55-29.17,27.49-9.62,17.22-20.1,42.82-21.43,74.82-3,72.05,42.79,119.92,51.22,128.43,10.85-15.39,38.39-58.81,37.41-119.62-.31-19.2-3.4-36.27-7.52-50.77,15.2-9.23,42.31-20.7,79.76-20.33,36.38.35,62.63,11.38,77.5,20.34-4.11,14.49-7.21,31.56-7.52,50.76-.98,60.81,26.56,104.23,37.41,119.62,8.43-8.51,54.22-56.37,51.22-128.43Z"/>

        </g><!-- /body-static -->

        <!-- ══════════════ HEAD GROUP (rotates with cursor) ══════════════ -->
        <!--  Rotation pivot: SVG coord (403, 355) — neck / shoulder junction  -->
        <g id="head-group">

          <!-- Head outline + ear tufts (navy) -->
          <path fill="#001D35" d="M534.86,271.1c-2.39-27.17-9.65-49.83-17.05-66.9l-29.82,4.7-84.38,5.92-84.38-5.92-29.82-4.7c-7.39,17.07-14.65,39.74-17.05,66.9-2.66,30.2,1.79,53.44,4.5,67.07,3.93,19.74,9.5,24.87,14.23,36.55l2.22-.44c.7-20.61,49.8-26.25,110.28-26.25s109.58,5.64,110.28,26.25l2.22.44c4.73-11.68,10.3-16.8,14.23-36.55,2.71-13.63,7.17-36.87,4.5-67.07Z"/>
          <path fill="#001D35" d="M463.33,194.65c12.41-2.97,27.75-7.85,44.32-16.1,21.72-10.82,37.9-23.64,48.96-33.92-3.27,17.11-8.21,36.75-15.78,57.98-6.52,18.3-13.79,34.39-20.91,48.18l-56.59-56.14Z"/>
          <path fill="#001D35" d="M349.29,196.82c-11.77-4.95-26.11-12.26-41.11-23.09-19.67-14.21-33.55-29.49-42.79-41.43.45,17.42,2.13,37.6,6.14,59.77,3.46,19.12,8.01,36.18,12.79,50.94l64.96-46.19Z"/>

          <!-- Face mask (mint oval) -->
          <path fill="#CCF5EC" d="M509.16,280.78c0,45.55-30.42,76.48-105.54,76.48s-105.54-30.93-105.54-76.48,47.25-82.48,105.54-82.48,105.54,36.93,105.54,82.48Z"/>

          <!-- Beak (navy diamond) -->
          <path fill="#001D35" d="M385.88,296.85l17.75-23.65,16.94,23.65c-.26,5.96-1.06,12.96-2.92,20.62-3.53,14.57-9.49,25.83-14.43,33.48-4.96-7.67-10.94-18.97-14.46-33.59-1.83-7.61-2.63-14.57-2.89-20.5Z"/>

          <!-- Eye whites (teal circles) -->
          <circle fill="#33D1B7" cx="466.11" cy="275.16" r="36.11"/>
          <circle fill="#33D1B7" cx="341.14" cy="275.16" r="36.11"/>

          <!-- Pupils (navy, cursor-tracked) -->
          <circle id="pupil-right" fill="#001D35" cx="454.37" cy="275.16" r="24.37"/>
          <circle id="pupil-left"  fill="#001D35" cx="352.88" cy="275.16" r="24.37"/>

          <!-- Highlights (mint, follow pupils with fixed upper-inner offset) -->
          <circle id="hl-right" fill="#CCF5EC" cx="445.86" cy="271.10" r="12.1"/>
          <circle id="hl-left"  fill="#CCF5EC" cx="361.39" cy="271.10" r="12.1"/>

          <!--
            Eyelids — at scaleY=1 their bottom edge (~y=267) aligns with the forehead
            base, keeping them hidden at rest. scaleY=3.2 drops them down to fully
            cover the eye whites during a blink.
          -->
          <ellipse id="eyelid-right" class="eyelid" fill="#001D35" cx="466.11" cy="249" rx="36.11" ry="18"/>
          <ellipse id="eyelid-left"  class="eyelid" fill="#001D35" cx="341.14" cy="249" rx="36.11" ry="18"/>

          <!-- Forehead / angry brow — rendered last, always on top of eyelids + eyes -->
          <ellipse fill="#001D35" cx="400.82" cy="229.77" rx="112.69" ry="43.43"/>

        </g><!-- /head-group -->

      </svg>
    </div><!-- /owl-wrapper -->

    <!-- ─── Error copy ─── -->
    <div class="error-code">404</div>
    <div class="error-title">Page Not Found</div>
    <div class="error-description">
      The page you requested doesn't exist<br/>
      or may have been moved or deleted.
    </div>
    <a class="home-button" th:href="@{/}" href="/">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8 1L1 7.5V14.5H6V10H10V14.5H15V7.5L8 1Z" stroke="#CCF5EC" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      Go to Home
    </a>

  </div><!-- /error-container -->

  <script>
    (function () {
      'use strict';

      /* ── Constants ── */
      var LERP_T         = 0.1;
      var MAX_HEAD_ROT   = 14;   // ± degrees
      var MAX_PUPIL_OFF  = 10;   // SVG user units

      // Head rotation pivot (SVG coords) — at the neck / shoulder junction
      var PIVOT_X = 403, PIVOT_Y = 355;

      // Eye-white centres (SVG coords)
      var EYE_L = { cx: 341.14, cy: 275.16 };
      var EYE_R = { cx: 466.11, cy: 275.16 };

      // Default pupil positions (resting, slightly inward)
      var DEF_PL = { cx: 352.88, cy: 275.16 };
      var DEF_PR = { cx: 454.37, cy: 275.16 };

      // Highlight offset from pupil centre (upper-inner corner)
      var HL_OFF_L = { dx: +8.51, dy: -4.06 };
      var HL_OFF_R = { dx: -8.51, dy: -4.06 };

      /* ── DOM refs ── */
      var svg        = document.getElementById('owl-svg');
      var headGroup  = document.getElementById('head-group');
      var pupilL     = document.getElementById('pupil-left');
      var pupilR     = document.getElementById('pupil-right');
      var hlL        = document.getElementById('hl-left');
      var hlR        = document.getElementById('hl-right');
      var eyelidL    = document.getElementById('eyelid-left');
      var eyelidR    = document.getElementById('eyelid-right');

      /* ── Mutable state ── */
      var targetRot = 0, curRot = 0;
      var idleTilt  = 0;

      var tPL = { cx: DEF_PL.cx, cy: DEF_PL.cy };
      var tPR = { cx: DEF_PR.cx, cy: DEF_PR.cy };
      var cPL = { cx: DEF_PL.cx, cy: DEF_PL.cy };
      var cPR = { cx: DEF_PR.cx, cy: DEF_PR.cy };

      /* ── Helpers ── */
      function lerp(a, b, t) { return a + (b - a) * t; }
      function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

      // Convert screen coords → SVG user-space coords
      function toSVG(clientX, clientY) {
        var pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      }

      // Update pupil target based on SVG point p and eye centre e
      function trackEye(p, e) {
        var dx = p.x - e.cx;
        var dy = p.y - e.cy;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.001) return { cx: e.cx, cy: e.cy };
        var s = Math.min(MAX_PUPIL_OFF, dist) / dist;
        return { cx: e.cx + dx * s, cy: e.cy + dy * s };
      }

      /* ── Mouse / touch tracking ── */
      function handlePointer(clientX, clientY) {
        var p = toSVG(clientX, clientY);

        // Head tilt: horizontal sine of the angle from pivot → cursor
        var dx = p.x - PIVOT_X;
        var dy = p.y - PIVOT_Y;
        var norm = Math.sqrt(dx * dx + dy * dy);
        if (norm > 0.001) {
          targetRot = clamp((dx / norm) * MAX_HEAD_ROT, -MAX_HEAD_ROT, MAX_HEAD_ROT);
        }

        // Pupil tracking
        tPL = trackEye(p, EYE_L);
        tPR = trackEye(p, EYE_R);
      }

      document.addEventListener('mousemove', function (e) {
        handlePointer(e.clientX, e.clientY);
      });

      document.addEventListener('mouseleave', function () {
        targetRot = 0;
        tPL = { cx: DEF_PL.cx, cy: DEF_PL.cy };
        tPR = { cx: DEF_PR.cx, cy: DEF_PR.cy };
      });

      document.addEventListener('touchmove', function (e) {
        if (e.touches.length > 0) {
          handlePointer(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: true });

      /* ── rAF render loop ── */
      function tick() {
        // Interpolate rotation (includes idle tilt)
        curRot = lerp(curRot, targetRot + idleTilt, LERP_T);

        // Interpolate pupils
        cPL.cx = lerp(cPL.cx, tPL.cx, LERP_T);
        cPL.cy = lerp(cPL.cy, tPL.cy, LERP_T);
        cPR.cx = lerp(cPR.cx, tPR.cx, LERP_T);
        cPR.cy = lerp(cPR.cy, tPR.cy, LERP_T);

        // Apply head rotation via SVG transform attribute
        // rotate(angle, pivot_x, pivot_y) — uses SVG coordinate space
        headGroup.setAttribute(
          'transform',
          'rotate(' + curRot.toFixed(3) + ',' + PIVOT_X + ',' + PIVOT_Y + ')'
        );

        // Apply pupil positions
        pupilL.setAttribute('cx', cPL.cx.toFixed(2));
        pupilL.setAttribute('cy', cPL.cy.toFixed(2));
        pupilR.setAttribute('cx', cPR.cx.toFixed(2));
        pupilR.setAttribute('cy', cPR.cy.toFixed(2));

        // Highlights follow pupils with fixed upper-inner offset
        hlL.setAttribute('cx', (cPL.cx + HL_OFF_L.dx).toFixed(2));
        hlL.setAttribute('cy', (cPL.cy + HL_OFF_L.dy).toFixed(2));
        hlR.setAttribute('cx', (cPR.cx + HL_OFF_R.dx).toFixed(2));
        hlR.setAttribute('cy', (cPR.cy + HL_OFF_R.dy).toFixed(2));

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      /* ── Blink — eyelid scaleY 1 → 3.2 → 1, 130ms each leg ── */
      function scheduleBlink() {
        setTimeout(function () {
          // Close (130 ms)
          eyelidL.style.transform = 'scaleY(2.23)';
          eyelidR.style.transform = 'scaleY(2.23)';
          // Open (130 ms later)
          setTimeout(function () {
            eyelidL.style.transform = 'scaleY(1)';
            eyelidR.style.transform = 'scaleY(1)';
            scheduleBlink();
          }, 130);
        }, 1800 + Math.random() * 3200);
      }
      scheduleBlink();

      /* ── Idle tilt (갸웃) — ±5° for 800 ms, repeat ── */
      function scheduleIdle() {
        setTimeout(function () {
          idleTilt = (Math.random() > 0.5 ? 1 : -1) * 5;
          setTimeout(function () {
            idleTilt = 0;
            scheduleIdle();
          }, 800);
        }, 3500 + Math.random() * 4000);
      }
      scheduleIdle();

    }());
  </script>
</body>
</html>
