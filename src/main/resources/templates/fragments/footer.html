<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

    <!--
        Site footer — copyright, OSS notices link, UI language switcher.
        usage: th:replace="~{fragments/footer :: site-footer}"
    -->
    <footer th:fragment="site-footer"
            class="mt-auto shrink-0 w-full border-t border-[var(--grayscale-15)] bg-white">
        <div class="max-w-[1440px] mx-auto px-[24px] sm:px-[60px] py-[20px] flex flex-wrap items-center justify-between gap-x-[16px] gap-y-[8px] text-[12px] text-[var(--grayscale-50)] tracking-[-0.12px]">
            <span th:text="#{footer.copyright}">Copyright (c) 2026 OsWL, Licensed under the MIT License.</span>
            <div class="flex items-center gap-[10px] shrink-0">
                <a th:href="@{/oss-notices}"
                   class="text-[var(--grayscale-60)] hover:text-[var(--primary-120)] no-underline transition-colors"
                   th:text="#{footer.ossNotices}">Open Source Notices</a>
                <span class="text-[var(--grayscale-25)]" aria-hidden="true">·</span>
                <nav class="flex items-center gap-[6px]" th:attr="aria-label=#{footer.lang.label}">
                    <a th:href="@{''(lang='en')}"
                       th:classappend="${#locale.language == 'en'} ? 'font-semibold text-[var(--grayscale-80)]' : 'text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)]'"
                       class="no-underline transition-colors"
                       th:text="#{footer.lang.en}">EN</a>
                    <span class="text-[var(--grayscale-25)]" aria-hidden="true">|</span>
                    <a th:href="@{''(lang='ko')}"
                       th:classappend="${#locale.language == 'ko'} ? 'font-semibold text-[var(--grayscale-80)]' : 'text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)]'"
                       class="no-underline transition-colors"
                       th:text="#{footer.lang.ko}">KO</a>
                </nav>
            </div>
        </div>
    </footer>

</body>
</html>
