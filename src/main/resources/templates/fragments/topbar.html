<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

    <!-- Reusable user menu (logged-in user dropdown + logout) -->
    <div th:fragment="user-menu" sec:authorize="isAuthenticated()"
         x-data="{ open: false }" @click.outside="open = false" class="relative">
        <button type="button" @click="open = !open"
                class="flex items-center gap-[8px] text-white/80 hover:text-white text-[13px] font-medium tracking-[-0.13px] transition-colors">
            <span class="w-[28px] h-[28px] rounded-full bg-[var(--secondary-100)] text-white flex items-center justify-center text-[12px] font-bold"
                  th:text="${#authentication != null ? #authentication.getPrincipal().displayName.substring(0,1).toUpperCase() : 'U'}">U</span>
            <span th:text="${#authentication != null ? #authentication.getPrincipal().displayName : 'User'}">User</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div x-show="open" x-transition style="display:none;"
             class="absolute right-0 top-[34px] z-30 w-[220px] rounded-[6px] border border-white/20 bg-[rgba(0,29,53,0.95)] backdrop-blur-[6px] shadow-lg p-[10px] flex flex-col gap-[6px]">
            <div class="px-[8px] py-[4px] border-b border-white/15 mb-[2px]">
                <div class="text-white text-[13px] font-semibold" th:text="${#authentication != null ? #authentication.getPrincipal().displayName : 'User'}">User</div>
                <div class="text-white/50 text-[11px]" th:text="${#authentication != null ? #authentication.getPrincipal().username : ''}">user@example.com</div>
                <div class="text-amber-300 text-[10px] mt-[2px]" sec:authorize="hasRole('SYSTEM_ADMIN')">★ System Admin</div>
            </div>
            <a th:href="@{/settings}" class="text-white/80 hover:text-white text-[13px] px-[8px] py-[6px] rounded-[4px] hover:bg-white/10 no-underline">⚙️ Settings</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                <button type="submit" class="w-full text-left text-red-300 hover:text-red-200 text-[13px] px-[8px] py-[6px] rounded-[4px] hover:bg-white/10">↪️ 로그아웃</button>
            </form>
        </div>
    </div>

    <!--
        Simple Topbar — Projects 목록 페이지처럼 프로젝트 컨텍스트가 없는 화면에서 사용.
        usage: th:replace="~{fragments/topbar :: simple-topbar('Projects')}"
    -->
    <header th:fragment="simple-topbar(pageLabel)"
            class="bg-[var(--background-dark)] flex items-center h-[64px] gap-[44px] pl-[60px] pr-[40px] py-[16px] w-full shrink-0">
        <a th:href="@{/projects}" class="flex gap-[12px] items-center shrink-0">
            <img th:src="@{/icon/icon-logo.svg}" class="w-[22px] h-[30px]" alt="OsWL" aria-hidden="true">
            <h1 class="font-extrabold text-[24px] text-[var(--secondary-100)] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
        </a>
        <h2 class="font-bold text-[18px] text-white tracking-[-0.18px] leading-[1.3] whitespace-nowrap"
            th:text="${pageLabel ?: 'Projects'}">Projects</h2>
        <div class="flex-1"></div>
        <a th:href="@{/settings}"
           class="flex items-center gap-[6px] text-white/60 hover:text-white text-[13px] font-medium tracking-[-0.13px] transition-colors no-underline"
           th:classappend="${pageLabel == 'Settings'} ? ' text-white' : ''">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
        </a>
        <div th:replace="~{fragments/topbar :: user-menu}"></div>
    </header>


    <!--
        Project Topbar — 프로젝트 상세(security-center / license / risk-trend) 페이지 공통 헤더.
        activeTab: 'security-center' | 'license' | 'risk-trend'
        usage: th:replace="~{fragments/topbar :: project-topbar(${projectId}, ${projectName}, ${projectVersion}, 'license')}"
    -->
    <div th:fragment="project-topbar(projectId, projectName, projectVersion, activeTab)"
         class="w-full relative shrink-0 flex flex-col">

        <!-- Upper bar (logo + breadcrumb + version) -->
        <div class="bg-[var(--background-dark)] flex items-center gap-[44px] pl-[60px] pr-[40px] py-[17px] h-[64px] shrink-0">
            <a th:href="@{/projects}" class="flex items-center gap-[12px] shrink-0">
                <img th:src="@{/icon/icon-logo.svg}" class="w-[22px] h-[30px]" alt="OsWL" aria-hidden="true">
                <h1 class="text-[var(--secondary-100)] font-extrabold text-[24px] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
            </a>

            <div class="flex items-center gap-[24px]">
                <a th:href="@{/projects}" class="text-white/50 text-[18px] tracking-[-0.18px] hover:text-white transition-colors">Projects</a>
                <img th:src="@{/icon/icon-chevron-right.svg}" class="w-5 h-5 shrink-0" alt="" aria-hidden="true">
                <span class="text-white font-bold text-[18px] tracking-[-0.18px]"
                      th:text="${projectName ?: 'Project Name'}">Project Name</span>

                <!-- Version Dropdown — hidden on Scan History tab -->
                <div th:unless="${activeTab == 'scan-history'}"
                     th:attr="data-project-id=${projectId}"
                     x-data="{ versionDropdownOpen: false }"
                     @click.outside="versionDropdownOpen = false"
                     class="relative">
                    <button type="button"
                            @click="versionDropdownOpen = !versionDropdownOpen"
                            class="bg-white/15 border border-white/30 rounded-[4px] px-[8px] pt-[4px] pb-[3px] flex items-center gap-2 cursor-pointer hover:bg-white/20 transition-colors"
                            :class="versionDropdownOpen && 'bg-white/25 border-white/50'">
                        <span class="text-[var(--secondary-20)] font-medium text-[16px] tracking-[-0.16px]"
                              th:text="${projectVersion ?: '-'}">-</span>
                        <img th:src="@{/icon/icon-chevron-down.svg}" class="w-3 h-3 transition-transform" :class="versionDropdownOpen && 'rotate-180'" alt="" aria-hidden="true" style="filter: brightness(0) invert(1);">
                    </button>

                    <!-- Dropdown Menu -->
                    <div x-show="versionDropdownOpen"
                         x-transition
                         style="display:none;"
                         class="absolute right-0 top-[42px] z-20 w-[280px] rounded-[4px] border border-white/40 bg-[rgba(0,29,53,0.95)] backdrop-blur-[6px] shadow-[0px_0px_20px_0px_rgba(0,29,53,0.3)] p-[10px]">
                        <div class="flex flex-col gap-[10px] max-h-[320px] overflow-y-auto">

                            <!-- No scans available -->
                            <span th:if="${#lists.isEmpty(scanVersions)}"
                                  class="text-white/40 text-[13px] text-center px-[8px] py-[8px]">No scans yet</span>

                            <!-- One entry per completed scan -->
                            <div th:each="v : ${scanVersions}"
                                 th:attr="data-scan-id=${v.scanId},data-scan-version=${v.version}"
                                 x-data="{ showDelete: false, confirming: false }"
                                 @mouseleave="if (!confirming) showDelete = false"
                                 class="rounded-[4px] overflow-hidden">

                                <!-- 기본 행: 버전명 + 날짜 + 휴지통 버튼 -->
                                <div x-show="!confirming"
                                     @mouseenter="showDelete = true"
                                     @mouseleave="showDelete = false"
                                     class="flex items-center hover:bg-white/15 transition-colors">
                                    <a th:href="@{|/projects/${projectId}/${activeTab}|(scanId=${v.scanId})}"
                                       th:classappend="${v.current} ? ' font-semibold' : ''"
                                       class="flex-1 text-white text-[13px] font-normal tracking-[-0.13px] text-left px-[8px] py-[8px] whitespace-nowrap no-underline flex items-center justify-between gap-2"
                                       @click="versionDropdownOpen = false">
                                        <span th:text="${v.version}">-</span>
                                        <span th:text="${v.scannedAt}" class="text-white/40 text-[11px]">-</span>
                                    </a>
                                    <!-- 휴지통 버튼 — 항상 30px 공간 예약해서 레이아웃 shift 방지 -->
                                    <div class="shrink-0 w-[30px] flex items-center justify-center">
                                        <button type="button"
                                                :class="showDelete ? 'opacity-100' : 'opacity-0 pointer-events-none'"
                                                @click.stop="confirming = true; showDelete = false"
                                                class="w-[24px] h-[24px] flex items-center justify-center rounded-[4px] text-white/50 hover:text-red-400 hover:bg-white/10 transition">
                                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                                        </button>
                                    </div>
                                </div>

                                <!-- 확인 행: Cancel / Delete 버튼 -->
                                <div x-show="confirming"
                                     x-transition:enter="transition ease-out duration-150"
                                     x-transition:enter-start="opacity-0 scale-95"
                                     x-transition:enter-end="opacity-100 scale-100"
                                     style="display:none;"
                                     class="flex items-center gap-[6px] px-[8px] py-[6px]">
                                    <span class="flex-1 text-white/60 text-[11px] truncate" th:text="${v.version}">-</span>
                                    <button type="button"
                                            @click.stop="confirming = false"
                                            class="px-[8px] py-[4px] rounded-[4px] text-[11px] font-medium text-white/50 hover:text-white hover:bg-white/10 transition">
                                        Cancel
                                    </button>
                                    <button type="button"
                                            @click.stop="
                                                const scanId = $el.closest('[data-scan-id]').dataset.scanId;
                                                const projectId = $el.closest('[data-project-id]').dataset.projectId;
                                                fetch('/projects/' + projectId + '/scan-history/' + scanId, { method: 'DELETE' })
                                                    .then(r => { if (r.ok) $el.closest('[data-scan-id]').remove(); else alert('Failed to delete.'); });
                                            "
                                            class="px-[8px] py-[4px] rounded-[4px] text-[11px] font-semibold bg-red-500 hover:bg-red-600 text-white transition">
                                        Delete
                                    </button>
                                </div>
                            </div>

                        </div>

                        <!-- Version Diff link at the bottom of dropdown -->
                        <div class="border-t border-white/20 mt-[4px] pt-[6px]">
                            <a th:href="@{|/projects/${projectId}/version-diff|}"
                               class="flex items-center gap-[8px] text-[var(--secondary-100)] text-[13px] font-medium tracking-[-0.13px] px-[8px] py-[7px] rounded-[4px] hover:bg-white/10 transition no-underline whitespace-nowrap"
                               @click="versionDropdownOpen = false">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/><path d="M7 12h10"/><path d="M12 7l5 5-5 5"/></svg>
                                Version Diff...
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-1"></div>
            <a th:href="@{/settings}"
               class="flex items-center gap-[6px] text-white/60 hover:text-white text-[13px] font-medium tracking-[-0.13px] transition-colors no-underline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </a>
            <div th:replace="~{fragments/topbar :: user-menu}"></div>
        </div>

        <!-- Lower bar (tabs) -->
        <nav class="bg-[var(--grayscale-10)] flex items-center gap-[32px] pl-[60px] pr-[40px] py-[16px] h-[64px] shrink-0">
            <a th:href="@{|/projects/${projectId}/security-center|}"
               th:classappend="${activeTab == 'security-center'}
                   ? 'bg-[rgba(51,209,183,0.1)] text-[var(--primary-120)] font-bold rounded-[8px] px-[12px] py-[6px]'
                   : 'text-[var(--grayscale-90)] font-medium px-[12px] py-[6px] hover:text-[var(--primary-120)] transition-colors'"
               class="text-[18px] tracking-[-0.18px] leading-[1.3]">Security Center</a>

            <span class="w-1 h-1 rounded-full bg-[var(--grayscale-30)]"></span>

            <a th:href="@{|/projects/${projectId}/license|}"
               th:classappend="${activeTab == 'license'}
                   ? 'bg-[rgba(51,209,183,0.1)] text-[var(--primary-120)] font-bold rounded-[8px] px-[12px] py-[6px]'
                   : 'text-[var(--grayscale-90)] font-medium px-[12px] py-[6px] hover:text-[var(--primary-120)] transition-colors'"
               class="text-[18px] tracking-[-0.18px] leading-[1.3]">License</a>

            <span class="w-1 h-1 rounded-full bg-[var(--grayscale-30)]"></span>

            <a th:href="@{|/projects/${projectId}/risk-trend|}"
               th:classappend="${activeTab == 'risk-trend'}
                   ? 'bg-[rgba(51,209,183,0.1)] text-[var(--primary-120)] font-bold rounded-[8px] px-[12px] py-[6px]'
                   : 'text-[var(--grayscale-90)] font-medium px-[12px] py-[6px] hover:text-[var(--primary-120)] transition-colors'"
               class="text-[18px] tracking-[-0.18px] leading-[1.3]">Risk Trend</a>

            <span class="w-1 h-1 rounded-full bg-[var(--grayscale-30)]"></span>

            <a th:href="@{|/projects/${projectId}/scan-history|}"
               th:classappend="${activeTab == 'scan-history'}
                   ? 'bg-[rgba(51,209,183,0.1)] text-[var(--primary-120)] font-bold rounded-[8px] px-[12px] py-[6px]'
                   : 'text-[var(--grayscale-90)] font-medium px-[12px] py-[6px] hover:text-[var(--primary-120)] transition-colors'"
               class="text-[18px] tracking-[-0.18px] leading-[1.3]">Scan History</a>
        </nav>

    </div>

    <!--
        Version Diff Topbar — 버전 비교 페이지용 헤더.
        usage: th:replace="~{fragments/topbar :: versiondiff-topbar(${projectId}, ${projectName})}"
    -->
    <header th:fragment="versiondiff-topbar(projectId, projectName)"
            class="bg-[var(--background-dark)] flex items-center h-[64px] gap-[44px] pl-[60px] pr-[40px] py-[16px] w-full shrink-0">
        <a th:href="@{/projects}" class="flex gap-[12px] items-center shrink-0">
            <img th:src="@{/icon/icon-logo.svg}" class="w-[22px] h-[30px]" alt="OsWL" aria-hidden="true">
            <h1 class="font-extrabold text-[24px] text-[var(--secondary-100)] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
        </a>
        <div class="flex items-center gap-[24px]">
            <a th:href="@{/projects}" class="text-white/50 text-[18px] tracking-[-0.18px] hover:text-white transition-colors">Projects</a>
            <img th:src="@{/icon/icon-chevron-right.svg}" class="w-5 h-5 shrink-0" alt="" aria-hidden="true">
            <a th:href="@{|/projects/${projectId}/security-center|}"
               class="text-white/50 text-[18px] tracking-[-0.18px] hover:text-white transition-colors"
               th:text="${projectName ?: 'Project'}">Project</a>
            <img th:src="@{/icon/icon-chevron-right.svg}" class="w-5 h-5 shrink-0" alt="" aria-hidden="true">
            <span class="text-white font-bold text-[18px] tracking-[-0.18px]">Version Diff</span>
        </div>
        <div class="flex-1"></div>
        <a th:href="@{/settings}"
           class="flex items-center gap-[6px] text-white/60 hover:text-white text-[13px] font-medium tracking-[-0.13px] transition-colors no-underline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Settings
        </a>
    </header>

</body>
</html>
