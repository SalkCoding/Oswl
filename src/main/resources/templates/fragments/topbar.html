<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- TopBar Fragment -->
    <header th:fragment="topbar" class="bg-[var(--background-dark)] flex items-center h-[64px] px-[60px] py-[16px] w-full shrink-0 gap-[44px]">
        <div class="flex gap-[12px] items-center shrink-0">
            <!-- App Logo / Branding -->
            <div class="w-[22px] h-[30px] bg-[var(--secondary-colors-100)] rounded-md flex justify-center items-center font-bold text-xs text-[var(--background-dark)]">W</div>
            <h1 class="font-extrabold text-[24px] text-[var(--secondary-colors-100)] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
        </div>
        <h2 class="font-bold text-[18px] text-white tracking-[-0.18px] leading-[1.3] whitespace-nowrap">Projects</h2>
    </header>
</body>
</html>
