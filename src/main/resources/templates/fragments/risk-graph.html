<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

    <!--
        Risk Graph fragment.
        usage: th:replace="~{fragments/risk-graph :: riskGraph('Security Risk', ${critical}, ${high}, ${medium}, ${low})}"
    -->
    <div th:fragment="riskGraph(title, critical, high, medium, low)"
         class="flex flex-col gap-[14px] items-start w-full relative shrink-0">

        <p class="font-medium text-[14px] text-[var(--grayscale-100)] tracking-[-0.14px] w-full"
           th:text="${title}">Security Risk</p>

        <div class="risk-graph-bar"
             th:with="total=${(critical ?: 0) + (high ?: 0) + (medium ?: 0) + (low ?: 0)}">
            <th:block th:if="${total > 0}">
                <div class="risk-graph-segment bg-[var(--risk-critical)]"
                     th:if="${critical != null and critical > 0}"
                     th:style="'width: ' + (${critical} * 100.0 / ${total}) + '%'"></div>
                <div class="risk-graph-segment bg-[var(--risk-high)]"
                     th:if="${high != null and high > 0}"
                     th:style="'width: ' + (${high} * 100.0 / ${total}) + '%'"></div>
                <div class="risk-graph-segment bg-[var(--risk-medium)]"
                     th:if="${medium != null and medium > 0}"
                     th:style="'width: ' + (${medium} * 100.0 / ${total}) + '%'"></div>
                <div class="risk-graph-segment bg-[var(--risk-low)]"
                     th:if="${low != null and low > 0}"
                     th:style="'width: ' + (${low} * 100.0 / ${total}) + '%'"></div>
            </th:block>
            <div class="risk-graph-segment bg-[var(--risk-low)] w-full" th:if="${total == 0}"></div>
        </div>

        <div class="flex flex-wrap gap-y-[12px] gap-x-[24px] items-center w-full pr-[8px]">
            <div class="flex gap-[8px] items-center shrink-0">
                <div class="w-[6px] h-[6px] rounded-full bg-[var(--risk-critical)]"></div>
                <p class="font-normal text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px] whitespace-nowrap">
                    <span th:text="${critical ?: 0}">0</span> Critical
                </p>
            </div>
            <div class="flex gap-[8px] items-center shrink-0">
                <div class="w-[6px] h-[6px] rounded-full bg-[var(--risk-high)]"></div>
                <p class="font-normal text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px] whitespace-nowrap">
                    <span th:text="${high ?: 0}">0</span> High
                </p>
            </div>
            <div class="flex gap-[8px] items-center shrink-0">
                <div class="w-[6px] h-[6px] rounded-full bg-[var(--risk-medium)]"></div>
                <p class="font-normal text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px] whitespace-nowrap">
                    <span th:text="${medium ?: 0}">0</span> Medium
                </p>
            </div>
            <div class="flex gap-[8px] items-center shrink-0">
                <div class="w-[6px] h-[6px] rounded-full bg-[var(--risk-low)]"></div>
                <p class="font-normal text-[11px] text-[var(--grayscale-80)] tracking-[-0.11px] whitespace-nowrap">
                    <span th:text="${low ?: 0}">0</span> Low
                </p>
            </div>
        </div>
    </div>

</body>
</html>
