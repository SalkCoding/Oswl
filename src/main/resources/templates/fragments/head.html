<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? 'OsWL - ' + pageTitle : 'OsWL'}">OsWL</title>

    <link rel="icon" th:href="@{/icon/icon-logo.svg}" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS — precompiled by the buildTailwindCss Gradle task (no CDN runtime). -->
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link rel="stylesheet" th:href="@{/css/globals.css}">
    <style>
        [x-cloak] { display: none !important; }
    </style>
    <script>
        // Auto-inject CSRF header for same-origin state-changing fetch requests.
        (function () {
            const origFetch = window.fetch;
            const xsrf = () => {
                const m = document.cookie.match(/(?:^|; )XSRF-TOKEN=([^;]+)/);
                return m ? decodeURIComponent(m[1]) : null;
            };
            window.fetch = function (input, init) {
                init = init || {};
                const method = (init.method || (typeof input === 'object' && input.method) || 'GET').toUpperCase();
                if (method !== 'GET' && method !== 'HEAD' && method !== 'OPTIONS') {
                    const url = typeof input === 'string' ? input : (input && input.url) || '';
                    const sameOrigin = !/^https?:\/\//i.test(url) || url.startsWith(location.origin);
                    if (sameOrigin) {
                        const token = xsrf();
                        if (token) {
                            const headers = new Headers(init.headers || (typeof input === 'object' ? input.headers : undefined) || {});
                            if (!headers.has('X-XSRF-TOKEN')) headers.set('X-XSRF-TOKEN', token);
                            init.headers = headers;
                        }
                    }
                }
                return origFetch.call(this, input, init);
            };
        })();
    </script>
</head>
</html>
