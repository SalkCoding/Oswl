<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- Shared Topbar Component -->
    <div th:fragment="topbar" class="w-full relative shrink-0 bg-[#001D35] flex flex-col h-[128px]">
        <!-- Top Half: Project Breadcrumbs -->
        <div class="flex items-center gap-[44px] pl-[60px] pr-8 py-[17px] border-b border-white/10">
            <div class="flex items-center gap-3">
                <!-- App Logo/Icon Placeholder -->
                <div class="w-[22px] h-[30px] bg-[#22efc3] clip-path-logo"></div>
                <h1 class="text-[#22EFC3] font-extrabold text-[24px] tracking-tight">OsWL</h1>
            </div>

            <!-- Breadcrumb Navigation -->
            <div class="flex items-center gap-6">
                <span class="text-white/50 text-[18px]">Projects</span>
                <!-- Chevron Right Icon -->
                <svg class="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
                <span class="text-white font-bold text-[18px]" th:text="${projectName} ?: 'Project Name'">Project Name</span>
                
                <!-- Version Badge -->
                <div class="bg-white/15 border border-white/30 rounded px-2 py-1 flex items-center gap-2">
                    <span class="text-[#d3fcf3] font-medium text-[16px]" th:text="${projectVersion} ?: '1.2.5'">1.2.5</span>
                    <!-- Dropdown Arrow Icon (Alpine.js integration placeholder) -->
                    <button class="w-[19px] h-[20px] flex items-center justify-center cursor-pointer">
                        <svg class="w-3 h-3 text-[#d3fcf3]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Half: Navigation Tabs -->
        <div class="absolute bottom-0 left-0 right-0 bg-[#F3F5F6] flex items-center gap-8 pl-[60px] pr-8 py-[16px]">
            <a href="#" th:href="@{/projects/security-center}" class="text-[#272D30] font-medium text-[18px] hover:text-[#00A093] transition-colors">Security Center</a>
            <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
            
            <!-- Active Tab: License -->
            <a href="#" class="bg-[#33D1B7]/10 text-[#00A093] font-bold px-3 py-1.5 rounded-lg text-[18px]">License</a>
            
            <div class="w-1 h-1 bg-gray-400 rounded-full"></div>
            <a href="#" th:href="@{/projects/risk-trend}" class="text-[#272D30] font-medium text-[18px] hover:text-[#00A093] transition-colors">Risk Trend</a>
        </div>
    </div>

</body>
</html>
