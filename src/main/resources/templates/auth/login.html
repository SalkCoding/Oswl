<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="bg-[var(--grayscale-5)] min-h-screen flex items-center justify-center font-sans antialiased">

<div class="w-full max-w-[420px] flex flex-col items-center gap-[28px] px-[24px]">

    <!-- Logo -->
    <div class="flex flex-col items-center gap-[6px]">
        <h1 class="font-extrabold text-[32px] text-[var(--secondary-100)] tracking-[-0.32px]">OsWL</h1>
        <p class="text-[13px] text-[var(--grayscale-60)] tracking-[-0.13px]">Open Source Watch List</p>
    </div>

    <!-- Card -->
    <div class="w-full bg-white border border-[var(--grayscale-20)] rounded-[12px] p-[28px] shadow-sm flex flex-col gap-[18px]"
         x-data="{ showPwd: false }">

        <!-- Alerts -->
        <div th:if="${param.error}" class="bg-red-50 border border-red-200 text-red-700 text-[13px] rounded-[8px] px-[12px] py-[10px]">
            이메일 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-[13px] rounded-[8px] px-[12px] py-[10px]">
            로그아웃되었습니다.
        </div>
        <div th:if="${param.setup}" class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-[13px] rounded-[8px] px-[12px] py-[10px]">
            계정이 생성되었습니다. 로그인해 주세요.
        </div>

        <form th:action="@{/login}" method="post" class="flex flex-col gap-[14px]">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)] tracking-[-0.12px]">이메일</span>
                <input type="email" name="email" autocomplete="email" required
                       class="px-[12px] py-[10px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"
                       placeholder="example@company.com"/>
            </label>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)] tracking-[-0.12px]">비밀번호</span>
                <div class="relative">
                    <input :type="showPwd ? 'text' : 'password'" name="password" autocomplete="current-password" required
                           class="w-full px-[12px] py-[10px] pr-[40px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"/>
                    <button type="button" @click="showPwd = !showPwd"
                            class="absolute right-[10px] top-1/2 -translate-y-1/2 text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)] text-[12px]">
                        <span x-text="showPwd ? '숨기기' : '보기'"></span>
                    </button>
                </div>
            </label>

            <button type="submit"
                    class="mt-[6px] w-full bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white font-semibold text-[14px] py-[12px] rounded-[8px] transition-colors">
                로그인
            </button>
        </form>
    </div>

    <p class="text-[11px] text-[var(--grayscale-50)] tracking-[-0.11px]">v3.0.0 · Enterprise Edition</p>
</div>

</body>
</html>
