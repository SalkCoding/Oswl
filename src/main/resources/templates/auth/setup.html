<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Setup')}"></head>
<body class="bg-[var(--grayscale-5)] min-h-screen flex items-center justify-center font-sans antialiased py-[40px]">

<div class="w-full max-w-[520px] flex flex-col gap-[24px] px-[24px]">

    <div class="flex flex-col items-center gap-[6px]">
        <h1 class="font-extrabold text-[28px] text-[var(--secondary-100)] tracking-[-0.28px]">OsWL 첫 설정</h1>
        <p class="text-[13px] text-[var(--grayscale-60)] tracking-[-0.13px]">최고 관리자 계정을 만들어주세요</p>
    </div>

    <!-- Step indicator -->
    <div class="flex items-center gap-[10px] text-[12px]">
        <span class="flex items-center gap-[6px] text-[var(--secondary-100)] font-semibold">
            <span class="w-[18px] h-[18px] rounded-full bg-[var(--secondary-100)] text-white text-[10px] flex items-center justify-center">1</span>
            관리자 계정 만들기
        </span>
        <span class="flex-1 h-[1px] bg-[var(--grayscale-30)]"></span>
        <span class="flex items-center gap-[6px] text-[var(--grayscale-50)]">
            <span class="w-[18px] h-[18px] rounded-full bg-[var(--grayscale-30)] text-white text-[10px] flex items-center justify-center">2</span>
            완료
        </span>
    </div>

    <div class="w-full bg-white border border-[var(--grayscale-20)] rounded-[12px] p-[28px] shadow-sm"
         x-data="{ showPwd: false, showPwd2: false }">

        <p class="text-[13px] text-[var(--grayscale-70)] mb-[18px] leading-[1.6]">
            이 계정은 모든 권한을 가지며, 다른 사용자를 초대하고 권한을 부여할 수 있습니다.
        </p>

        <form th:action="@{/setup}" th:object="${setupRequest}" method="post" class="flex flex-col gap-[14px]">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)]">표시 이름</span>
                <input type="text" th:field="*{displayName}" required
                       class="px-[12px] py-[10px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"
                       placeholder="홍길동"/>
                <span th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}" class="text-[11px] text-red-600"></span>
            </label>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)]">이메일</span>
                <input type="email" th:field="*{email}" required
                       class="px-[12px] py-[10px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"
                       placeholder="admin@company.com"/>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-[11px] text-red-600"></span>
            </label>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)]">비밀번호 <span class="text-[var(--grayscale-50)] font-normal">(8자 이상)</span></span>
                <div class="relative">
                    <input :type="showPwd ? 'text' : 'password'" th:field="*{password}" required minlength="8"
                           class="w-full px-[12px] py-[10px] pr-[50px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"/>
                    <button type="button" @click="showPwd = !showPwd" class="absolute right-[10px] top-1/2 -translate-y-1/2 text-[12px] text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)]">
                        <span x-text="showPwd ? '숨기기' : '보기'"></span>
                    </button>
                </div>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-[11px] text-red-600"></span>
            </label>

            <label class="flex flex-col gap-[6px]">
                <span class="text-[12px] font-semibold text-[var(--grayscale-80)]">비밀번호 확인</span>
                <div class="relative">
                    <input :type="showPwd2 ? 'text' : 'password'" th:field="*{passwordConfirm}" required minlength="8"
                           class="w-full px-[12px] py-[10px] pr-[50px] rounded-[8px] border border-[var(--grayscale-30)] text-[14px] focus:outline-none focus:border-[var(--primary-100)]"/>
                    <button type="button" @click="showPwd2 = !showPwd2" class="absolute right-[10px] top-1/2 -translate-y-1/2 text-[12px] text-[var(--grayscale-50)] hover:text-[var(--grayscale-80)]">
                        <span x-text="showPwd2 ? '숨기기' : '보기'"></span>
                    </button>
                </div>
                <span th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}" class="text-[11px] text-red-600"></span>
            </label>

            <button type="submit"
                    class="mt-[8px] w-full bg-[var(--secondary-100)] hover:bg-[var(--secondary-120)] text-white font-semibold text-[14px] py-[12px] rounded-[8px] transition-colors">
                계정 만들기 →
            </button>
        </form>
    </div>
</div>

</body>
</html>
