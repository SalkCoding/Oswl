<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{auth.setup.pageTitle})}"></head>
<body class="min-h-screen flex flex-col font-sans antialiased relative" style="background: transparent;">

<!-- Background image -->
<img th:src="@{/img/login-bg.png}" alt="" aria-hidden="true"
     class="fixed inset-0 w-full h-full object-cover pointer-events-none select-none -z-10"/>

<!-- Top bar -->
<header class="bg-[var(--background-dark)] flex items-center h-[64px] gap-[44px] pl-[60px] pr-[40px] py-[16px] w-full shrink-0 relative z-10">
    <div class="flex gap-[12px] items-center shrink-0">
        <img th:src="@{/icon/icon-logo.svg}" class="w-[22px] h-[30px]" alt="OsWL" aria-hidden="true">
        <h1 class="font-extrabold text-[24px] text-[var(--secondary-100)] tracking-[-0.24px] leading-[1.3] whitespace-nowrap">OsWL</h1>
    </div>
    <h2 class="font-bold text-[18px] text-white tracking-[-0.18px] leading-[1.3] whitespace-nowrap" th:text="#{auth.setup.pageTitle}">Setup</h2>
</header>

<!-- Centered card -->
<main class="flex-1 flex items-center justify-center px-[24px] py-[40px] relative z-10">

    <div class="w-full max-w-[480px] bg-white border border-[var(--grayscale-20)] rounded-[10px] px-[24px] py-[28px]
                flex flex-col gap-[20px] items-center"
         style="filter: drop-shadow(0px 0px 20px rgba(0,29,53,0.03));"
         x-data="{ showPwd: false, showPwd2: false }">

        <!-- Brand + heading block -->
        <div class="flex flex-col items-center gap-[16px] w-full">
            <div class="flex flex-col items-center">
                <img th:src="@{/icon/icon-logo-card.svg}" class="w-[52px] h-[73px]" alt="OsWL" aria-hidden="true">
                <p class="font-extrabold text-[28px] text-[var(--primary-120)] tracking-[-0.28px] leading-[1.3] whitespace-nowrap">OsWL</p>
            </div>
            <div class="flex flex-col items-center gap-[6px]">
                <p class="font-bold text-[16px] text-[var(--grayscale-100)] tracking-[-0.16px] leading-[1.3] whitespace-nowrap" th:text="#{auth.setup.heading}">시스템 관리자 계정 만들기</p>
                <p class="text-[12px] font-normal text-[var(--grayscale-70)] tracking-[-0.12px] leading-[1.3] text-center" th:text="#{auth.setup.subheading}">이 인스턴스를 관리할 시스템 관리자 계정을 설정합니다.</p>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{/setup}" th:object="${setupRequest}" method="post" class="w-full flex flex-col gap-[16px]">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <p th:if="${#fields.hasGlobalErrors()}"
               th:each="err : ${#fields.globalErrors()}"
               th:text="${err}"
               class="w-full text-[12px] text-red-600 text-center"></p>

            <!-- Name -->
            <div class="w-full flex flex-col gap-[10px] items-start">
                <label for="setup-name"
                       class="w-full font-bold text-[14px] text-[var(--grayscale-100)] tracking-[-0.14px] leading-[1.3]"
                       th:text="#{auth.setup.label.name}">이름</label>
                <div class="w-full border border-[var(--grayscale-20)] rounded-[8px] px-[14px] py-[10px] flex items-center
                            focus-within:border-[var(--primary-100)] transition-colors"
                     th:classappend="${#fields.hasErrors('displayName')} ? ' border-red-300' : ''">
                    <input id="setup-name" type="text" th:field="*{displayName}" required maxlength="100"
                           th:placeholder="#{auth.setup.placeholder.name}"
                           class="flex-1 min-w-0 bg-transparent outline-none border-0 text-[13px] text-[var(--grayscale-100)]
                                  placeholder:text-[var(--grayscale-40)] tracking-[-0.13px] leading-[1.3]"/>
                </div>
                <p th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"
                   class="text-[12px] text-red-600"></p>
            </div>

            <!-- Email -->
            <div class="w-full flex flex-col gap-[10px] items-start">
                <label for="setup-email"
                       class="w-full font-bold text-[14px] text-[var(--grayscale-100)] tracking-[-0.14px] leading-[1.3]"
                       th:text="#{auth.setup.label.email}">이메일</label>
                <div class="w-full border border-[var(--grayscale-20)] rounded-[8px] px-[14px] py-[10px] flex items-center
                            focus-within:border-[var(--primary-100)] transition-colors"
                     th:classappend="${#fields.hasErrors('email')} ? ' border-red-300' : ''">
                    <input id="setup-email" type="email" th:field="*{email}" required autocomplete="email"
                           th:placeholder="#{auth.setup.placeholder.email}"
                           class="flex-1 min-w-0 bg-transparent outline-none border-0 text-[13px] text-[var(--grayscale-100)]
                                  placeholder:text-[var(--grayscale-40)] tracking-[-0.13px] leading-[1.3]"/>
                </div>
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                   class="text-[12px] text-red-600"></p>
            </div>

            <!-- Password -->
            <div class="w-full flex flex-col gap-[10px] items-start">
                <label for="setup-password"
                       class="w-full font-bold text-[14px] text-[var(--grayscale-100)] tracking-[-0.14px] leading-[1.3]"
                       th:text="#{auth.setup.label.password}">비밀번호</label>
                <div class="w-full border border-[var(--grayscale-20)] rounded-[8px] px-[14px] py-[10px] flex items-center gap-[10px]
                            focus-within:border-[var(--primary-100)] transition-colors"
                     th:classappend="${#fields.hasErrors('password')} ? ' border-red-300' : ''">
                    <input id="setup-password" :type="showPwd ? 'text' : 'password'"
                           th:field="*{password}" required th:attr="minlength=${minPasswordLength}" maxlength="100"
                           autocomplete="new-password"
                           th:placeholder="#{auth.setup.placeholder.password}"
                           class="flex-1 min-w-0 bg-transparent outline-none border-0 text-[13px] text-[var(--grayscale-100)]
                                  placeholder:text-[var(--grayscale-40)] tracking-[-0.13px] leading-[1.3]"/>
                    <button type="button" tabindex="-1" @click="showPwd = !showPwd"
                            :aria-label="showPwd ? $el.dataset.hide : $el.dataset.show"
                            th:data-hide="#{auth.login.hide.password}"
                            th:data-show="#{auth.login.show.password}"
                            class="shrink-0 w-[17px] h-[17px] flex items-center justify-center text-[var(--grayscale-60)] hover:text-[var(--grayscale-100)] transition-colors">
                        <svg x-show="!showPwd" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg x-show="showPwd" x-cloak width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.93 10.93 0 0 1 12 4c7 0 11 8 11 8a19.86 19.86 0 0 1-3.16 4.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                   class="text-[12px] text-red-600"></p>
            </div>

            <!-- Confirm Password -->
            <div class="w-full flex flex-col gap-[10px] items-start">
                <label for="setup-password-confirm"
                       class="w-full font-bold text-[13px] text-[var(--grayscale-100)] tracking-[-0.13px] leading-[1.3]"
                       th:text="#{auth.setup.label.passwordConfirm}">비밀번호 확인</label>
                <div class="w-full border border-[var(--grayscale-20)] rounded-[8px] px-[14px] py-[10px] flex items-center gap-[10px]
                            focus-within:border-[var(--primary-100)] transition-colors"
                     th:classappend="${#fields.hasErrors('passwordConfirm')} ? ' border-red-300' : ''">
                    <input id="setup-password-confirm" :type="showPwd2 ? 'text' : 'password'"
                           th:field="*{passwordConfirm}" required th:attr="minlength=${minPasswordLength}"
                           autocomplete="new-password"
                           th:placeholder="#{auth.setup.placeholder.passwordConfirm}"
                           class="flex-1 min-w-0 bg-transparent outline-none border-0 text-[13px] text-[var(--grayscale-100)]
                                  placeholder:text-[var(--grayscale-40)] tracking-[-0.13px] leading-[1.3]"/>
                    <button type="button" tabindex="-1" @click="showPwd2 = !showPwd2"
                            :aria-label="showPwd2 ? $el.dataset.hide : $el.dataset.show"
                            th:data-hide="#{auth.login.hide.password}"
                            th:data-show="#{auth.login.show.password}"
                            class="shrink-0 w-[17px] h-[17px] flex items-center justify-center text-[var(--grayscale-60)] hover:text-[var(--grayscale-100)] transition-colors">
                        <svg x-show="!showPwd2" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg x-show="showPwd2" x-cloak width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.93 10.93 0 0 1 12 4c7 0 11 8 11 8a19.86 19.86 0 0 1-3.16 4.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <p th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"
                   class="text-[12px] text-red-600"></p>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-[var(--primary-120)] hover:bg-[var(--primary-100)]
                           text-white font-bold text-[14px] tracking-[-0.14px] leading-[1.3]
                           rounded-[8px] px-[14px] py-[9px] transition-colors flex items-center justify-center gap-[4px]">
                <span th:text="#{auth.setup.btn.create}">계정 만들기</span>
                <span aria-hidden="true">→</span>
            </button>
        </form>
    </div>
</main>

</body>
</html>
