# Glossary - Patchability definitions
glossary.patchability.patchable.def=At least one CVE has a <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">fixVersion</code>, meaning the vulnerability can be removed by upgrading. The fixVersion of the highest-severity CVE is shown as the "Best Fix Version".
glossary.patchability.nonPatchable.def=CVEs exist but no known fix version is available. Library replacement, isolation, or temporary mitigation is needed.
glossary.patchability.unknown.def=CVE data has not yet been analyzed or patchability cannot be determined due to missing CVSS information.

# Glossary - Version Health definitions
glossary.versionHealth.upToDate.def=The currently used version matches the latest stable version of the package according to deps.dev. No action required.
glossary.versionHealth.outdated.def=A newer stable version exists. No CVEs, but an upgrade is recommended for new features and bug fixes. The UI displays the recommended version as "\u2192 v'{'latestVersion'}'".
glossary.versionHealth.deprecated.def=The version or package has been officially deprecated by the package manager (deps.dev) or the maintainers. No more security patches or updates will be provided; migration to an alternative is required. The deprecation reason from deps.dev is shown alongside.

# Glossary - License Status definitions
glossary.licenseStatus.restricted.def=Copyleft or non-commercial license with high legal risk for commercial products. Immediate legal review and replacement is required. Default examples: GPL-2.0, GPL-3.0, AGPL-3.0, SSPL-1.0, BUSL-1.1, CC-BY-NC-4.0.
glossary.licenseStatus.caution.def=Conditionally permitted license. Usable, but carries conditions such as source disclosure obligations and patent clauses; legal review is recommended. Default examples: LGPL-2.1, LGPL-3.0, MPL-2.0, EPL-2.0, EUPL-1.2.
glossary.licenseStatus.permitted.def=Permissive license with no restrictions on commercial use or redistribution. No separate legal review required. Default examples: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unlicense, 0BSD, CC0-1.0.
glossary.licenseStatus.unknown.def=deps.dev did not return an SPDX identifier, or the license is not registered in the system policy table. Manual review required.
glossary.licenseStatus.spdx.def=Software Package Data Exchange. A standardized identifier system for open source license information. Examples: <code class="font-mono text-[var(--copy-info)]">MIT</code>, <code class="font-mono text-[var(--copy-info)]">Apache-2.0</code>, <code class="font-mono text-[var(--copy-info)]">GPL-3.0-only</code>. OsWL uses the SPDX identifiers returned by deps.dev as keys for license policy mapping.

# Glossary - Scan Status definitions
glossary.scanStatus.pending.def=The CLI is transmitting scan data. The server is receiving the package list.
glossary.scanStatus.scanning.def=Package list saved. Waiting for vulnerability analysis.
glossary.scanStatus.analyzing.def=Collecting CVE and license data from deps.dev and OSV APIs. If an NVD API Key is configured, additional CVSS score enrichment is also performed in this stage.
glossary.scanStatus.completed.def=Analysis complete. Results are available in the Security Center and License tabs.
glossary.scanStatus.failed.def=Analysis failed due to an external API error, network timeout, or similar issue. Check the error message in Scan History and run the scan again.

# Glossary - Import Source definitions
glossary.importSource.cli.def=Scan data submitted by running the OsWL CLI tool directly on a local machine or build server. Only package metadata is sent \u2014 no source code upload.
glossary.importSource.git.def=Imported by connecting a GitHub repository and selecting a branch via the GitHub Integration panel. Dependency files in the repository are automatically analyzed after OAuth authentication.

# Glossary - Dependency Terms definitions
glossary.dependencyTerms.direct.def=Dependency directly declared by the project (depth 1). A package explicitly listed in build files (pom.xml, package.json, etc.). Shown with a "Direct" badge in the component detail panel.
glossary.dependencyTerms.transitive.def=Indirect dependency required by a direct dependency (depth 2+). Not in the project build file but included at runtime. The dependency path is shown as "Via N intermediate(s)" in the component detail panel.
glossary.dependencyTerms.path.def=The full dependency path from the root project to a specific library. A library may be included through multiple paths, each shown separately. Example: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">my-app \u2192 spring-web \u2192 commons-lang3</code>
glossary.dependencyTerms.depth.def=The number of nodes (packages) in the dependency path. depth 2 = Direct (root \u2192 library), depth 3+ = Transitive (root \u2192 intermediate \u2192 library).
glossary.dependencyTerms.info.def=Summary string shown in the component row of the Security Center table. Example: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">Direct (2) + Transitive (5)</code>. Calculated and transmitted by the CLI at scan time.
glossary.dependencyTerms.ecosystem.def=The language/runtime ecosystem the package belongs to. Supported values: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">MAVEN</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">NPM</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">PYPI</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">GO</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">CARGO</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">NUGET</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">RUBYGEMS</code>.

# Glossary - Component States definitions
glossary.componentStates.reviewed.def=Status indicating that the assignee has acknowledged and completed review of the component's vulnerabilities. This does not mean vulnerabilities are removed; it is used for team awareness and task tracking.
glossary.componentStates.ignored.def=Status indicating that the component's vulnerabilities are intentionally ignored. Used when, for example, the dependency is test-only or does not represent an attack surface. Ignored components can be hidden with a filter.

# Glossary - CVE / Advisory Terms definitions
glossary.cveTerms.cve.def=Common Vulnerabilities and Exposures. Standard identifier for publicly disclosed security vulnerabilities. Example: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">CVE-2021-44228</code> (Log4Shell). Managed by NVD (National Vulnerability Database).
glossary.cveTerms.ghsa.def=GitHub Security Advisory. GitHub-managed security advisory identifier. Example: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">GHSA-jfh8-c2jp-hdp8</code>. deps.dev primarily returns GHSA IDs; OsWL maps these to CVE IDs.
glossary.cveTerms.cvssScore.def=Common Vulnerability Scoring System. Quantifies vulnerability severity as a score between 0.0 and 10.0. OsWL uses CVSS 3.x. Score source priority: NVD (when NVD API Key is configured) > deps.dev cvss3Score.
glossary.cveTerms.cvssVector.def=String representation of the detailed metrics composing the CVSS score. Example: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H</code>. Represents Attack Vector (AV), Attack Complexity (AC), Privileges Required (PR), etc.
glossary.cveTerms.cwe.def=Common Weakness Enumeration. Classification of root-cause weakness types for software vulnerabilities. Examples: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">CWE-79</code> (XSS), <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">CWE-89</code> (SQL Injection). Displayed only when an NVD API Key is configured.
glossary.cveTerms.fixVersion.def=The earliest library version in which the CVE is fixed. Upgrading to this version or later removes the vulnerability. The core field used in Patchability calculation.
glossary.cveTerms.bestFixVersion.def=The Fix Version of the highest-severity CVE among those linked to the component. Shown in the UI as a single upgrade target version.

# Glossary - AI Terms definitions
glossary.aiTerms.summary.def=A one-line CVE summary generated by the configured AI model (OpenAI, Gemini, Anthropic, or Local). Explains the impact and risk of the vulnerability in plain language. Not shown if AI is not configured.
glossary.aiTerms.provider.def=The model provider to use for AI Summary generation. Supported values: <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">OPENAI</code> (GPT) \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">GEMINI</code> \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">ANTHROPIC</code> (Claude) \u00b7 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">LOCAL</code> (Ollama or OpenAI-compatible endpoint). Configured in Settings \u203a AI.

# Glossary - External Data Sources definitions
glossary.externalSources.depsDev.def=Open source package metadata service operated by Google. OsWL uses the deps.dev API to collect license information, latest versions, deprecation status, and GHSA advisory lists.
glossary.externalSources.osv.def=Open Source Vulnerabilities. Open source vulnerability database operated by Google. OsWL supplements vulnerability details (summary, aliases) via the OSV querybatch API.
glossary.externalSources.nvd.def=National Vulnerability Database. The U.S. national vulnerability database operated by NIST. When an API Key is configured, CVSS Score, Vector, and CWE ID are additionally collected (NVD enrichment). Configured in Settings \u203a External API.

# Glossary - System / Project Terms definitions
glossary.systemTerms.project.def=The unit of software analyzed in OsWL. Corresponds to a GitHub owner/repo or an independent project registered via CLI. Multiple branches (Project Versions) are managed under a single Project.
glossary.systemTerms.projectVersion.def=Branch-level import record of a project. Re-importing the same branch updates the existing row; importing a new branch creates a new row. Version list shown in the Scan History dropdown.
glossary.systemTerms.apiKey.def=A SecureRandom-based token with the <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">oswl_</code> prefix. Used by CLI clients to authenticate when sending scan data. Issued per project; expiration time can be set and individual keys can be revoked.
glossary.systemTerms.library.def=(name, version, ecosystem) combination that identifies an open source package globally. CVE and license data is stored once per Library and shared across all projects/scans. No duplicate fetching occurs when multiple projects use the same library.
glossary.systemTerms.scanComponent.def=Join entity between a ScanResult and a Library. Holds the reviewed/ignored status and DependencyPath information in the context of that scan. One row in the Security Center table corresponds to this unit.
glossary.systemTerms.versionDiff.def=Feature that compares Added, Removed, and Changed components between two scan versions. Used to track security changes between releases.
glossary.systemTerms.permanentCache.def=Policy for permanently caching Library records. When enabled, existing Library rows are not re-fetched from deps.dev. When disabled, stale records are re-fetched according to Cache TTL (in days). Configured in Settings \u203a Cache.
glossary.systemTerms.systemAdmin.def=The super-administrator account of the OsWL instance. Only one is created during the initial system setup (Setup) screen. Has full access to all settings, users, and projects.
glossary.systemTerms.trash.def=Temporary holding area for projects deleted from the Projects list. Data is retained via soft-delete and can be restored. Permanently deleting from Trash removes data permanently.

