# Glossary - section descriptions (intro paragraphs)
glossary.riskLevel.description=Severity level of a security vulnerability (CVE). Displayed in Security Center filters, component badges, and Risk Trend graphs using the 5 labels below. Automatically classified based on CVSS 3.x Score. Grey-italicized values under each label are internal enum values in the backend code.
glossary.patchability.description=Indicates whether a vulnerability can be patched. Auto-calculated based on whether a <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">fixVersion</code> exists in the CVE. Components without vulnerabilities display a <strong>Version Health</strong> badge instead.
glossary.versionHealth.description=Version status displayed for components without CVEs. Auto-calculated from deps.dev metadata and <strong>not shown alongside</strong> the Patchability badge \u2014 only one is shown based on CVE presence.
glossary.licenseStatus.description=Indicates whether a library\u2019s open source license complies with the project\u2019s license policy. Auto-classified by mapping SPDX identifiers against a built-in policy table, customizable in Settings. License Status uses a <strong>4-tier system</strong>, independent from Security Severity (5 tiers). Grey values under each label are internal enum values.
glossary.scanStatus.description=Processing stage of a scan submitted by the CLI. Viewable in the Scan History screen.
glossary.importSource.description=How a project version was registered in OsWL.
glossary.componentStates.description=Review status that can be assigned to each component in Security Center. Multiple components can be updated at once via Bulk Action.

# Glossary - Risk Level definitions
glossary.riskLevel.critical.def=Highest severity vulnerability requiring immediate action. Includes attack vectors that threaten the entire system such as Remote Code Execution (RCE) and authentication bypass.
glossary.riskLevel.high.def=High severity vulnerability. Low attack complexity or privilege escalation possible. Prompt patching or temporary mitigation is recommended.
glossary.riskLevel.medium.def=Medium severity vulnerability. Attack conditions are limited or impact is restricted. Patching within the next regular release cycle is recommended.
glossary.riskLevel.low.def=Low severity vulnerability. Very low likelihood of successful exploitation or minimal impact. Response timing depends on the risk acceptance policy.
glossary.riskLevel.unscored.def=No CVSS score (Unscored) or no vulnerabilities. Displayed when no CVEs are registered for the library, or when CVEs exist but no CVSS score has been assigned yet.

