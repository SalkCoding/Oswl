# Glossary - 섹션 설명 (인트로 단락)
glossary.riskLevel.description=보안 취약점(CVE)의 심각도 수준. 아래 5가지 레이블을 사용하여 Security Center 필터, 컴포넌트 배지, Risk Trend 그래프에 표시됩니다. CVSS 3.x 점수를 기준으로 자동 분류됩니다. 각 레이블 아래 회색 이탤릭체 값은 백엔드 코드의 내부 열거형 값입니다.
glossary.patchability.description=취약점 패치 가능 여부를 나타냅니다. CVE에 <code class="font-mono text-[var(--copy-info)] bg-[var(--grayscale-10)] px-[4px] py-[1px] rounded-[4px]">fixVersion</code>이 존재하는지 여부를 기반으로 자동 계산됩니다. 취약점이 없는 컴포넌트는 <strong>버전 상태</strong> 배지를 대신 표시합니다.
glossary.versionHealth.description=CVE가 없는 컴포넌트에 표시되는 버전 상태. deps.dev 메타데이터에서 자동으로 계산되며 Patchability 배지와 <strong>함께 표시되지 않습니다</strong> \u2014 CVE 존재 여부에 따라 하나만 표시됩니다.
glossary.licenseStatus.description=라이브러리의 오픈소스 라이선스가 프로젝트의 라이선스 정책을 준수하는지 나타냅니다. Settings에서 맞춤 설정 가능한 내장 정책 테이블에 SPDX 식별자를 매핑하여 자동 분류됩니다. 라이선스 상태는 보안 심각도(5단계)와 독립적인 <strong>4단계 시스템</strong>을 사용합니다. 각 레이블 아래 회색 값은 내부 열거형 값입니다.
glossary.scanStatus.description=CLI를 통해 제출된 스캔의 처리 단계. 스캔 기록 화면에서 확인할 수 있습니다.
glossary.importSource.description=프로젝트 버전이 OsWL에 등록된 방법.
glossary.componentStates.description=Security Center에서 각 컴포넌트에 지정할 수 있는 검토 상태. 일괄 작업을 통해 여러 컴포넌트를 동시에 업데이트할 수 있습니다.

# Glossary - Risk Level 정의
glossary.riskLevel.critical.def=즉각적인 조치가 필요한 최고 심각도 취약점. 원격 코드 실행(RCE) 및 인증 우회와 같이 시스템 전체를 위협하는 공격 벡터를 포함합니다.
glossary.riskLevel.high.def=높은 심각도 취약점. 낮은 공격 복잡성 또는 권한 상승이 가능합니다. 신속한 패치 또는 임시 완화 조치를 권장합니다.
glossary.riskLevel.medium.def=중간 심각도 취약점. 공격 조건이 제한되거나 영향 범위가 한정됩니다. 다음 정기 릴리스 주기 내에 패치를 권장합니다.
glossary.riskLevel.low.def=낮은 심각도 취약점. 악용 가능성이 매우 낮거나 영향이 최소화됩니다. 대응 시점은 리스크 수용 정책에 따라 결정됩니다.
glossary.riskLevel.unscored.def=CVSS 점수 없음(미채점) 또는 취약점 없음. 라이브러리에 등록된 CVE가 없거나, CVE가 존재하지만 CVSS 점수가 아직 부여되지 않은 경우 표시됩니다.

glossary.riskLevel.title=Risk Level (심각도)
glossary.riskLevel.col.uiLabel=UI 레이블
glossary.riskLevel.col.cvssRange=CVSS 범위
glossary.riskLevel.col.definition=정의
glossary.licenseStatus.title=License Status (라이선스 상태)

