# Deploys landing/ to Project Pages (https://<org>.github.io/Oswl/).
#
# One-time repo setup (Settings):
#   Pages → Build and deployment → Source: GitHub Actions
#   Environments → github-pages → Deployment branches: add "main" (or No restriction)
name: Deploy Landing to Pages

on:
  # Auto-deploy only when landing site inputs change (not every main push).
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
      - '.github/scripts/prepare-pages-site.sh'
      - 'oswl-app/src/main/resources/static/css/**'
      - 'oswl-app/src/main/resources/static/icon/**'
      - 'oswl-app/src/main/resources/static/graphic/**'
      - 'oswl-app/src/main/resources/static/img/screenshots/**'
      - 'tailwind/**'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Djava.net.preferIPv4Stack=true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Landing Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Build Tailwind CSS
        run: ./gradlew --no-daemon buildTailwindCss

      - name: Prepare site
        run: bash .github/scripts/prepare-pages-site.sh "${{ github.repository }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
