name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Djava.net.preferIPv4Stack=true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-fast:
    name: Fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - name: Run fast-tagged tests
        run: ./gradlew --no-daemon testFast

  test-parser:
    name: Parser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - name: Run parser-tagged tests
        run: ./gradlew --no-daemon testParser

  test-auth:
    name: Auth tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - run: ./gradlew --no-daemon testAuth

  test-web:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - run: ./gradlew --no-daemon testWeb

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v6
      - name: Run integration-tagged tests
        run: ./gradlew --no-daemon testIntegration

  build:
    name: Full build & coverage
    needs: [test-fast, test-parser, test-auth, test-web, test-integration]
    if: always() && (needs.test-fast.result == 'success' && needs.test-parser.result == 'success' && needs.test-auth.result == 'success' && needs.test-web.result == 'success' && (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Build, full test suite, coverage report, and verify production JAR
        run: ./gradlew --no-daemon clean test jacocoTestReport jacocoTestCoverageVerification bootJar verifyProdJar

  docker:
    name: Build & push Docker image
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  release-please:
    name: Version & Release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish JAR
    needs: [build, release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build production JAR
        run: ./gradlew --no-daemon bootJar verifyProdJar

      - name: Resolve JAR path
        id: jar
        run: |
          VERSION=$(./gradlew -q properties | awk '/^version:/ {print $2}')
          JAR_PATH="oswl-app/build/libs/oswl-${VERSION}.jar"
          if [ ! -f "$JAR_PATH" ]; then
            echo "::error::JAR not found at ${JAR_PATH}"
            ls -la oswl-app/build/libs/ || true
            exit 1
          fi
          echo "path=${JAR_PATH}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${{ steps.jar.outputs.path }}" \
            --clobber
          echo "Uploaded oswl-${{ steps.jar.outputs.version }}.jar to ${{ needs.release-please.outputs.tag_name }}"
