name: Sync Docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '!docs/ko/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-wiki:
    name: Sync docs to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Wiki content (exclude Korean docs)
        run: |
          rm -rf /tmp/wiki-docs
          mkdir -p /tmp/wiki-docs
          rsync -a --exclude='ko/' docs/ /tmp/wiki-docs/

      - name: Sync to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5.0.4
        with:
          path: /tmp/wiki-docs/
          strategy: clone
          preprocess: true
          disable-empty-commits: true
          commit-message: "wiki: sync from ${{ github.sha }}"
