name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Area (optional)
      options:
        - label: Security / CVE
        - label: License compliance
        - label: CLI / CI integration
        - label: VCS / Quick Import
        - label: UI / UX
        - label: Documentation
        - label: Operations / deployment
